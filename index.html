<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>美股位階安全儀表板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:16px;max-width:600px;margin:0 auto}
h1{font-size:18px;font-weight:500;margin-bottom:4px}
.date{font-size:12px;color:#888;margin-bottom:16px}
.safety-card{border-radius:12px;padding:16px 18px;margin-bottom:12px;border-width:1.5px;border-style:solid}
.combo-card{border-radius:8px;padding:10px 14px;margin-bottom:12px;border-width:0.5px;border-style:solid}
.group-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.tab{border-radius:8px;padding:8px 4px;cursor:pointer;text-align:center;font-size:12px;border:0.5px solid #ddd;background:#fff;transition:all 0.15s}
.tab.active{border-width:1.5px;font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;margin:0 auto 4px}
.ind-card{border-radius:8px;padding:10px 14px;margin-bottom:8px;border-width:0.5px;border-style:solid}
.ind-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ind-label{font-size:14px;font-weight:500}
.ind-badge{font-size:11px;padding:2px 8px;border-radius:6px;background:#fff;border-width:0.5px;border-style:solid}
.ind-controls{display:flex;align-items:center;gap:10px}
.ind-controls input[type=range]{flex:1;height:4px;cursor:pointer}
.ind-val{font-size:15px;font-weight:500;min-width:52px;text-align:right}
.score-bar-wrap{background:#e5e5e0;border-radius:4px;height:8px;overflow:hidden;margin:10px 0 4px}
.score-bar{height:100%;border-radius:4px;transition:width 0.3s}
.score-note{font-size:11px;text-align:right}
.footer{margin-top:14px;padding:10px 14px;background:#fff;border-radius:8px;font-size:11px;color:#888;line-height:1.8;border:0.5px solid #e5e5e0}
.footer strong{color:#444;font-weight:500}
@media(prefers-color-scheme:dark){
  body{background:#1a1a1a;color:#e5e5e0}
  .tab{background:#2a2a2a;border-color:#444}
  .ind-badge,.footer{background:#2a2a2a}
  .score-bar-wrap{background:#333}
}
</style>
</head>
<body>
<h1>美股三大指數位階安全</h1>
<div class="date" id="dateLabel"></div>
<div class="safety-card" id="safetyCard">
  <div style="font-size:11px;margin-bottom:4px" id="safetyTitle">綜合位階安全評估</div>
  <div style="font-size:24px;font-weight:500;margin-bottom:4px" id="safetyLabel">—</div>
  <div style="font-size:12px;margin-bottom:10px" id="safetySub"></div>
  <div class="score-bar-wrap"><div class="score-bar" id="scoreBar" style="width:50%"></div></div>
  <div class="score-note" id="scoreNote"></div>
</div>
<div class="combo-card" id="comboCard">
  <div style="font-size:11px;margin-bottom:2px">VIX + SKEW + VVIX 組合訊號</div>
  <div style="font-size:15px;font-weight:500" id="comboTitle"></div>
  <div style="font-size:12px" id="comboDesc"></div>
</div>
<div class="group-tabs" id="groupTabs"></div>
<div id="indPanel"></div>
<div class="footer">
  <strong>盤前：</strong>VIX / SKEW / VVIX / DXY / 美債 / 黃金 / 原油 &nbsp;|&nbsp;
  <strong>盤後：</strong>Put/Call / AAII / MFI / 廣度 / RSI / Fear&amp;Greed &nbsp;|&nbsp;
  <strong>高SKEW+低VIX</strong> = 最危險，優先減碼
</div>
<script>
const INDS = [
  {key:"vix",label:"VIX",group:"波動",min:10,max:60,step:0.5,def:20,
   zones:[{max:15,s:-1,t:"過度樂觀"},{max:20,s:2,t:"低波動"},{max:25,s:1,t:"正常"},{max:30,s:0,t:"警戒"},{max:40,s:-1,t:"恐慌"},{max:99,s:-2,t:"極端恐慌"}]},
  {key:"skew",label:"SKEW",group:"波動",min:100,max:175,step:0.5,def:136,
   zones:[{max:115,s:2,t:"正常"},{max:130,s:1,t:"輕度尾端風險"},{max:150,s:0,t:"中高尾端風險"},{max:165,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端"}]},
  {key:"vvix",label:"VVIX",group:"波動",min:60,max:160,step:0.5,def:100,
   zones:[{max:80,s:2,t:"極度平靜"},{max:100,s:1,t:"正常"},{max:120,s:0,t:"偏高"},{max:140,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端不確定"}]},
  {key:"putcall",label:"Put/Call",group:"情緒",min:0.4,max:1.8,step:0.01,def:0.85,
   zones:[{max:0.6,s:-1,t:"過度貪婪"},{max:0.85,s:1,t:"偏多"},{max:1.1,s:2,t:"均衡"},{max:1.3,s:0,t:"偏空"},{max:9,s:1,t:"極悲觀(逆向)"}]},
  {key:"aaii",label:"AAII多頭%",group:"情緒",min:10,max:65,step:1,def:38,
   zones:[{max:25,s:1,t:"極悲觀(逆向)"},{max:35,s:1,t:"偏空"},{max:45,s:2,t:"正常"},{max:55,s:0,t:"偏多偏熱"},{max:99,s:-1,t:"過熱"}]},
  {key:"fgi",label:"Fear & Greed",group:"情緒",min:0,max:100,step:1,def:50,
   zones:[{max:20,s:1,t:"極度恐慌(逆向)"},{max:35,s:1,t:"恐慌"},{max:55,s:2,t:"中性"},{max:70,s:0,t:"貪婪 注意"},{max:85,s:-1,t:"極度貪婪"},{max:100,s:-2,t:"過熱 高風險"}]},
  {key:"mfi",label:"MFI",group:"資金",min:0,max:100,step:1,def:55,
   zones:[{max:20,s:1,t:"超賣(機會)"},{max:40,s:0,t:"資金流出"},{max:60,s:2,t:"中性"},{max:80,s:1,t:"資金流入"},{max:100,s:-1,t:"超買"}]},
  {key:"breadth",label:"市場廣度%",group:"資金",min:0,max:100,step:1,def:55,
   zones:[{max:35,s:-2,t:"多數股跌"},{max:45,s:0,t:"偏弱"},{max:55,s:2,t:"均衡"},{max:65,s:1,t:"多頭強勢"},{max:100,s:0,t:"過度擴張"}]},
  {key:"rsi",label:"大盤RSI",group:"技術",min:0,max:100,step:1,def:52,
   zones:[{max:30,s:1,t:"超賣"},{max:40,s:0,t:"偏弱"},{max:60,s:2,t:"健康"},{max:70,s:1,t:"偏強"},{max:80,s:0,t:"超買警示"},{max:100,s:-1,t:"強烈超買"}]},
  {key:"dxy",label:"DXY美元",group:"總經",min:95,max:115,step:0.1,def:104,
   zones:[{max:100,s:2,t:"弱美元 利多"},{max:103,s:1,t:"中性偏弱"},{max:106,s:0,t:"中性"},{max:109,s:-1,t:"強美元 壓制"},{max:999,s:-2,t:"強美元 高壓"}]},
  {key:"us10y",label:"美債10Y%",group:"總經",min:2,max:6,step:0.05,def:4.3,
   zones:[{max:3.5,s:2,t:"低殖利率 偏多"},{max:4.0,s:1,t:"適中"},{max:4.5,s:0,t:"偏高"},{max:5.0,s:-1,t:"壓估值"},{max:99,s:-2,t:"過高 危險"}]},
  {key:"gold",label:"黃金漲跌%",group:"總經",min:-3,max:3,step:0.1,def:0,
   zones:[{max:-1,s:1,t:"下跌 偏風險"},{max:0,s:2,t:"微跌 中性"},{max:0.5,s:1,t:"微漲 中性"},{max:1.5,s:0,t:"上漲 謹慎"},{max:99,s:-1,t:"急漲 避險需求高"}]},
  {key:"oil",label:"原油漲跌%",group:"總經",min:-5,max:5,step:0.1,def:0,
   zones:[{max:-2,s:-1,t:"急跌 需求疑慮"},{max:0,s:1,t:"微跌 中性"},{max:1,s:2,t:"微漲 中性"},{max:2.5,s:0,t:"上漲 通膨壓力"},{max:99,s:-1,t:"急漲 通膨風險"}]},
];

const GROUPS = ["波動","情緒","資金","技術","總經"];
const vals = {};
INDS.forEach(i => vals[i.key] = i.def);
let activeGroup = "波動";

function getZone(ind, v) {
  for (const z of ind.zones) if (v <= z.max) return z;
  return ind.zones[ind.zones.length-1];
}
function scColor(s) {
  if (s>=2) return {bg:"#EAF3DE",bd:"#639922",tx:"#27500A"};
  if (s===1) return {bg:"#E1F5EE",bd:"#1D9E75",tx:"#085041"};
  if (s===0) return {bg:"#FAEEDA",bd:"#EF9F27",tx:"#633806"};
  if (s===-1) return {bg:"#FCEBEB",bd:"#E24B4A",tx:"#791F1F"};
  return {bg:"#F7C1C1",bd:"#A32D2D",tx:"#501313"};
}
function safetyInfo(r) {
  if (r>=0.7) return {label:"安全 可持倉",sub:"指標多數健康",bg:"#EAF3DE",c:"#27500A",bar:"#639922"};
  if (r>=0.5) return {label:"偏安全 謹慎樂觀",sub:"部分指標偏弱",bg:"#E1F5EE",c:"#085041",bar:"#1D9E75"};
  if (r>=0.3) return {label:"中性 控制倉位",sub:"多空分歧明顯",bg:"#FAEEDA",c:"#633806",bar:"#EF9F27"};
  if (r>=0.1) return {label:"偏危險 減碼",sub:"多項指標亮紅燈",bg:"#FCEBEB",c:"#791F1F",bar:"#E24B4A"};
  return {label:"危險 高度警戒",sub:"建議大幅減碼",bg:"#F7C1C1",c:"#501313",bar:"#A32D2D"};
}
function comboInfo() {
  const vix=vals.vix,skew=vals.skew,vvix=vals.vvix;
  if (skew>145&&vix<20) return {t:"暗流湧動",d:"高SKEW+低VIX 最危險組合",c:"#A32D2D",bg:"#F7C1C1"};
  if (skew>130&&vix>25&&vvix>120) return {t:"全面恐慌",d:"三指標同時偏高，市場已定價下跌",c:"#E24B4A",bg:"#FCEBEB"};
  if (vvix>130) return {t:"極端不確定",d:"VVIX暴高，VIX走向難以預測",c:"#E24B4A",bg:"#FCEBEB"};
  if (skew<120&&vix<20&&vvix<100) return {t:"市場平靜",d:"三指標均低，風險溢價正常",c:"#27500A",bg:"#EAF3DE"};
  return {t:"正常波動",d:"指標無明顯異常組合",c:"#085041",bg:"#E1F5EE"};
}

function dotColor(g) {
  const inds = INDS.filter(i=>i.group===g);
  const tot = inds.reduce((a,i)=>a+getZone(i,vals[i.key]).s,0);
  const r=(tot-inds.length*-2)/(inds.length*4);
  return r>=0.6?"#639922":r>=0.4?"#1D9E75":r>=0.25?"#EF9F27":"#E24B4A";
}

function update() {
  let total=0, mn=INDS.length*-2, mx=INDS.length*2;
  INDS.forEach(i=>total+=getZone(i,vals[i.key]).s);
  const r=(total-mn)/(mx-mn);
  const sf=safetyInfo(r);
  const sc=document.getElementById("safetyCard");
  sc.style.background=sf.bg; sc.style.borderColor=sf.bar;
  document.getElementById("safetyTitle").style.color=sf.c;
  document.getElementById("safetyLabel").style.color=sf.c;
  document.getElementById("safetyLabel").textContent=sf.label;
  document.getElementById("safetySub").style.color=sf.c;
  document.getElementById("safetySub").textContent=sf.sub;
  document.getElementById("scoreBar").style.width=(r*100).toFixed(0)+"%";
  document.getElementById("scoreBar").style.background=sf.bar;
  document.getElementById("scoreNote").style.color=sf.c;
  document.getElementById("scoreNote").textContent=`綜合分 ${total} （範圍 ${mn} ~ ${mx}）`;

  const cb=comboInfo();
  const cc=document.getElementById("comboCard");
  cc.style.background=cb.bg; cc.style.borderColor=cb.c;
  document.getElementById("comboTitle").style.color=cb.c;
  document.getElementById("comboTitle").textContent=cb.t;
  document.getElementById("comboDesc").style.color=cb.c;
  document.getElementById("comboDesc").textContent=cb.d;

  document.querySelectorAll(".tab").forEach(el=>{
    const g=el.dataset.group;
    const dc=dotColor(g);
    el.querySelector(".dot").style.background=dc;
    if(g===activeGroup){el.style.borderColor=dc;el.style.borderWidth="1.5px";el.style.fontWeight="500";}
    else{el.style.borderColor="#ddd";el.style.borderWidth="0.5px";el.style.fontWeight="400";}
  });

  document.querySelectorAll(".ind-card").forEach(el=>{
    const key=el.dataset.key;
    const ind=INDS.find(i=>i.key===key);
    const z=getZone(ind,vals[key]);
    const c=scColor(z.s);
    el.style.background=c.bg; el.style.borderColor=c.bd;
    el.querySelector(".ind-label").style.color=c.tx;
    const badge=el.querySelector(".ind-badge");
    badge.style.color=c.tx; badge.style.borderColor=c.bd; badge.textContent=z.t;
    el.querySelector(".ind-val").style.color=c.tx;
  });
}

function renderTabs() {
  const wrap=document.getElementById("groupTabs");
  wrap.innerHTML="";
  GROUPS.forEach(g=>{
    const d=document.createElement("div");
    d.className="tab"+(g===activeGroup?" active":"");
    d.dataset.group=g;
    d.innerHTML=`<div class="dot"></div>${g}`;
    d.onclick=()=>{activeGroup=g;renderPanel();update();};
    wrap.appendChild(d);
  });
}

function renderPanel() {
  const panel=document.getElementById("indPanel");
  panel.innerHTML="";
  INDS.filter(i=>i.group===activeGroup).forEach(ind=>{
    const z=getZone(ind,vals[ind.key]);
    const c=scColor(z.s);
    const card=document.createElement("div");
    card.className="ind-card"; card.dataset.key=ind.key;
    card.style.background=c.bg; card.style.borderColor=c.bd;
    const decimals=ind.step<1?(ind.step<0.1?2:2):0;
    card.innerHTML=`
      <div class="ind-header">
        <span class="ind-label" style="color:${c.tx}">${ind.label}</span>
        <span class="ind-badge" style="color:${c.tx};border-color:${c.bd}">${z.t}</span>
      </div>
      <div class="ind-controls">
        <input type="range" min="${ind.min}" max="${ind.max}" step="${ind.step}" value="${vals[ind.key]}" style="accent-color:${c.bd}" data-key="${ind.key}"/>
        <span class="ind-val" style="color:${c.tx}">${parseFloat(vals[ind.key]).toFixed(decimals)}</span>
      </div>`;
    card.querySelector("input").addEventListener("input",e=>{
      vals[ind.key]=parseFloat(e.target.value);
      const decs=ind.step<1?2:0;
      card.querySelector(".ind-val").textContent=parseFloat(e.target.value).toFixed(decs);
      update();
    });
    panel.appendChild(card);
  });
}

document.getElementById("dateLabel").textContent=new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"short"});
renderTabs();
renderPanel();
update();
</script>
</body>
</html>
