<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Market Oracle</title>
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --line:#333;--line2:#444;
  --text:#e8e8e8;--text2:#999;--text3:#555;
  --up:#00c176;--dn:#e5404a;--warn:#e8a020;--info:#5b9bd5;
  --accent:#e8e8e8;
}
html,body{background:var(--bg);color:var(--text);min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif}
body{padding:0 0 60px;font-size:14px;line-height:1.4}

/* ── HEADER ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--line);padding:12px 16px 0}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hdr-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.3px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-date{font-size:11px;color:var(--text3)}
.rfsh{width:30px;height:30px;border:1px solid var(--line2);border-radius:3px;background:var(--bg3);
  cursor:pointer;color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center}
.rfsh:active{opacity:.6}
.rfsh.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STATUS ── */
.status{display:flex;align-items:center;gap:8px;padding:6px 0 10px;font-size:11px;color:var(--text3)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--up);flex-shrink:0}
.live-dot.off{background:var(--text3)}
.mkt-tag{font-size:10px;font-weight:600;padding:1px 6px;border:1px solid;border-radius:2px;letter-spacing:.5px}
.mkt-tag.open  {border-color:var(--up);color:var(--up)}
.mkt-tag.pre   {border-color:var(--warn);color:var(--warn)}
.mkt-tag.post  {border-color:var(--info);color:var(--info)}
.mkt-tag.closed{border-color:var(--text3);color:var(--text3)}
.status-time{margin-left:auto;font-size:11px;color:var(--text3)}

/* ── TABS ── */
.tabs{display:flex;border-top:1px solid var(--line);margin:0 -16px}
.tab{flex:1;padding:10px;border:none;background:transparent;cursor:pointer;
  font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.5px;
  border-top:2px solid transparent;transition:color .15s;margin-top:-1px}
.tab.on{color:var(--text);border-top-color:var(--info)}

/* ── CONTENT ── */
.cnt{padding:0 16px}

/* ── SECTION LABEL ── */
.slabel{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;
  padding:14px 0 6px;border-bottom:1px solid var(--line)}

/* ── ORACLE / SIGNAL ── */
.signal-row{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.signal-bar{width:3px;flex-shrink:0;align-self:stretch;border-radius:1px}
.signal-body{flex:1}
.signal-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.signal-verdict{font-size:17px;font-weight:700;letter-spacing:.2px;margin-bottom:2px}
.signal-sub{font-size:12px;color:var(--text2)}
.signal-pbar{height:2px;background:var(--bg4);margin-top:10px;border-radius:1px}
.signal-fill{height:100%;border-radius:1px}
.signal-score{font-size:10px;color:var(--text3);margin-top:4px;text-align:right}

/* ── COMBO ── */
.combo-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.combo-tag{font-size:10px;color:var(--text3);letter-spacing:.5px;flex-shrink:0;width:24px;text-align:center}
.combo-body{flex:1}
.combo-val{font-size:13px;font-weight:700}
.combo-desc{font-size:11px;color:var(--text2);margin-top:1px}

/* ── DATA ROW ── */
.drow{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
.drow:last-child{border-bottom:none}
.drow-left{flex:1;min-width:0}
.drow-sym{font-size:13px;font-weight:600;color:var(--text)}
.drow-name{font-size:11px;color:var(--text3);margin-top:1px}
.drow-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.drow-price{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;transition:color .15s}
.drow-price.up{color:var(--up)}
.drow-price.dn{color:var(--dn)}
.drow-chg{font-size:11px;font-weight:600;min-width:90px;text-align:right}
.drow-zone{font-size:10px;color:var(--text3);padding:1px 6px;border-left:2px solid var(--line2);
  margin-left:4px;white-space:nowrap;min-width:60px;text-align:center}
.mkt-badge{font-size:9px;font-weight:700;padding:1px 5px;border:1px solid;border-radius:2px;margin-left:4px;letter-spacing:.5px}
.mkt-badge.open  {border-color:var(--up);color:var(--up)}
.mkt-badge.pre   {border-color:var(--warn);color:var(--warn)}
.mkt-badge.post  {border-color:var(--info);color:var(--info)}

/* ── METRIC ROW ── */
.mrow{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.mrow:last-child{border-bottom:none}
.mrow-lbl{font-size:13px;color:var(--text2);flex:1}
.mrow-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;margin-right:8px}
.mrow-zone{font-size:10px;color:var(--text3);padding:1px 6px;border-left:2px solid var(--line2);
  white-space:nowrap;min-width:72px;text-align:center}

/* ── CHIP TABLE ── */
.ct{width:100%;border-collapse:collapse}
.ct tr{border-bottom:1px solid var(--line)}
.ct tr:last-child{border-bottom:none}
.ct td{padding:8px 4px;font-size:13px;vertical-align:middle}
.ct-lbl{color:var(--text2)}
.ct-bar{width:44px;padding:0 6px}
.ct-bar-bg{height:2px;background:var(--bg4);position:relative}
.ct-bar-fill{height:100%;position:absolute;left:0;top:0}
.ct-val{font-size:13px;font-weight:700;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.ct-chg{font-size:10px;text-align:right;padding-left:6px;white-space:nowrap}
.ct-date{font-size:11px;color:var(--text3);padding:6px 0 2px}

/* ── SESSION ── */
.sess{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line)}
.sess-half{padding:12px 0}
.sess-half:first-child{padding-right:14px;border-right:1px solid var(--line)}
.sess-half:last-child{padding-left:14px}
.sess-tag{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.sess-price{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px}
.sess-chg{font-size:12px;font-weight:600;margin-bottom:2px}
.sess-vol{font-size:11px;color:var(--text3)}
.sess-vs{font-size:11px;margin-top:2px}

/* ── P/C ── */
.pc-grid{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line)}
.pc-half{padding:12px 0}
.pc-half:first-child{padding-right:14px;border-right:1px solid var(--line)}
.pc-half:last-child{padding-left:14px}
.pc-sess{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.pc-num{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px}
.pc-sublbl{font-size:11px;color:var(--text3);margin-bottom:6px}
.pc-sig{font-size:10px;font-weight:700;padding:1px 7px;border:1px solid;border-radius:2px;display:inline-block;letter-spacing:.5px}
.pc-drow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)}
.pc-drow:last-child{border-bottom:none}
.pc-dlbl{font-size:12px;color:var(--text2)}
.pc-dval{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}

/* ── MARGIN ── */
.margin-nums{display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--line)}
.margin-num{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.margin-arrow{font-size:18px;color:var(--text3);padding:0 2px}
.margin-sig{display:flex;justify-content:space-between;align-items:center;padding:8px 0}

/* ── SLIDERS ── */
.seg{display:flex;border-bottom:1px solid var(--line);margin-bottom:2px}
.segb{flex:1;padding:8px 4px;border:none;background:transparent;cursor:pointer;
  font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.5px;
  border-bottom:2px solid transparent;transition:color .15s;margin-bottom:-1px}
.segb.on{color:var(--text);border-bottom-color:var(--info)}
.srow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.srow:last-child{border-bottom:none}
.srow-lbl{font-size:13px;color:var(--text2);width:106px;flex-shrink:0}
.srow-zone{font-size:10px;color:var(--text3);padding:1px 6px;border-left:2px solid var(--line2);
  width:68px;flex-shrink:0;text-align:center}
.srow-wrap{flex:1;display:flex;align-items:center;gap:10px}
.srow-wrap input[type=range]{flex:1;-webkit-appearance:none;height:2px;border-radius:1px;
  outline:none;cursor:pointer;background:var(--line2)}
.srow-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--text2);border:2px solid var(--bg);cursor:pointer}
.srow-num{font-size:13px;font-weight:700;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}

/* ── FOOTER ── */
.footer{padding:12px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--text3);line-height:1.8}

/* ── LOADING ── */
.ldwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 16px;gap:12px}
.ld-txt{font-size:13px;color:var(--text3);letter-spacing:1px}

/* ── UTIL ── */
.up{color:var(--up)}.dn{color:var(--dn)}.neu{color:var(--text3)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">Market Oracle</div>
    <div class="hdr-right">
      <div class="hdr-date" id="dateLabel"></div>
      <button class="rfsh" id="rfBtn" onclick="loadDeep()">↻</button>
    </div>
  </div>
  <div class="status">
    <div class="live-dot" id="liveDot"></div>
    <span id="liveLabel">連線中</span>
    <span id="mktState" class="mkt-tag closed">--</span>
    <span class="status-time" id="statusTime"></span>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchMkt('us',this)">🇺🇸 美股</button>

</div>

<div class="cnt" id="main">

</div>

<script>

function usMarketState(){
  var now=new Date(),jan=new Date(now.getFullYear(),0,1),jul=new Date(now.getFullYear(),6,1);
  var isDST=now.getTimezoneOffset()<Math.max(jan.getTimezoneOffset(),jul.getTimezoneOffset());
  var et=new Date(now.getTime()+(now.getTimezoneOffset()+(isDST?-4:-5)*60)*60000);
  var mins=et.getHours()*60+et.getMinutes(),dow=et.getDay();
  if(dow===0||dow===6)return"closed";
  if(mins>=240&&mins<570)return"pre";
  if(mins>=570&&mins<960)return"open";
  if(mins>=960&&mins<1200)return"post";
  return"closed";
}
var STATE_LBL={pre:"盤前",open:"盤中",post:"盤後",closed:"已收盤"};

var apiData={us:{},tw:{}},liveData={},curMkt="us",usGrp="情緒";
var mVals={putcall:.85,aaii:38,breadth:55};
var liveTimer=null,liveOK=false;

var US_AUTO=[
  {key:"vix",  lbl:"VIX",         zones:[{max:15,s:-1,t:"過度樂觀"},{max:20,s:2,t:"低波動"},{max:25,s:1,t:"正常"},{max:30,s:0,t:"警戒"},{max:40,s:-1,t:"恐慌"},{max:99,s:-2,t:"極端恐慌"}]},
  {key:"skew", lbl:"SKEW",        zones:[{max:115,s:2,t:"正常"},{max:130,s:1,t:"輕度風險"},{max:150,s:0,t:"中高風險"},{max:165,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端"}]},
  {key:"vvix", lbl:"VVIX",        zones:[{max:80,s:2,t:"極度平靜"},{max:100,s:1,t:"正常"},{max:120,s:0,t:"偏高"},{max:140,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端不確定"}]},
  {key:"fgi",  lbl:"Fear & Greed",zones:[{max:20,s:1,t:"極度恐慌"},{max:35,s:1,t:"恐慌"},{max:55,s:2,t:"中性"},{max:70,s:0,t:"貪婪"},{max:85,s:-1,t:"極度貪婪"},{max:100,s:-2,t:"過熱"}],direct:true},
  {key:"dxy",  lbl:"DXY",         zones:[{max:100,s:2,t:"弱美元"},{max:103,s:1,t:"中性偏弱"},{max:106,s:0,t:"中性"},{max:109,s:-1,t:"強美元"},{max:999,s:-2,t:"強美元高壓"}]},
  {key:"us10y",lbl:"美債 10Y",    zones:[{max:3.5,s:2,t:"低殖利率"},{max:4.0,s:1,t:"適中"},{max:4.5,s:0,t:"偏高"},{max:5.0,s:-1,t:"壓估值"},{max:99,s:-2,t:"過高危險"}]},
  {key:"gold", lbl:"黃金",        zones:[{max:-1,s:1,t:"下跌"},{max:0,s:2,t:"微跌中性"},{max:.5,s:1,t:"微漲中性"},{max:1.5,s:0,t:"上漲謹慎"},{max:99,s:-1,t:"急漲避險"}],usePct:true},
  {key:"oil",  lbl:"原油 WTI",    zones:[{max:-2,s:-1,t:"急跌"},{max:0,s:1,t:"微跌中性"},{max:1,s:2,t:"微漲中性"},{max:2.5,s:0,t:"上漲通膨"},{max:99,s:-1,t:"急漲通膨"}],usePct:true},
  {key:"rsi",  lbl:"大盤 RSI",    zones:[{max:30,s:1,t:"超賣"},{max:40,s:0,t:"偏弱"},{max:60,s:2,t:"健康"},{max:70,s:1,t:"偏強"},{max:80,s:0,t:"超買警示"},{max:100,s:-1,t:"強烈超買"}],direct:true},
  {key:"mfi",  lbl:"MFI",         zones:[{max:20,s:1,t:"超賣"},{max:40,s:0,t:"流出"},{max:60,s:2,t:"中性"},{max:80,s:1,t:"流入"},{max:100,s:-1,t:"超買"}],direct:true},
];
var US_MAN=[
  {key:"putcall",lbl:"Put/Call Ratio",min:.4,max:1.8,step:.01,zones:[{max:.6,s:-1,t:"過度貪婪"},{max:.85,s:1,t:"偏多"},{max:1.1,s:2,t:"均衡"},{max:1.3,s:0,t:"偏空"},{max:9,s:1,t:"極悲觀"}]},
  {key:"aaii",   lbl:"AAII 多頭%",   min:10,max:65, step:1,  zones:[{max:25,s:1,t:"極悲觀"},{max:35,s:1,t:"偏空"},{max:45,s:2,t:"正常"},{max:55,s:0,t:"偏熱"},{max:99,s:-1,t:"過熱"}]},

];
var TW_AUTO=[
  {key:"twd",   lbl:"台幣 / 美金",  zones:[{max:30,s:2,t:"台幣強勢"},{max:31,s:2,t:"偏強"},{max:32,s:1,t:"中性"},{max:33,s:0,t:"偏弱"},{max:34,s:-1,t:"台幣弱勢"},{max:99,s:-2,t:"台幣大貶"}]},
  {key:"twvix", lbl:"台股 VIX",     zones:[{max:15,s:2,t:"低波動"},{max:20,s:2,t:"正常"},{max:25,s:1,t:"偏高"},{max:30,s:0,t:"警戒"},{max:40,s:-1,t:"恐慌"},{max:99,s:-2,t:"極端恐慌"}]},
  {key:"rsi",   lbl:"台股 RSI",     zones:[{max:30,s:1,t:"超賣"},{max:40,s:0,t:"偏弱"},{max:60,s:2,t:"健康"},{max:70,s:1,t:"偏強"},{max:80,s:0,t:"超買"},{max:100,s:-1,t:"強烈超買"}],direct:true},
  {key:"mfi",   lbl:"MFI",          zones:[{max:20,s:1,t:"超賣"},{max:40,s:0,t:"流出"},{max:60,s:2,t:"中性"},{max:80,s:1,t:"流入"},{max:100,s:-1,t:"超買"}],direct:true},
];
var US_GROUPS={"情緒":["putcall","aaii"],"技術廣度":["breadth"]};
var IND_LIVE={vix:"^VIX",skew:"^SKEW",vvix:"^VVIX",gold:"GC=F",oil:"CL=F",dxy:"DX-Y.NYB",us10y:"^TNX"};
var VIX_Z=[{max:15,t:"過度樂觀",c:"var(--dn)"},{max:20,t:"低波動",c:"var(--up)"},{max:25,t:"正常",c:"var(--text2)"},{max:30,t:"警戒",c:"var(--warn)"},{max:40,t:"恐慌",c:"var(--dn)"},{max:999,t:"極端恐慌",c:"var(--dn)"}];
function vixZone(v){for(var z of VIX_Z)if(v<=z.max)return z;return VIX_Z[VIX_Z.length-1];}
function gz(ind,v){for(var i=0;i<ind.zones.length;i++)if(v<=ind.zones[i].max)return ind.zones[i];return ind.zones[ind.zones.length-1];}
function ss(s){
  if(s>=2) return{c:"var(--up)",bc:"var(--up)"};
  if(s===1)return{c:"var(--text2)",bc:"var(--line2)"};
  if(s===0)return{c:"var(--warn)",bc:"var(--warn)"};
  if(s===-1)return{c:"var(--dn)",bc:"var(--dn)"};
  return{c:"var(--dn)",bc:"var(--dn)"};
}
function sfInfo(r){
  if(r>=.75)return{lbl:"可持倉",   sub:"風險可控",  c:"var(--up)",  tr:"var(--up)"};
  if(r>=.55)return{lbl:"謹慎樂觀", sub:"整體偏多",  c:"var(--info)",tr:"var(--info)"};
  if(r>=.38)return{lbl:"控制倉位", sub:"多空分歧",  c:"var(--warn)",tr:"var(--warn)"};
  if(r>=.2) return{lbl:"考慮減碼", sub:"多項指標偏空",c:"var(--dn)",tr:"var(--dn)"};
  return{lbl:"高度警戒",sub:"建議大幅減碼",c:"var(--dn)",tr:"var(--dn)"};
}
function combo(data){
  var vix=liveData["^VIX"]?.price||data.vix?.price;
  var skew=liveData["^SKEW"]?.price||data.skew?.price;
  var vvix=liveData["^VVIX"]?.price||data.vvix?.price;
  if(!vix||!skew||!vvix)return{t:"數據載入中",d:"等待中",c:"var(--text3)"};
  if(skew>145&&vix<20)  return{t:"暗流湧動",d:"高SKEW + 低VIX，最危險組合",c:"var(--dn)"};
  if(skew>130&&vix>25&&vvix>120)return{t:"全面恐慌",d:"三指標同時偏高",c:"var(--dn)"};
  if(vvix>130)return{t:"極端不確定",d:"VVIX 暴高，走向難預測",c:"var(--warn)"};
  if(skew<120&&vix<20&&vvix<100)return{t:"市場平靜",d:"三指標均低，風險溢價正常",c:"var(--up)"};
  return{t:"正常波動",d:"無明顯異常組合",c:"var(--text2)"};
}
function getV(ind,data){
  var sym=IND_LIVE[ind.key];
  if(sym&&liveData[sym])return ind.usePct?liveData[sym].pct:liveData[sym].price;
  if(ind.direct)return data[ind.key]!=null?data[ind.key]:null;
  var d=data[ind.key];if(!d)return null;
  return ind.usePct?d.pct:d.price;
}
function calcTot(aI,mI,data){
  var t=0;
  aI.forEach(i=>{var v=getV(i,data);if(v!=null)t+=gz(i,v).s;});
  mI.forEach(i=>{t+=gz(i,mVals[i.key]).s;});
  return t;
}
function fmtN(n,d){if(n==null||isNaN(n))return"—";return parseFloat(n).toFixed(d||0);}
function fmtInt(n){if(n==null||isNaN(n))return"—";return parseInt(n).toLocaleString();}
function cc(n){return n>0?"var(--up)":n<0?"var(--dn)":"var(--text3)";}
function sgn(n){return n>0?"+":" ";}
function fmtP(p,dec){
  if(p==null)return"—";dec=dec||2;
  return p>=1000?p.toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec}):p.toFixed(dec);
}

// ── LIVE FETCH ──
function batchSyms(){
  if(curMkt==="us"){
    var s=[];
    [US_FUT,US_COM,US_VIX].forEach(g=>Object.values(g).forEach(f=>s.push(f.sym)));
    return s;
  }
  return Object.values(TW_LIVE).map(f=>f.sym);
}
async function fetchBatch(){
  try{
    var r=await fetch(BATCH_URL+"?syms="+batchSyms().join(","),{cache:"no-store"});
    var json=await r.json();
    var ok=false;
    batchSyms().forEach(sym=>{if(json[sym]){liveData[sym]=json[sym];ok=true;}});
    liveOK=ok;
  }catch{liveOK=false;}
  updateStatus();
  if(liveOK)updateAllRows();
}
function startLiveTimer(){
  if(liveTimer)clearInterval(liveTimer);
  fetchBatch();
  liveTimer=setInterval(fetchBatch,5000);
}
function updateStatus(){
  var dot=document.getElementById("liveDot");
  var lbl=document.getElementById("liveLabel");
  var st=document.getElementById("mktState");
  var tim=document.getElementById("statusTime");
  if(!dot)return;
  dot.className=liveOK?"live-dot":"live-dot off";
  lbl.textContent=liveOK?"即時":"連線中斷";
  if(tim)tim.textContent=new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  if(st&&curMkt==="us"){var s=usMarketState();st.className="mkt-tag "+s;st.textContent=STATE_LBL[s];}
  else if(st){st.className="mkt-tag closed";st.textContent="--";}
}

// ── ROW UPDATE ──
function updPrice(el,newVal,pct){
  if(!el)return;
  if(el.textContent===newVal)return;
  el.textContent=newVal;
  // 只改顏色，無 transition 外的動畫
  el.className=el.className.replace(/\bup\b|\bdn\b/g,"").trim();
  if(pct>0)el.classList.add("up");
  else if(pct<0)el.classList.add("dn");
}
function chgHtml(d){
  if(!d)return"<span class='neu'>—</span>";
  var sign=d.pct>=0?"▲":"▼",abs=Math.abs(d.price-d.prev).toFixed(2);
  return"<span class='"+(d.pct>=0?"up":"dn")+"'>"+sign+" "+abs+" ("+sgn(d.pct).trim()+d.pct.toFixed(2)+"%)</span>";
}
function updateFut(key,f){
  var d=liveData[f.sym];if(!d)return;
  var el=document.getElementById("fut_"+key);if(!el)return;
  var pe=el.querySelector("[data-price]");if(pe)updPrice(pe,fmtP(d.price,2),d.pct);
  var ce=el.querySelector("[data-chg]");if(ce)ce.innerHTML=chgHtml(d);
  var be=el.querySelector("[data-badge]");
  if(be&&d.state){
    var sm={pre:"pre",regular:"open",post:"post",postmarket:"post",premarket:"pre"};
    var sc=sm[(d.state||"").toLowerCase()]||"";
    be.className="mkt-badge "+(sc||"");
    be.textContent={pre:"盤前",open:"盤中",post:"盤後"}[sc]||"";
  }
}
function updateCom(key,f){
  var d=liveData[f.sym];if(!d)return;
  var el=document.getElementById("com_"+key);if(!el)return;
  var pe=el.querySelector("[data-price]");if(pe)updPrice(pe,fmtP(d.price,f.dec),d.pct);
  var ce=el.querySelector("[data-chg]");
  if(ce)ce.innerHTML=d?"<span class='"+(d.pct>=0?"up":"dn")+"'>"+(d.pct>=0?"▲":"▼")+" "+sgn(d.pct).trim()+d.pct.toFixed(2)+"%</span>":"—";
}
function updateVix(key,f){
  var d=liveData[f.sym];if(!d)return;
  var el=document.getElementById("vix_"+key);if(!el)return;
  var pe=el.querySelector("[data-price]");if(pe)updPrice(pe,fmtP(d.price,2),d.pct);
  var ce=el.querySelector("[data-chg]");
  if(ce)ce.innerHTML=d?"<span class='"+(d.pct>=0?"up":"dn")+"'>"+(d.pct>=0?"▲":"▼")+" "+sgn(d.pct).trim()+d.pct.toFixed(2)+"%</span>":"—";
  var ze=el.querySelector("[data-zone]");
  if(ze){var z=vixZone(d.price);ze.style.color=z.c;ze.style.borderColor=z.c;ze.textContent=z.t;}
}
function updateTW(key,f){
  var d=liveData[f.sym];if(!d)return;
  var el=document.getElementById("tw_"+key);if(!el)return;
  var pe=el.querySelector("[data-price]");if(pe)updPrice(pe,fmtP(d.price,2),d.pct);
  var ce=el.querySelector("[data-chg]");if(ce)ce.innerHTML=chgHtml(d);
}
function updateAllRows(){
  if(curMkt==="us"){
    Object.entries(US_FUT).forEach(([k,f])=>updateFut(k,f));
    Object.entries(US_COM).forEach(([k,f])=>updateCom(k,f));
    Object.entries(US_VIX).forEach(([k,f])=>updateVix(k,f));
    var cb=combo(apiData.us);
    var cv=document.getElementById("combo-val"),cd=document.getElementById("combo-desc");
    if(cv){cv.textContent=cb.t;cv.style.color=cb.c;}
    if(cd)cd.textContent=cb.d;
  }else{
    Object.entries(TW_LIVE).forEach(([k,f])=>updateTW(k,f));
  }
}

function renderNight(nd){
  if(!nd)return"";

  var diff="",diffPct="";
  if(night&&day){var dv=parseFloat(night.last)-parseFloat(day.last),dp=day.last>0?dv/parseFloat(day.last)*100:0;diff=(dv>0?"+":"")+dv.toFixed(0);diffPct=(dp>0?"+":"")+dp.toFixed(2)+"%";}
  return"<div class='sess'>"
    +"<div class='sess-half'><div class='sess-tag'>日盤 · "+date+"</div>"
    +(day?"<div class='sess-price'>"+day.last+"</div><div class='sess-chg' style='color:"+cc(dc)+"'>"+(dc>=0?"▲":"▼")+" "+day.change+" ("+day.changePct+")</div><div class='sess-vol'>成交 "+parseInt(day.volume).toLocaleString()+" 口</div>":"<div style='color:var(--text3);font-size:13px;padding-top:8px'>無數據</div>")

function pcSig(oi){
  if(oi==null)return{t:"—",c:"var(--text3)"};
  if(oi>130)return{t:"偏空",c:"var(--dn)"};
  if(oi>110)return{t:"中性偏空",c:"var(--warn)"};
  if(oi>90) return{t:"中性",c:"var(--text2)"};
  return{t:"偏多",c:"var(--up)"};
}
function diffSig(d){
  if(d==null)return{t:"—",c:"var(--text3)"};
  if(d>5) return{t:"夜盤偏空加重",c:"var(--dn)"};
  if(d>1) return{t:"夜盤略偏空",c:"var(--warn)"};
  if(d>-1)return{t:"無明顯變化",c:"var(--text2)"};
  if(d>-5)return{t:"夜盤略偏多",c:"var(--up)"};
  return{t:"夜盤偏多加重",c:"var(--up)"};
}
function renderPC(pc){
  if(!pc)return"<div style='color:var(--text3);font-size:12px;padding:10px 0'>數據載入中…</div>";
  var pd=pc.date?pc.date.slice(0,4)+"/"+pc.date.slice(4,6)+"/"+pc.date.slice(6,8):"";
  var pvd=pc.prevDate?pc.prevDate.slice(0,4)+"/"+pc.prevDate.slice(4,6)+"/"+pc.prevDate.slice(6,8):"昨日";
  if(pc.hasSession&&pc.night){
    var ds=pcSig(pc.day?.oiRatio),ns=pcSig(pc.night?.oiRatio),dfs=diffSig(pc.diff?.oiRatio);
    var h="<div class='pc-grid'>";
    [{d:pc.day,sig:ds,lbl:"日盤"},{d:pc.night,sig:ns,lbl:"夜盤"}].forEach(function(x){
      h+="<div class='pc-half'><div class='pc-sess'>"+x.lbl+" · "+pd+"</div>"
        +"<div class='pc-num' style='color:"+x.sig.c+"'>"+fmtN(x.d?.oiRatio,2)+"</div>"
        +"<div class='pc-sublbl'>OI 未平倉比</div>"
        +"<div style='font-size:13px;color:var(--text2);margin-bottom:8px'>成交量比 "+fmtN(x.d?.volRatio,2)+"</div>"
        +"<span class='pc-sig' style='color:"+x.sig.c+";border-color:"+x.sig.c+"'>"+x.sig.t+"</span>"
        +"</div>";
    });
    h+="</div>"
      +"<div class='pc-drow'><span class='pc-dlbl'>OI 差值（夜 − 日）</span><span class='pc-dval' style='color:"+cc(-(pc.diff?.oiRatio||0))+"'>"+(pc.diff?.oiRatio>=0?"+":"")+fmtN(pc.diff?.oiRatio,2)+"</span></div>"
      +"<div class='pc-drow'><span class='pc-dlbl'>成交量比 差值</span><span class='pc-dval' style='color:"+cc(-(pc.diff?.volRatio||0))+"'>"+(pc.diff?.volRatio>=0?"+":"")+fmtN(pc.diff?.volRatio,2)+"</span></div>"
      +"<div class='pc-drow'><span class='pc-dlbl'>夜盤情緒研判</span><span style='font-size:13px;font-weight:600;color:"+dfs.c+"'>"+dfs.t+"</span></div>";
    return h;
  }else{
    var cur=pc.day,prv=pc.prevDay,cs=pcSig(cur?.oiRatio),dc2=pc.dayChange;
    var h="<div style='font-size:11px;color:var(--text3);padding:6px 0 8px'>"+pd+" vs "+pvd+" · 日夜盤合計</div>";
    [{lbl:"OI 未平倉比",cv:cur?.oiRatio,pv:prv?.oiRatio,dv:dc2?.oiRatio},
     {lbl:"成交量比",cv:cur?.volRatio,pv:prv?.volRatio,dv:dc2?.volRatio}]

      var vc=pcSig(r.cv).c;

        +"<div style='font-size:11px;color:var(--text3)'>昨日 "+fmtN(r.pv,2)+(r.dv!=null?" · Δ <span style='color:"+cc(-r.dv)+"'>"+(r.dv>=0?"+":"")+fmtN(r.dv,2)+"</span>":"")+"</div></div>"

    });
    h+="<div class='pc-drow'><span class='pc-dlbl'>今日研判</span><span class='pc-sig' style='color:"+cs.c+";border-color:"+cs.c+"'>"+cs.t+"</span></div>";
    return h;
  }

  updateBanner();
}
function setGrp(g){usGrp=g;renderManPanel();}
function renderManPanel(){
  var p=document.getElementById("manPanel");if(!p)return;
  var h="<div class='seg'>";
  Object.keys(US_GROUPS).forEach(g=>{h+="<button class='segb"+(g===usGrp?" on":"")+"' onclick=\"setGrp('"+g+"')\">"+g+"</button>";});
  h+="</div>";
  (US_GROUPS[usGrp]||[]).forEach(k=>{var ind=US_MAN.find(i=>i.key===k);if(ind)h+=renderSlider(ind);});
  p.innerHTML=h;
}
function updateBanner(){
  var isUS=curMkt==="us";
  var aI=isUS?US_AUTO:TW_AUTO,mI=isUS?US_MAN:[];
  var data=isUS?apiData.us:apiData.tw;
  var mn=(aI.length+mI.length)*-2,mx=(aI.length+mI.length)*2;
  var tot=calcTot(aI,mI,data),r=(tot-mn)/(mx-mn),sf=sfInfo(r);
  var b=document.getElementById("signal-bar");if(b)b.style.background=sf.c;
  var v=document.getElementById("signal-verdict");if(v){v.textContent=sf.lbl;v.style.color=sf.c;}
  var s=document.getElementById("signal-sub");if(s)s.textContent=sf.sub;
  var f=document.getElementById("signal-fill");if(f){f.style.width=(r*100).toFixed(0)+"%";f.style.background=sf.tr;}
  var sc=document.getElementById("signal-score");if(sc){sc.textContent="評分 "+tot+" / "+mx;sc.style.color=sf.c;}
}

// ── MAIN RENDER ──
function render(mkt){
  var isUS=mkt==="us";
  var aI=isUS?US_AUTO:TW_AUTO,mI=isUS?US_MAN:[];
  var data=isUS?apiData.us:apiData.tw;
  var mn=(aI.length+mI.length)*-2,mx=(aI.length+mI.length)*2;
  var tot=calcTot(aI,mI,data),r=(tot-mn)/(mx-mn),sf=sfInfo(r);
  var cb=combo(data);

  var h="<div class='signal-row'>"
    +"<div class='signal-bar' id='signal-bar' style='background:"+sf.c+"'></div>"
    +"<div class='signal-body'>"
    +"<div class='signal-label'>神諭訊號</div>"
    +"<div class='signal-verdict' id='signal-verdict' style='color:"+sf.c+"'>"+sf.lbl+"</div>"
    +"<div class='signal-sub' id='signal-sub'>"+sf.sub+"</div>"
    +"<div class='signal-pbar'><div class='signal-fill' id='signal-fill' style='width:"+(r*100).toFixed(0)+"%;background:"+sf.tr+"'></div></div>"
    +"<div class='signal-score' id='signal-score' style='color:"+sf.c+"'>評分 "+tot+" / "+mx+"</div>"
    +"</div></div>";

  if(isUS){
    h+="<div class='combo-row' id='combo-box'>"
      +"<div class='combo-tag'>▲▼</div>"
      +"<div class='combo-body'>"
      +"<div class='combo-val' id='combo-val' style='color:"+cb.c+"'>"+cb.t+"</div>"
      +"<div class='combo-desc' id='combo-desc'>"+cb.d+"</div>"
      +"</div></div>";

    h+=slabel("美股期貨 · 即時");
    Object.entries(US_FUT).forEach(([k,f])=>h+=futRow(k,f));
    h+=slabel("商品報價 · 即時");
    Object.entries(US_COM).forEach(([k,f])=>h+=comRow(k,f));
    h+=slabel("波動率 · 即時");
    Object.entries(US_VIX).forEach(([k,f])=>h+=vixRow(k,f));
    h+=slabel("深度指標");
    h+=deepRows(aI,data);
    h+=slabel("手動輸入");
    h+="<div id='manPanel'></div>";
  }else{
    h+=slabel("台股即時行情");
    Object.entries(TW_LIVE).forEach(([k,f])=>h+=twRow(k,f));
    h+=slabel("台指期行情");
    h+=renderNight(data.night_data);
    h+=slabel("三大法人 · 現貨");
    h+=renderForeign(data.foreign_data);
    h+=slabel("三大法人 · 期貨淨部位");
    h+=renderFutInst(data.futures_data);
    h+=slabel("Put / Call Ratio");
    h+=renderPC(data.putcall_data);
    h+=slabel("融資餘額");
    h+=renderMargin(data.margin_data);
    h+=slabel("深度指標");
    h+=deepRows(aI,data);
  }

  h+="<div class='footer'>即時 5 秒 · 深度數據 15 分鐘"+(isUS?" · 手動指標可調整":" · 台股籌碼盤後更新")+"</div>";
  document.getElementById("main").innerHTML=h;
  if(isUS)renderManPanel();
  updateStatus();
}

function switchMkt(mkt,btn){
  curMkt=mkt;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  render(mkt);startLiveTimer();
}
async function loadDeep(){
  var btn=document.getElementById("rfBtn");if(btn)btn.classList.add("spin");
  try{
    var ctrl=new AbortController();setTimeout(()=>ctrl.abort(),15000);
    var res=await fetch(DEEP_URL,{cache:"no-store",signal:ctrl.signal});
    var json=await res.json();
    if(json&&json.us)apiData=json;else apiData={us:{},tw:{}};
  }catch{apiData={us:{},tw:{}};}
  if(btn)btn.classList.remove("spin");
  render(curMkt);
}

var d=new Date();
document.getElementById("dateLabel").textContent=
  d.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"short"});
loadDeep();startLiveTimer();
setInterval(loadDeep,15*60*1000);
</script>
