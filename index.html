<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Market Oracle</title>
<meta name="theme-color" content="#0d0d0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c1f;--bg4:#242428;
  --line:#2a2a2e;--line2:#3a3a3f;
  --text:#f0f0f2;--text2:#8a8a90;--text3:#4a4a50;
  --up:#00c48c;--dn:#ff4757;--warn:#ffa502;--info:#4a90d9;
  --up-bg:rgba(0,196,140,.1);--dn-bg:rgba(255,71,87,.1);--warn-bg:rgba(255,165,2,.1);
}
html,body{background:var(--bg);color:var(--text);min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif}
body{padding:0 0 80px;font-size:14px;line-height:1.5}

/* ── HEADER ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--line);padding:16px 16px 0;position:sticky;top:0;z-index:10}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.hdr-title span{color:var(--info)}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-time{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}
.rfsh{width:32px;height:32px;border:1px solid var(--line2);border-radius:8px;
  background:transparent;cursor:pointer;color:var(--text2);font-size:15px;
  display:flex;align-items:center;justify-content:center}
.rfsh:active{opacity:.5}
.rfsh.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STATUS ── */
.status{display:flex;align-items:center;gap:6px;padding:0 0 12px;font-size:11px;color:var(--text3)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--up);flex-shrink:0}
.dot.off{background:var(--text3)}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;letter-spacing:.3px}
.pill.open  {background:var(--up-bg);color:var(--up)}
.pill.pre   {background:var(--warn-bg);color:var(--warn)}
.pill.post  {background:rgba(74,144,217,.12);color:var(--info)}
.pill.closed{background:var(--bg3);color:var(--text3)}

/* ── TABS ── */
.tabs{display:flex;gap:0;margin:0 -16px;border-top:1px solid var(--line)}
.tab{flex:1;padding:10px 8px;border:none;background:transparent;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--text3);
  border-bottom:2px solid transparent;transition:color .15s;margin-bottom:-1px}
.tab.on{color:var(--text);border-bottom-color:var(--info)}

/* ── CONTENT ── */
.cnt{padding:0 16px}

/* ── SECTION ── */
.sec{margin-top:20px}
.sec-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line)}

/* ── ORACLE ── */
.oracle{background:var(--bg3);border-radius:12px;padding:16px;margin-top:16px;border:1px solid var(--line)}
.oracle-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.oracle-verdict{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px}
.oracle-sub{font-size:13px;color:var(--text2);margin-bottom:12px}
.oracle-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:6px}
.oracle-fill{height:100%;border-radius:2px;transition:width .5s ease}
.oracle-score{font-size:11px;color:var(--text3);text-align:right}

/* ── COMBO ── */
.combo{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.combo:last-child{border-bottom:none}
.combo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.combo-val{font-size:13px;font-weight:600}
.combo-desc{font-size:11px;color:var(--text2);margin-top:1px}

/* ── PRICE ROW ── */
.prow{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:none}
.prow-left{flex:1;min-width:0}
.prow-sym{font-size:13px;font-weight:600}
.prow-name{font-size:11px;color:var(--text3);margin-top:1px}
.prow-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.prow-price{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.prow-price.up{color:var(--up)}
.prow-price.dn{color:var(--dn)}
.prow-chg{font-size:11px;font-weight:600;min-width:82px;text-align:right}
.prow-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:2px;letter-spacing:.3px}
.prow-badge.open {background:var(--up-bg);color:var(--up)}
.prow-badge.pre  {background:var(--warn-bg);color:var(--warn)}
.prow-badge.post {background:rgba(74,144,217,.12);color:var(--info)}
.prow-zone{font-size:10px;padding:2px 7px;border-radius:4px;margin-left:4px;white-space:nowrap;font-weight:600}

/* ── DEEP ROW ── */
.drow{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
.drow:last-child{border-bottom:none}
.drow-lbl{font-size:13px;color:var(--text2);flex:1}
.drow-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;margin-right:8px}
.drow-zone{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap}

/* ── MANUAL INPUT ── */
.manual-item{padding:10px 0;border-bottom:1px solid var(--line)}
.manual-item:last-child{border-bottom:none}
.manual-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.manual-lbl{font-size:13px;font-weight:600}
.manual-status{display:flex;align-items:center;gap:6px}
.manual-val-display{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.manual-zone{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.manual-meta{font-size:10px;color:var(--text3);margin-bottom:6px}
.manual-ai-tag{font-size:9px;padding:1px 6px;border-radius:10px;background:rgba(74,144,217,.15);color:var(--info);font-weight:600;margin-left:4px}
.manual-input-row{display:flex;gap:6px;align-items:center}
.manual-input-row input{flex:1;background:var(--bg4);border:1px solid var(--line2);border-radius:8px;
  padding:7px 10px;font-size:14px;color:var(--text);outline:none;font-variant-numeric:tabular-nums}
.manual-input-row input:focus{border-color:var(--info)}
.manual-btn{padding:7px 14px;background:var(--info);border:none;border-radius:8px;
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.manual-btn:active{opacity:.7}
.manual-hint{font-size:10px;color:var(--text3);margin-top:4px}

/* ── CHIP TABLE ── */
.ct{width:100%;border-collapse:collapse}
.ct tr{border-bottom:1px solid var(--line)}
.ct tr:last-child{border-bottom:none}
.ct td{padding:8px 4px;font-size:13px;vertical-align:middle}
.ct-lbl{color:var(--text2)}
.ct-bar{width:44px;padding:0 6px}
.ct-bar-bg{height:2px;background:var(--bg4);position:relative;border-radius:1px}
.ct-bar-fill{height:100%;position:absolute;left:0;top:0;border-radius:1px}
.ct-val{font-size:13px;font-weight:700;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.ct-chg{font-size:10px;text-align:right;padding-left:6px;white-space:nowrap}
.ct-date{font-size:11px;color:var(--text3);padding:4px 0 6px}

/* ── SESSION ── */
.sess{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:8px;overflow:hidden;margin-bottom:4px}
.sess-half{background:var(--bg2);padding:12px}
.sess-tag{font-size:10px;color:var(--text3);letter-spacing:.5px;margin-bottom:8px;font-weight:600;text-transform:uppercase}
.sess-price{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px;letter-spacing:-.5px}
.sess-chg{font-size:12px;font-weight:600;margin-bottom:2px}
.sess-vol{font-size:10px;color:var(--text3)}
.sess-vs{font-size:10px;margin-top:3px}

/* ── P/C ── */
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:8px;overflow:hidden;margin-bottom:8px}
.pc-half{background:var(--bg2);padding:12px}
.pc-sess{font-size:10px;color:var(--text3);letter-spacing:.5px;margin-bottom:8px;font-weight:600;text-transform:uppercase}
.pc-num{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px;letter-spacing:-.5px}
.pc-sub{font-size:11px;color:var(--text3);margin-bottom:6px}
.pc-sig{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block}
.pc-drow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)}
.pc-drow:last-child{border-bottom:none}
.pc-dlbl{font-size:12px;color:var(--text2)}
.pc-dval{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}

/* ── MARGIN ── */
.margin-flow{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line)}
.margin-num{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.margin-arrow{font-size:18px;color:var(--text3)}
.margin-sig{display:flex;justify-content:space-between;align-items:center;padding:8px 0}

/* ── FOOTER ── */
.footer{padding:14px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--text3);line-height:1.9}

/* ── LOADING ── */
.ldwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 16px;gap:10px}
.ld-txt{font-size:13px;color:var(--text3)}

/* ── UTILS ── */
.up{color:var(--up)}.dn{color:var(--dn)}.neu{color:var(--text3)}
.tag-up  {background:var(--up-bg);color:var(--up)}
.tag-dn  {background:var(--dn-bg);color:var(--dn)}
.tag-warn{background:var(--warn-bg);color:var(--warn)}
.tag-neu {background:var(--bg4);color:var(--text2)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">Market <span>Oracle</span></div>
    <div class="hdr-right">
      <div class="hdr-time" id="dateLabel"></div>
      <button class="rfsh" id="rfBtn" onclick="loadDeep()">↻</button>
    </div>
  </div>
  <div class="status">
    <div class="dot" id="liveDot"></div>
    <span id="liveLabel">連線中</span>
    <span class="pill closed" id="mktState">--</span>
    <span style="margin-left:auto" id="statusTime"></span>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchMkt('us',this)">🇺🇸 美股</button>
    <button class="tab" onclick="switchMkt('tw',this)">🇹🇼 台股</button>
  </div>
</div>

<div class="cnt" id="main">
  <div class="ldwrap"><div class="ld-txt">載入中...</div></div>
</div>

<script>
var WORKER   ="https://market-proxy.q0900027293.workers.dev";
var BATCH_URL=WORKER+"/batch";
var DEEP_URL =WORKER+"/";

var US_FUT={es:{sym:"ES=F",short:"ES",name:"S&P 500"},nq:{sym:"NQ=F",short:"NQ",name:"Nasdaq 100"},ym:{sym:"YM=F",short:"YM",name:"Dow Jones"},rty:{sym:"RTY=F",short:"RTY",name:"Russell 2000"}};
var US_COM={gold:{sym:"GC=F",short:"黃金",dec:2},oil:{sym:"CL=F",short:"原油 WTI",dec:2},dxy:{sym:"DX-Y.NYB",short:"美元指數",dec:3},us10y:{sym:"^TNX",short:"美債 10Y",dec:3}};
var US_VIX={vix:{sym:"^VIX",short:"VIX"},vvix:{sym:"^VVIX",short:"VVIX"},skew:{sym:"^SKEW",short:"SKEW"}};
var TW_LIVE={twii:{sym:"^TWII",short:"TWII",name:"加權指數"},otc:{sym:"^TWOII",short:"OTC",name:"櫃買指數"},txf:{sym:"TXF=F",short:"TXF",name:"台指期貨"}};

// 手動指標本地儲存
var MANUAL_KEYS=["putcall","aaii","breadth"];
var manualData={};
MANUAL_KEYS.forEach(k=>{
  try{
    var s=localStorage.getItem("manual_"+k);
    if(s) manualData[k]=JSON.parse(s);
  }catch{}
});
function saveManual(key,val){
  var obj={val:parseFloat(val),updatedAt:new Date().toISOString(),source:"manual"};
  manualData[key]=obj;
  try{localStorage.setItem("manual_"+key,JSON.stringify(obj));}catch{}
}
function setAIManual(key,val,fetchedAt){
  if(val===null||val===undefined) return;
  var obj={val:parseFloat(val),updatedAt:fetchedAt||new Date().toISOString(),source:"ai"};
  manualData[key]=obj;
  try{localStorage.setItem("manual_"+key,JSON.stringify(obj));}catch{}
}
function getManualVal(key){ return manualData[key]?.val??null; }
function fmtUpdated(iso){
  if(!iso) return"未設定";
  var d=new Date(iso),now=new Date();
  var diff=Math.floor((now-d)/60000);
  if(diff<1) return"剛剛";
  if(diff<60) return diff+"分鐘前";
  if(diff<1440) return Math.floor(diff/60)+"小時前";
  return d.toLocaleDateString("zh-TW",{month:"2-digit",day:"2-digit"});
}

function usMarketState(){
  var now=new Date(),jan=new Date(now.getFullYear(),0,1),jul=new Date(now.getFullYear(),6,1);
  var isDST=now.getTimezoneOffset()<Math.max(jan.getTimezoneOffset(),jul.getTimezoneOffset());
  var et=new Date(now.getTime()+(now.getTimezoneOffset()+(isDST?-4:-5)*60)*60000);
  var mins=et.getHours()*60+et.getMinutes(),dow=et.getDay();
  if(dow===0||dow===6)return"closed";
  if(mins>=240&&mins<570)return"pre";
  if(mins>=570&&mins<960)return"open";
  if(mins>=960&&mins<1200)return"post";
  return"closed";
}
var STATE_LBL={pre:"盤前",open:"盤中",post:"盤後",closed:"已收盤"};

var apiData={us:{},tw:{}},liveData={},curMkt="us",liveTimer=null,liveOK=false;

// ── ZONES ──
var US_AUTO=[
  {key:"vix",  lbl:"VIX",         zones:[{max:15,s:-1,t:"過度樂觀"},{max:20,s:2,t:"低波動"},{max:25,s:1,t:"正常"},{max:30,s:0,t:"警戒"},{max:40,s:-1,t:"恐慌"},{max:99,s:-2,t:"極端恐慌"}]},
  {key:"skew", lbl:"SKEW",        zones:[{max:115,s:2,t:"正常"},{max:130,s:1,t:"輕度風險"},{max:150,s:0,t:"中高風險"},{max:165,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端"}]},
  {key:"vvix", lbl:"VVIX",        zones:[{max:80,s:2,t:"極度平靜"},{max:100,s:1,t:"正常"},{max:120,s:0,t:"偏高"},{max:140,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端不確定"}]},
  {key:"fgi",  lbl:"Fear & Greed",zones:[{max:20,s:1,t:"極度恐慌"},{max:35,s:1,t:"恐慌"},{max:55,s:2,t:"中性"},{max:70,s:0,t:"貪婪"},{max:85,s:-1,t:"極度貪婪"},{max:100,s:-2,t:"過熱"}],direct:true},
  {key:"dxy",  lbl:"DXY",         zones:[{max:100,s:2,t:"弱美元"},{max:103,s:1,t:"中性偏弱"},{max:106,s:0,t:"中性"},{max:109,s:-1,t:"強美元"},{max:999,s:-2,t:"強美元高壓"}]},
  {key:"us10y",lbl:"美債 10Y",    zones:[{max:3.5,s:2,t:"低殖利率"},{max:4.0,s:1,t:"適中"},{max:4.5,s:0,t:"偏高"},{max:5.0,s:-1,t:"壓估值"},{max:99,s:-2,t:"過高危險"}]},
  {key:"gold", lbl:"黃金",        zones:[{max:-1,s:1,t:"下跌"},{max:0,s:2,t:"微跌中性"},{max:.5,s:1,t:"微漲中性"},{max:1.5,s:0,t:"上漲謹慎"},{max:99,s:-1,t:"急漲避險"}],usePct:true},
  {key:"oil",  lbl:"原油 WTI",    zones:[{max:-2,s:-1,t:"急跌"},{max:0,s:1,t:"微跌中性"},{max:1,s:2,t:"微漲中性"},{max:2.5,s:0,t:"上漲通膨"},{max:99,s:-1,t:"急漲通膨"}],usePct:true},
  {key:"rsi",  lbl:"大盤 RSI",    zones:[{max:30,s:1,t:"超賣"},{max:40,s:0,t:"偏弱"},{max:60,s:2,t:"健康"},{max:70,s:1,t:"偏強"},{max:80,s:0,t:"超買警示"},{max:100,s:-1,t:"強烈超買"}],direct:true},
  {key:"mfi",  lbl:"MFI",         zones:[{max:20,s:1,t:"超賣"},{max:40,s:0,t:"流出"},{max:60,s:2,t:"中性"},{max:80,s:1,t:"流入"},{max:100,s:-1,t:"超買"}],direct:true},
];
var US_MANUAL_DEFS=[
  {key:"putcall",lbl:"Put/Call Ratio",placeholder:"例：0.85",zones:[{max:.6,s:-1,t:"過度貪婪"},{max:.85,s:1,t:"偏多"},{max:1.1,s:2,t:"均衡"},{max:1.3,s:0,t:"偏空"},{max:9,s:1,t:"極悲觀"}],hint:"CBOE 每日更新"},
  {key:"aaii",   lbl:"AAII 多頭%",   placeholder:"例：38",  zones:[{max:25,s:1,t:"極悲觀"},{max:35,s:1,t:"偏空"},{max:45,s:2,t:"正常"},{max:55,s:0,t:"偏熱"},{max:99,s:-1,t:"過熱"}],hint:"AAII 每週更新（週四）"},
  {key:"breadth",lbl:"市場廣度%",    placeholder:"例：55",  zones:[{max:35,s:-2,t:"多數股跌"},{max:45,s:0,t:"偏弱"},{max:55,s:2,t:"均衡"},{max:65,s:1,t:"多頭強勢"},{max:100,s:0,t:"過度擴張"}],hint:"NYSE 上漲股% "},
];
var TW_AUTO=[
  {key:"twd",   lbl:"台幣 / 美金",  zones:[{max:30,s:2,t:"台幣強勢"},{max:31,s:2,t:"偏強"},{max:32,s:1,t:"中性"},{max:33,s:0,t:"偏弱"},{max:34,s:-1,t:"台幣弱勢"},{max:99,s:-2,t:"台幣大貶"}]},
  {key:"twvix", lbl:"台股 VIX",     zones:[{max:15,s:2,t:"低波動"},{max:20,s:2,t:"正常"},{max:25,s:1,t:"偏高"},{max:30,s:0,t:"警戒"},{max:40,s:-1,t:"恐慌"},{max:99,s:-2,t:"極端恐慌"}]},
  {key:"rsi",   lbl:"台股 RSI",     zones:[{max:30,s:1,t:"超賣"},{max:40,s:0,t:"偏弱"},{max:60,s:2,t:"健康"},{max:70,s:1,t:"偏強"},{max:80,s:0,t:"超買"},{max:100,s:-1,t:"強烈超買"}],direct:true},
  {key:"mfi",   lbl:"MFI",          zones:[{max:20,s:1,t:"超賣"},{max:40,s:0,t:"流出"},{max:60,s:2,t:"中性"},{max:80,s:1,t:"流入"},{max:100,s:-1,t:"超買"}],direct:true},
];
var IND_LIVE={vix:"^VIX",skew:"^SKEW",vvix:"^VVIX",gold:"GC=F",oil:"CL=F",dxy:"DX-Y.NYB",us10y:"^TNX"};
var VIX_Z=[{max:15,t:"過度樂觀",tc:"var(--dn)",bg:"var(--dn-bg)"},{max:20,t:"低波動",tc:"var(--up)",bg:"var(--up-bg)"},{max:25,t:"正常",tc:"var(--text2)",bg:"var(--bg4)"},{max:30,t:"警戒",tc:"var(--warn)",bg:"var(--warn-bg)"},{max:40,t:"恐慌",tc:"var(--dn)",bg:"var(--dn-bg)"},{max:999,t:"極端恐慌",tc:"var(--dn)",bg:"var(--dn-bg)"}];
function vixZone(v){for(var z of VIX_Z)if(v<=z.max)return z;return VIX_Z[VIX_Z.length-1];}
function gz(ind,v){for(var i=0;i<ind.zones.length;i++)if(v<=ind.zones[i].max)return ind.zones[i];return ind.zones[ind.zones.length-1];}
function st(s){
  if(s>=2) return{tc:"var(--up)",  bg:"var(--up-bg)"};
  if(s===1)return{tc:"var(--text2)",bg:"var(--bg4)"};
  if(s===0)return{tc:"var(--warn)",bg:"var(--warn-bg)"};
  return{tc:"var(--dn)",bg:"var(--dn-bg)"};
}
function sfInfo(r){
  if(r>=.75)return{lbl:"可持倉",   sub:"風險可控，整體偏多",  c:"var(--up)",  tr:"var(--up)"};
  if(r>=.55)return{lbl:"謹慎樂觀", sub:"整體偏多，留意弱項",  c:"var(--info)",tr:"var(--info)"};
  if(r>=.38)return{lbl:"控制倉位", sub:"多空分歧，建議觀望",  c:"var(--warn)",tr:"var(--warn)"};
  if(r>=.2) return{lbl:"考慮減碼", sub:"多項指標偏空",        c:"var(--dn)",  tr:"var(--dn)"};
  return{lbl:"高度警戒",sub:"建議大幅減碼",c:"var(--dn)",tr:"var(--dn)"};
}
function combo(data){
  var vix=liveData["^VIX"]?.price||data.vix?.price;
  var skew=liveData["^SKEW"]?.price||data.skew?.price;
  var vvix=liveData["^VVIX"]?.price||data.vvix?.price;
  if(!vix||!skew||!vvix)return{t:"數據載入中",d:"等待中",c:"var(--text3)"};
  if(skew>145&&vix<20)  return{t:"暗流湧動",d:"高SKEW + 低VIX，最危險組合",c:"var(--dn)"};
  if(skew>130&&vix>25&&vvix>120)return{t:"全面恐慌",d:"三指標同時偏高",c:"var(--dn)"};
  if(vvix>130)return{t:"極端不確定",d:"VVIX 暴高，走向難預測",c:"var(--warn)"};
  if(skew<120&&vix<20&&vvix<100)return{t:"市場平靜",d:"三指標均低，風險溢價正常",c:"var(--up)"};
  return{t:"正常波動",d:"無明顯異常組合",c:"var(--text2)"};
}
function getV(ind,data){
  var sym=IND_LIVE[ind.key];
  if(sym&&liveData[sym])return ind.usePct?liveData[sym].pct:liveData[sym].price;
  if(ind.direct)return data[ind.key]!=null?data[ind.key]:null;
  var d=data[ind.key];if(!d)return null;
  return ind.usePct?d.pct:d.price;
}
function calcTot(aI,mI,data){
  var tot=0;
  aI.forEach(i=>{var v=getV(i,data);if(v!=null)tot+=gz(i,v).s;});
  mI.forEach(i=>{var v=getManualVal(i.key);if(v!=null)tot+=gz(i,v).s;});
  return tot;
}
function fmtN(n,d){if(n==null||isNaN(n))return"—";return parseFloat(n).toFixed(d||0);}
function fmtInt(n){if(n==null||isNaN(n))return"—";return parseInt(n).toLocaleString();}
function cc(n){return n>0?"var(--up)":n<0?"var(--dn)":"var(--text3)";}
function sgn(n){return n>0?"+":"";}
function fmtP(p,dec){
  if(p==null)return"—";dec=dec||2;
  return p>=1000?p.toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec}):p.toFixed(dec);
}

// ── LIVE FETCH ──
function batchSyms(){
  var s=[];[US_FUT,US_COM,US_VIX].forEach(g=>Object.values(g).forEach(f=>s.push(f.sym)));
  if(curMkt==="tw") s.push("TXF=F");
  return s;
}
async function fetchBatch(){
  try{
    var r=await fetch(BATCH_URL+"?syms="+batchSyms().join(","),{cache:"no-store"});
    var json=await r.json();
    var ok=false;
    batchSyms().forEach(sym=>{if(json[sym]){liveData[sym]=json[sym];ok=true;}});
    liveOK=ok;
  }catch{liveOK=false;}
  updateStatus();
  if(liveOK)updateAllRows();
}
function startLiveTimer(){
  if(liveTimer)clearInterval(liveTimer);
  fetchBatch();
  liveTimer=setInterval(fetchBatch,5000);
}
function updateStatus(){
  var dot=document.getElementById("liveDot");
  var lbl=document.getElementById("liveLabel");
  var st2=document.getElementById("mktState");
  var tim=document.getElementById("statusTime");
  if(!dot)return;
  dot.className=liveOK?"dot":"dot off";
  lbl.textContent=liveOK?"即時":"連線中斷";
  if(tim)tim.textContent=new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  if(st2&&curMkt==="us"){var s=usMarketState();st2.className="pill "+s;st2.textContent=STATE_LBL[s];}
  else if(st2){st2.className="pill closed";st2.textContent="--";}
}

  if(!el||el.textContent===newVal)return;

  if(pct>0)el.classList.add("up");else if(pct<0)el.classList.add("dn");

  if(!d)return"<span class='neu'>—</span>";

    Object.entries(US_VIX).forEach(([k,f])=>updateVix(k,f));
    var cb=combo(apiData.us);

    Object.entries(TW_LIVE).forEach(([k,f])=>updateTW(k,f));

function pcSig(oi){
  if(oi==null)return{t:"—",tc:"var(--text3)",bg:"var(--bg4)"};

   {n:"投信 台指",v:fut.txf?.trust,chg:fut.txf?.trust_chg},
   {n:"自營 台指",v:fut.txf?.dealer,chg:fut.txf?.dealer_chg}]
  .forEach(function(r){
    var c=r.v!=null?cc(r.v):"var(--text3)";
    var chg=r.chg!=null?"<span style='color:"+cc(r.chg)+"'>"+(r.chg>0?"▲":"▼")+Math.abs(r.chg).toLocaleString()+"</span>":"";
    h+="<tr><td class='ct-lbl'>"+r.n+"</td><td class='ct-chg'>"+chg+"</td>"
      +"<td class='ct-val' style='color:"+c+"'>"+(r.v>=0?"+":"")+fmtInt(r.v)+"</td></tr>";
  });
  return h+"</table>";
}
function renderMargin(md){
  if(!md||md.margin==null)return"<div style='color:var(--text3);font-size:12px;padding:10px 0'>數據載入中…</div>";
  var mdate=md.date?md.date.slice(0,4)+"/"+md.date.slice(4,6)+"/"+md.date.slice(6,8):"";
  var isDown=md.marginChg<0;
  return"<div class='ct-date'>"+mdate+"</div>"
    +"<div class='margin-flow'>"
    +"<div><div style='font-size:11px;color:var(--text3);margin-bottom:2px'>前日餘額</div><div class='margin-num' style='color:var(--text2);font-size:17px'>"+fmtN(md.marginPrev,1)+" 億</div></div>"
    +"<div class='margin-arrow'>"+(isDown?"↘":"↗")+"</div>"
    +"<div><div style='font-size:11px;color:var(--text3);margin-bottom:2px'>今日餘額</div><div class='margin-num'>"+fmtN(md.margin,1)+" 億</div></div>"
    +"</div>"
    +"<div class='margin-sig'>"
    +"<span style='font-size:12px;color:"+(isDown?"var(--up)":"var(--dn)")+"'>"+(isDown?"融資減少，偏多訊號":"融資增加，注意風險")+"</span>"
    +"<span style='font-size:13px;font-weight:700;color:"+cc(md.marginChg)+"'>"+(md.marginChg>=0?"+":"")+fmtN(md.marginChg,1)+" 億 ("+(md.marginChgPct>=0?"+":"")+fmtN(md.marginChgPct,2)+"%)</span>"
    +"</div>";
}

// ── BANNER UPDATE ──
function updateBanner(){
  var isUS=curMkt==="us";
  var aI=isUS?US_AUTO:TW_AUTO,mI=isUS?US_MANUAL_DEFS:[];
  var data=isUS?apiData.us:apiData.tw;
  var mn=(aI.length+mI.length)*-2,mx=(aI.length+mI.length)*2;
  var tot=calcTot(aI,mI,data),r=(tot-mn)/(mx-mn),sf=sfInfo(r);
  var b=document.getElementById("oracle");if(!b)return;
  b.style.borderColor=sf.c+"44";
  document.getElementById("oracle-verdict").textContent=sf.lbl;
  document.getElementById("oracle-verdict").style.color=sf.c;
  document.getElementById("oracle-sub").textContent=sf.sub;
  document.getElementById("oracle-fill").style.width=(r*100).toFixed(0)+"%";
  document.getElementById("oracle-fill").style.background=sf.tr;
  document.getElementById("oracle-score").textContent="評分 "+tot+" / "+mx;
  document.getElementById("oracle-score").style.color=sf.c;
}

// ── MAIN RENDER ──
function render(mkt){
  var isUS=mkt==="us";
  var aI=isUS?US_AUTO:TW_AUTO,mI=isUS?US_MANUAL_DEFS:[];
  var data=isUS?apiData.us:apiData.tw;
  var mn=(aI.length+mI.length)*-2,mx=(aI.length+mI.length)*2;
  var tot=calcTot(aI,mI,data),r=(tot-mn)/(mx-mn),sf=sfInfo(r);
  var cb=combo(data);

  var h="<div class='oracle' id='oracle' style='border-color:"+sf.c+"44'>"
    +"<div class='oracle-label'>神諭訊號</div>"
    +"<div class='oracle-verdict' id='oracle-verdict' style='color:"+sf.c+"'>"+sf.lbl+"</div>"
    +"<div class='oracle-sub' id='oracle-sub'>"+sf.sub+"</div>"
    +"<div class='oracle-bar'><div class='oracle-fill' id='oracle-fill' style='width:"+(r*100).toFixed(0)+"%;background:"+sf.tr+"'></div></div>"
    +"<div class='oracle-score' id='oracle-score' style='color:"+sf.c+"'>評分 "+tot+" / "+mx+"</div>"
    +"</div>";

  if(isUS){
    h+="<div class='sec'>"
      +"<div class='combo' id='combo-box'>"
      +"<div class='combo-dot' style='background:"+cb.c+"'></div>"
      +"<div><div class='combo-val' id='combo-val' style='color:"+cb.c+"'>"+cb.t+"</div>"
      +"<div class='combo-desc' id='combo-desc'>"+cb.d+"</div></div>"
      +"</div></div>";

    h+="<div class='sec'>"+secTitle("美股期貨 · 即時");
    Object.entries(US_FUT).forEach(([k,f])=>h+=futRow(k,f));
    h+="</div>";

    h+="<div class='sec'>"+secTitle("商品報價 · 即時");
    Object.entries(US_COM).forEach(([k,f])=>h+=comRow(k,f));
    h+="</div>";

    h+="<div class='sec'>"+secTitle("波動率 · 即時");
    Object.entries(US_VIX).forEach(([k,f])=>h+=vixRow(k,f));
    h+="</div>";

    h+="<div class='sec'>"+secTitle("深度指標 · 自動")
      +deepRows(aI,data)+"</div>";

    h+="<div class='sec'>"+secTitle("情緒指標 · 盤後更新");
    mI.forEach(def=>h+=manualItem(def));
    h+="</div>";

  }else{
    h+="<div class='sec'>"+secTitle("台股即時行情");
    Object.entries(TW_LIVE).forEach(([k,f])=>h+=twRow(k,f));
    h+="</div>";

    h+="<div class='sec'>"+secTitle("三大法人 · 現貨")+renderForeign(data.foreign_data)+"</div>";
    h+="<div class='sec'>"+secTitle("三大法人 · 期貨淨部位")+renderFutInst(data.futures_data)+"</div>";
    h+="<div class='sec'>"+secTitle("Put / Call Ratio")+renderPC(data.putcall_data)+"</div>";
    h+="<div class='sec'>"+secTitle("融資餘額")+renderMargin(data.margin_data)+"</div>";
    h+="<div class='sec'>"+secTitle("深度指標")+deepRows(aI,data)+"</div>";
  }

  h+="<div class='footer'>即時 5 秒 · 深度數據 15 分鐘"+(isUS?" · 情緒指標支援 AI 自動抓取":" · 台股籌碼盤後更新")+"</div>";
  document.getElementById("main").innerHTML=h;
  updateStatus();
}

function switchMkt(mkt,btn){
  curMkt=mkt;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  render(mkt);startLiveTimer();
}
async function loadDeep(){
  var btn=document.getElementById("rfBtn");if(btn)btn.classList.add("spin");
  try{
    var ctrl=new AbortController();setTimeout(()=>ctrl.abort(),15000);
    var res=await fetch(DEEP_URL,{cache:"no-store",signal:ctrl.signal});
    var json=await res.json();
    if(json&&json.us){
      apiData=json;
      // 如果 Worker 有 AI 解析結果，自動更新本地
      if(json.us.aaii!=null)    setAIManual("aaii",   json.us.aaii,    json.us.ai_fetched_at);
      if(json.us.breadth!=null) setAIManual("breadth",json.us.breadth, json.us.ai_fetched_at);
      if(json.us.putcall!=null) setAIManual("putcall",json.us.putcall, json.us.ai_fetched_at);
    }else apiData={us:{},tw:{}};
  }catch{apiData={us:{},tw:{}};}
  if(btn)btn.classList.remove("spin");
  render(curMkt);
}

var d=new Date();
document.getElementById("dateLabel").textContent=
  d.toLocaleDateString("zh-TW",{month:"2-digit",day:"2-digit",weekday:"short"});
loadDeep();startLiveTimer();
setInterval(loadDeep,15*60*1000);
</script>
