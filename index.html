<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MARKET ORACLE</title>
<meta name="theme-color" content="#020b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c0:#020b14;--c1:#041525;--c2:#061e30;--c3:#0a2840;
  --cyan:#00d4ff;--cyan2:#00aacc;--cyan3:#007799;--cyandim:rgba(0,212,255,.12);
  --blue:#0066ff;--blue2:#0044cc;
  --teal:#00ffcc;--teal2:#00ccaa;
  --up:#00ff88;--dn:#ff3366;--warn:#ffaa00;--neu:rgba(0,212,255,.4);
  --text:#cceeff;--text2:rgba(204,238,255,.6);--text3:rgba(204,238,255,.3);
  --border:rgba(0,212,255,.15);--border2:rgba(0,212,255,.35);
  --glow:0 0 12px rgba(0,212,255,.3);--glow2:0 0 20px rgba(0,212,255,.5);
}
html,body{background:var(--c0);color:var(--text);min-height:100vh;font-family:'Rajdhani',sans-serif}
body{padding:0 0 80px;background-image:
  repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.015) 2px,rgba(0,212,255,.015) 3px),
  repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(0,212,255,.02) 60px,rgba(0,212,255,.02) 61px),
  radial-gradient(ellipse at 50% 0%,rgba(0,100,200,.15) 0%,transparent 70%)}

/* ── SCANLINE OVERLAY ── */
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px)}

/* ── HEADER ── */
.hdr{padding:16px 16px 0;position:relative}
.hdr-top-line{height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);margin-bottom:14px;box-shadow:var(--glow)}
.hdr-sys{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.hdr-left{display:flex;flex-direction:column;gap:3px}
.sys-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cyan3);letter-spacing:3px}
.hdr-title{font-family:'Share Tech Mono',monospace;font-size:26px;font-weight:400;color:var(--cyan);
  text-shadow:0 0 20px var(--cyan),0 0 40px rgba(0,212,255,.4);letter-spacing:4px}
.hdr-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:2px}
.rfsh{width:36px;height:36px;border:1px solid var(--border2);border-radius:2px;background:var(--c1);cursor:pointer;
  color:var(--cyan);font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;box-shadow:var(--glow)}
.rfsh:active{transform:scale(.9)}
.rfsh.spin{animation:spin .7s linear infinite}

/* ── STATUS BAR ── */
.status-bar{display:flex;align-items:center;gap:10px;padding:8px 0 12px;font-family:'Share Tech Mono',monospace;font-size:9px;
  color:var(--text3);letter-spacing:.5px;border-bottom:1px solid var(--border);margin-bottom:12px}
.pulse-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:pulseDot 1.2s ease-in-out infinite}
.pulse-dot.off{background:#333;animation:none}
@keyframes pulseDot{0%,100%{box-shadow:0 0 3px var(--cyan);opacity:.4}50%{box-shadow:0 0 8px var(--cyan),0 0 16px var(--cyan);opacity:1}}
.freq-tag{padding:1px 6px;border:1px solid var(--cyan3);color:var(--cyan);font-size:8px;letter-spacing:1px}
.mkt-tag{padding:1px 8px;font-size:8px;font-weight:600;letter-spacing:2px}
.mkt-tag.open {border:1px solid var(--up);color:var(--up)}
.mkt-tag.pre  {border:1px solid var(--warn);color:var(--warn)}
.mkt-tag.post {border:1px solid var(--cyan);color:var(--cyan)}
.mkt-tag.closed{border:1px solid #444;color:#555}
.status-time{margin-left:auto;color:var(--cyan2)}

/* ── TABS ── */
.tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);position:relative;overflow:hidden}
.tabs::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.5}
.tab{flex:1;padding:10px;border:none;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;
  background:transparent;color:var(--text3);transition:all .2s;letter-spacing:2px;border-right:1px solid var(--border)}
.tab:last-child{border-right:none}
.tab.on{background:rgba(0,212,255,.08);color:var(--cyan);box-shadow:inset 0 -2px 0 var(--cyan),0 0 12px rgba(0,212,255,.15)}

/* ── CONTENT ── */
.cnt{padding:0 16px}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;gap:10px;margin:20px 0 10px}
.sh-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.sh-text{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cyan2);letter-spacing:3px;white-space:nowrap}
.sh-dot{width:4px;height:4px;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

/* ── ORACLE BANNER ── */
.oracle{padding:16px;margin-bottom:16px;position:relative;overflow:hidden;border-left:2px solid var(--cyan)}
.oracle::before{content:'';position:absolute;top:0;left:0;bottom:0;width:2px;
  background:linear-gradient(180deg,transparent,var(--cyan),transparent);animation:scanV 3s linear infinite}
@keyframes scanV{0%{background-position:0 -100%}100%{background-position:0 200%}}
.oracle-sys{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--cyan3);letter-spacing:3px;margin-bottom:6px}
.oracle-verdict{font-family:'Share Tech Mono',monospace;font-size:20px;letter-spacing:3px;margin-bottom:4px;line-height:1.2}
.oracle-sub{font-size:13px;color:var(--text2);letter-spacing:.5px;margin-bottom:12px}
.oracle-bar{height:2px;background:rgba(0,212,255,.1);margin-bottom:4px;position:relative;overflow:hidden}
.oracle-fill{height:100%;position:absolute;left:0;top:0;transition:width .8s cubic-bezier(.4,0,.2,1)}
.oracle-fill::after{content:'';position:absolute;right:0;top:-2px;bottom:-2px;width:3px;background:inherit;
  filter:blur(2px);opacity:.8}
.oracle-score{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);text-align:right;letter-spacing:1px;margin-top:2px}

/* ── VIX COMBO ── */
.combo-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-left:1px solid var(--border2);margin-bottom:12px}
.combo-icon{font-family:'Share Tech Mono',monospace;font-size:16px;width:24px}
.combo-main{flex:1}
.combo-label{font-size:9px;color:var(--text3);font-family:'Share Tech Mono',monospace;letter-spacing:2px;margin-bottom:2px}
.combo-val{font-size:14px;font-weight:600;letter-spacing:.5px}
.combo-desc{font-size:11px;color:var(--text2);margin-top:1px}

/* ── FUTURES TABLE ── */
.fut-table{width:100%;border-collapse:collapse;font-family:'Share Tech Mono',monospace;margin-bottom:4px}
.fut-table thead tr{border-bottom:1px solid var(--border2)}
.fut-table thead th{font-size:8px;color:var(--cyan3);letter-spacing:2px;padding:4px 8px;text-align:left;font-weight:400}
.fut-table thead th:last-child,.fut-table td:last-child{text-align:right}
.fut-table tbody tr{border-bottom:1px solid rgba(0,212,255,.06);transition:background .15s}
.fut-table tbody tr:hover{background:rgba(0,212,255,.04)}
.fut-table td{padding:9px 8px;font-size:13px;vertical-align:middle}
.ft-sym{font-size:10px;color:var(--cyan2);letter-spacing:2px}
.ft-name{font-size:10px;color:var(--text3);margin-top:1px;font-family:'Rajdhani',sans-serif}
.ft-price{font-size:18px;font-weight:700;color:var(--text);transition:color .15s;letter-spacing:-.5px}
.ft-price.flash-up{color:var(--up)!important;text-shadow:0 0 10px var(--up)}
.ft-price.flash-dn{color:var(--dn)!important;text-shadow:0 0 10px var(--dn)}
.ft-chg{font-size:11px;font-weight:600}
.ft-vol{font-size:9px;color:var(--text3);margin-top:2px}
.ft-badge{display:inline-block;font-size:7px;padding:1px 5px;letter-spacing:1.5px;vertical-align:middle;margin-left:4px}
.ft-badge.open {border:1px solid var(--up);color:var(--up)}
.ft-badge.pre  {border:1px solid var(--warn);color:var(--warn)}
.ft-badge.post {border:1px solid var(--cyan);color:var(--cyan)}

/* ── COMMODITY ROW ── */
.com-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(0,212,255,.06)}
.com-row:last-child{border-bottom:none}
.com-sym{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cyan3);letter-spacing:2px;width:42px;flex-shrink:0}
.com-name{font-size:11px;color:var(--text2);width:72px;flex-shrink:0}
.com-price{font-family:'Share Tech Mono',monospace;font-size:16px;font-weight:700;flex:1;text-align:right;
  transition:color .15s;letter-spacing:-.5px}
.com-price.flash-up{color:var(--up)!important}
.com-price.flash-dn{color:var(--dn)!important}
.com-chg{font-size:10px;font-weight:600;text-align:right;width:90px;flex-shrink:0}
.com-bar{width:3px;flex-shrink:0;margin-left:8px;align-self:stretch;border-radius:1px;opacity:.6}

/* ── VIX ROW ── */
.vix-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,212,255,.06)}
.vix-row:last-child{border-bottom:none}
.vix-sym{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cyan3);letter-spacing:2px;width:44px;flex-shrink:0}
.vix-val{font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:700;flex:1;
  transition:color .15s;letter-spacing:-1px}
.vix-val.flash-up{color:var(--dn)!important}
.vix-val.flash-dn{color:var(--up)!important}
.vix-chg{font-size:10px;width:80px;text-align:right;flex-shrink:0}
.vix-zone{font-size:9px;letter-spacing:1px;padding:1px 6px;border-radius:1px;margin-left:8px;flex-shrink:0;font-family:'Share Tech Mono',monospace}

/* ── DEEP METRIC ROW ── */
.metric-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,212,255,.06)}
.metric-row:last-child{border-bottom:none}
.metric-lbl{font-size:11px;color:var(--text2);flex:1;letter-spacing:.3px}
.metric-val{font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:700;margin-right:10px;letter-spacing:-.5px}
.metric-zone{font-size:8px;letter-spacing:1px;padding:2px 7px;font-family:'Share Tech Mono',monospace;border-left:2px solid}

/* ── TW LIVE ROWS ── */
.tw-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,212,255,.06)}
.tw-row:last-child{border-bottom:none}
.tw-sym{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cyan3);letter-spacing:2px;width:50px;flex-shrink:0}
.tw-name{font-size:11px;color:var(--text2);flex:1}
.tw-price{font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:700;transition:color .15s;margin-right:8px;letter-spacing:-.5px}
.tw-price.flash-up{color:var(--up)!important}
.tw-price.flash-dn{color:var(--dn)!important}
.tw-chg{font-size:10px;font-weight:600;text-align:right;width:100px;flex-shrink:0}

/* ── CHIP DATA TABLE ── */
.chip-table{width:100%;border-collapse:collapse;margin-bottom:4px}
.chip-table tr{border-bottom:1px solid rgba(0,212,255,.06)}
.chip-table tr:last-child{border-bottom:none}
.chip-table td{padding:7px 4px;font-size:12px;vertical-align:middle}
.chip-label{color:var(--text2);font-size:11px}
.chip-bar-wrap{width:50px;padding:0 6px}
.chip-bar-bg{height:3px;background:rgba(0,212,255,.08);position:relative;border-radius:1px}
.chip-bar-fill{height:100%;border-radius:1px;position:absolute;left:0;top:0}
.chip-val{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;text-align:right;white-space:nowrap}
.chip-chg{font-size:9px;text-align:right;padding-left:6px;white-space:nowrap}

/* ── NIGHT SESSION ── */
.sess-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-bottom:4px}
.sess-half{background:var(--c0);padding:12px}
.sess-badge{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;padding:2px 7px;border:1px solid;display:inline-block;margin-bottom:8px}
.sess-badge.day {border-color:var(--up);color:var(--up)}
.sess-badge.night{border-color:var(--cyan);color:var(--cyan)}
.sess-price{font-family:'Share Tech Mono',monospace;font-size:24px;font-weight:700;letter-spacing:-1px;color:var(--text);margin-bottom:3px}
.sess-chg{font-size:12px;font-weight:600;margin-bottom:3px}
.sess-vol{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3)}
.sess-vs{font-size:9px;margin-top:4px;font-family:'Share Tech Mono',monospace}

/* ── PC RATIO ── */
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-bottom:8px}
.pc-half{background:var(--c0);padding:12px}
.pc-sess{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text3);margin-bottom:8px}
.pc-metric{margin-bottom:8px}
.pc-metric-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:2px}
.pc-metric-val{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:700;letter-spacing:-1px}
.pc-sig{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 8px;border:1px solid;display:inline-block;margin-top:2px}

.pc-diff{padding:10px 12px;border-left:1px solid var(--border2);margin-bottom:8px}
.pc-diff-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,212,255,.06)}
.pc-diff-row:last-child{border-bottom:none}
.pc-diff-lbl{font-size:11px;color:var(--text2)}
.pc-diff-val{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700}

/* ── MARGIN ── */
.margin-row{display:flex;align-items:center;gap:8px;padding:10px 0}
.margin-num{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:700;letter-spacing:-1px}
.margin-arrow{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--text3);padding:0 4px}
.margin-signal{display:flex;justify-content:space-between;align-items:center;padding-top:8px;
  border-top:1px solid var(--border)}

/* ── SLIDERS ── */
.seg{display:flex;gap:0;border:1px solid var(--border);margin-bottom:10px}
.segb{flex:1;padding:7px 4px;border:none;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:9px;
  background:transparent;color:var(--text3);transition:all .2s;letter-spacing:2px;border-right:1px solid var(--border)}
.segb:last-child{border-right:none}
.segb.on{background:rgba(0,212,255,.08);color:var(--cyan);box-shadow:inset 0 -1px 0 var(--cyan)}
.slider-row{display:flex;align-items:center;gap:0;padding:10px 0;border-bottom:1px solid rgba(0,212,255,.06)}
.slider-row:last-child{border-bottom:none}
.slider-lbl{font-size:11px;color:var(--text2);width:110px;flex-shrink:0;letter-spacing:.3px}
.slider-zone{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:1px 6px;
  border-left:2px solid;margin-right:8px;flex-shrink:0;white-space:nowrap;width:72px;text-align:center}
.slider-wrap{flex:1;display:flex;align-items:center;gap:8px}
.slider-wrap input[type=range]{flex:1;-webkit-appearance:none;height:2px;border-radius:1px;outline:none;cursor:pointer;background:var(--border2)}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 8px var(--cyan);cursor:pointer}
.slider-num{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;min-width:44px;text-align:right}

/* ── FOOTER ── */
.footer-bar{padding:10px 16px;border-top:1px solid var(--border);font-family:'Share Tech Mono',monospace;
  font-size:8px;color:var(--text3);letter-spacing:1px;line-height:2}

/* ── LOADING ── */
.ldwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 16px;gap:16px}
.ld-icon{font-family:'Share Tech Mono',monospace;font-size:40px;color:var(--cyan);
  animation:ldPulse 1.5s ease-in-out infinite;text-shadow:0 0 20px var(--cyan)}
@keyframes ldPulse{0%,100%{opacity:.2;text-shadow:none}50%{opacity:1;text-shadow:0 0 30px var(--cyan),0 0 60px rgba(0,212,255,.4)}}
.ld-txt{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan2);letter-spacing:4px;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── UTILS ── */
.up{color:var(--up)}.dn{color:var(--dn)}.neu{color:var(--text3)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top-line"></div>
  <div class="hdr-sys">
    <div class="hdr-left">
      <div class="sys-label">// NEURAL MARKET INTERFACE v3.1</div>
      <div class="hdr-title">MARKET ORACLE</div>
      <div class="hdr-sub" id="dateLabel"></div>
    </div>
    <button class="rfsh" onclick="loadDeep()" id="rfBtn">↻</button>
  </div>
  <div class="status-bar">
    <div class="pulse-dot" id="liveDot"></div>
    <span id="liveLabel">INIT...</span>
    <span class="freq-tag">5s</span>
    <span class="mkt-tag closed" id="mktState">--</span>
    <span class="status-time" id="statusTime"></span>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchMkt('us',this)">🇺🇸 US MKT</button>
    <button class="tab" onclick="switchMkt('tw',this)">🇹🇼 TW MKT</button>
  </div>
</div>

<div class="cnt" id="main">
  <div class="ldwrap">
    <div class="ld-icon">◈</div>
    <div class="ld-txt">LOADING ORACLE DATA_</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════
var WORKER    = "https://market-proxy.q0900027293.workers.dev";
var BATCH_URL = WORKER+"/batch";
var DEEP_URL  = WORKER+"/";

var US_FUT_SYMS = {
  es: {sym:"ES=F",  short:"ES",  name:"S&P 500 E-Mini"},
  nq: {sym:"NQ=F",  short:"NQ",  name:"Nasdaq 100"},
  ym: {sym:"YM=F",  short:"YM",  name:"Dow Jones"},
  rty:{sym:"RTY=F", short:"RTY", name:"Russell 2000"},
};
var US_COM_SYMS = {
  gold:{sym:"GC=F",     short:"GOLD", name:"黃金",    dec:2},
  oil: {sym:"CL=F",     short:"WTI",  name:"原油",    dec:2},
  dxy: {sym:"DX-Y.NYB", short:"DXY",  name:"美元指數", dec:3},
  us10y:{sym:"^TNX",    short:"10YR", name:"美債 10Y", dec:3},
};
var US_VIX_SYMS = {
  vix: {sym:"^VIX",  short:"VIX",  name:"恐慌指數"},
  vvix:{sym:"^VVIX", short:"VVIX", name:"波動指數"},
  skew:{sym:"^SKEW", short:"SKEW", name:"黑天鵝"},
};
var TW_LIVE_SYMS = {
  twii:{sym:"^TWII",  short:"TWII", name:"加權指數"},
  otc: {sym:"^TWOII", short:"OTC",  name:"櫃買指數"},
  txf: {sym:"TXF=F",  short:"TXF",  name:"台指期貨"},
};

function usMarketState(){
  var now=new Date();
  var jan=new Date(now.getFullYear(),0,1),jul=new Date(now.getFullYear(),6,1);
  var isDST=now.getTimezoneOffset()<Math.max(jan.getTimezoneOffset(),jul.getTimezoneOffset());
  var etOff=isDST?-4:-5;
  var et=new Date(now.getTime()+(now.getTimezoneOffset()+etOff*60)*60000);
  var h=et.getHours(),m=et.getMinutes(),dow=et.getDay();
  if(dow===0||dow===6) return"closed";
  var mins=h*60+m;
  if(mins>=240&&mins<570)  return"pre";
  if(mins>=570&&mins<960)  return"open";
  if(mins>=960&&mins<1200) return"post";
  return"closed";
}

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
var apiData={us:{},tw:{}};
var liveData={};
var curMkt="us";
var usGrp="情緒";
var mVals={putcall:.85,aaii:38,breadth:55};
var liveTimer=null;
var liveOK=false;

// ══════════════════════════════════════════════════════
//  ZONE / SIGNAL

function vixZone(v){ for(var z of VIX_ZONES) if(v<=z.max) return z; return VIX_ZONES[VIX_ZONES.length-1]; }

function gz(ind,v){ for(var i=0;i<ind.zones.length;i++) if(v<=ind.zones[i].max) return ind.zones[i]; return ind.zones[ind.zones.length-1]; }
function ss(s){
  if(s>=2)  return{c:"var(--up)",  bg:"rgba(0,255,136,.08)", bc:"var(--up)"};
  if(s===1) return{c:"var(--cyan)",bg:"rgba(0,212,255,.08)", bc:"var(--cyan)"};
  if(s===0) return{c:"var(--warn)",bg:"rgba(255,170,0,.08)",  bc:"var(--warn)"};
  if(s===-1)return{c:"var(--dn)",  bg:"rgba(255,51,102,.08)", bc:"var(--dn)"};
  return{c:"#ff0044",bg:"rgba(255,0,68,.12)",bc:"#ff0044"};
}
function sfInfo(r){
  if(r>=.75) return{lbl:"SIGNAL: HOLD POSITION",  sub:"Risk matrix nominal · All systems green",c:"var(--up)",  tr:"var(--up)",  eye:"◈"};
  if(r>=.55) return{lbl:"SIGNAL: CAUTIOUS BULL",   sub:"Bias positive · Monitor weak nodes",   c:"var(--cyan)",tr:"var(--cyan)", eye:"◇"};
  if(r>=.38) return{lbl:"SIGNAL: NEUTRAL / WAIT",  sub:"Conflicting signals · Hold cash",      c:"var(--warn)",tr:"var(--warn)", eye:"◆"};
  if(r>=.2)  return{lbl:"SIGNAL: REDUCE EXPOSURE", sub:"Multiple bearish indicators detected", c:"var(--dn)",  tr:"var(--dn)",   eye:"▽"};
  return{lbl:"SIGNAL: HIGH ALERT",sub:"Recommend defensive posture",c:"#ff0044",tr:"#ff0044",eye:"▼"};
}
function combo(data){
  var vix=liveData["^VIX"]?.price||data.vix?.price;
  var skew=liveData["^SKEW"]?.price||data.skew?.price;
  var vvix=liveData["^VVIX"]?.price||data.vvix?.price;
  if(!vix||!skew||!vvix) return{t:"AWAITING DATA",d:"neural network initializing",c:"var(--text3)",icon:"◌"};
  if(skew>145&&vix<20)   return{t:"DARK FLOW DETECTED",d:"High SKEW + Low VIX = Danger combo",c:"var(--dn)",icon:"▼"};
  if(skew>130&&vix>25&&vvix>120) return{t:"FULL PANIC MODE",d:"Triple signal — market pricing crash",c:"var(--dn)",icon:"▽"};
  if(vvix>130)           return{t:"MAX UNCERTAINTY",d:"VVIX surge — VIX trajectory unpredictable",c:"var(--warn)",icon:"◆"};
  if(skew<120&&vix<20&&vvix<100) return{t:"SYSTEM CALM",d:"All three metrics nominal",c:"var(--up)",icon:"◈"};
  return{t:"NOMINAL VOLATILITY",d:"No critical signal combinations",c:"var(--cyan)",icon:"◇"};
}
function getV(ind,data){
  var sym=IND_LIVE_MAP[ind.key];
  if(sym&&liveData[sym]) return ind.usePct?liveData[sym].pct:liveData[sym].price;
  if(ind.direct) return (data[ind.key]!==undefined&&data[ind.key]!==null)?data[ind.key]:null;
  var d=data[ind.key]; if(!d) return null;
  return ind.usePct?d.pct:d.price;
}
function calcTot(aI,mI,data){
  var tot=0;
  aI.forEach(ind=>{var v=getV(ind,data);if(v!==null&&v!==undefined) tot+=gz(ind,v).s;});
  mI.forEach(ind=>{tot+=gz(ind,mVals[ind.key]).s;});
  return tot;
}
function fmtN(n,d){ if(n===null||n===undefined||isNaN(n)) return"—"; return parseFloat(n).toFixed(d||0); }
function fmtInt(n){ if(n===null||n===undefined||isNaN(n)) return"—"; return parseInt(n).toLocaleString(); }
function cc(n){ return n>0?"var(--up)":n<0?"var(--dn)":"var(--text3)"; }
function sgn(n){ return n>0?"+":""; }
function fmtP(p,dec){
  if(!p&&p!==0) return"—";
  dec=dec||2;
  return p>=1000?p.toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec}):p.toFixed(dec);
}
function stateInfo(s){
  var m={pre:{lbl:"PRE-MKT",cls:"pre"},open:{lbl:"LIVE",cls:"open"},post:{lbl:"AFTER-HRS",cls:"post"},closed:{lbl:"CLOSED",cls:"closed"}};
  return m[s]||m.closed;
}

function batchSyms(){
  if(curMkt==="us"){
    var s=[];
    Object.values(US_FUT_SYMS).forEach(f=>s.push(f.sym));
    Object.values(US_COM_SYMS).forEach(f=>s.push(f.sym));
    Object.values(US_VIX_SYMS).forEach(f=>s.push(f.sym));
    return s;
  }
  return Object.values(TW_LIVE_SYMS).map(f=>f.sym);
}
async function fetchBatch(){
  try{
    var r=await fetch(BATCH_URL+"?syms="+batchSyms().join(","),{cache:"no-store"});
    var json=await r.json();
    var ok=false;
    batchSyms().forEach(sym=>{if(json[sym]){liveData[sym]=json[sym];ok=true;}});
    liveOK=ok;
  }catch{ liveOK=false; }
  updateStatus();
  if(liveOK) updateAllCards();
}
function startLiveTimer(){
  if(liveTimer) clearInterval(liveTimer);
  fetchBatch();
  liveTimer=setInterval(fetchBatch,5000);
}
function updateStatus(){
  var dot=document.getElementById("liveDot");
  var lbl=document.getElementById("liveLabel");
  var st=document.getElementById("mktState");
  var tim=document.getElementById("statusTime");
  if(!dot) return;
  dot.className=liveOK?"pulse-dot":"pulse-dot off";
  lbl.textContent=liveOK?"LIVE":"OFFLINE";
  if(tim) tim.textContent=new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  if(st&&curMkt==="us"){
    var s=usMarketState(),si=stateInfo(s);
    st.className="mkt-tag "+si.cls;
    st.textContent=si.lbl;
  } else if(st){ st.className="mkt-tag closed"; st.textContent="--"; }
}

function flash(el,pct){
  if(!el) return;
  el.classList.add(pct>=0?"flash-up":"flash-dn");
  setTimeout(()=>el.classList.remove("flash-up","flash-dn"),400);
}
function updateFutRow(key,f){
  var d=liveData[f.sym]; if(!d) return;
  var el=document.getElementById("fut_"+key); if(!el) return;
  var pe=el.querySelector("[data-price]");
  var ce=el.querySelector("[data-chg]");
  var ve=el.querySelector("[data-vol]");
  var be=el.querySelector("[data-badge]");
  if(pe){ var np=fmtP(d.price,2); if(np!==pe.textContent){flash(pe,d.pct);pe.textContent=np;} }
  if(ce){
    var sign=d.pct>=0?"▲":"▼";
    var abs=Math.abs(d.price-d.prev).toFixed(2);
    ce.innerHTML="<span class='"+(d.pct>=0?"up":"dn")+"'>"+sign+" "+abs+" ("+sgn(d.pct)+d.pct.toFixed(2)+"%)</span>";
  }
  if(ve&&d.vol) ve.textContent=d.vol.toLocaleString();
  if(be&&d.state){
    var sm={pre:"pre",regular:"open",post:"post",postmarket:"post",premarket:"pre"};
    var sc=sm[(d.state||"").toLowerCase()]||"";
    if(sc){
      var sl={pre:"PRE",open:"LIVE",post:"POST"}[sc]||"";
      be.className="ft-badge "+sc;
      be.textContent=sl;
    } else { be.textContent=""; }
  }
}
function updateComRow(key,f){
  var d=liveData[f.sym]; if(!d) return;
  var el=document.getElementById("com_"+key); if(!el) return;
  var pe=el.querySelector("[data-price]");
  var ce=el.querySelector("[data-chg]");
  var be=el.querySelector("[data-bar]");
  if(pe){ var np=fmtP(d.price,f.dec); if(np!==pe.textContent){flash(pe,d.pct);pe.textContent=np;} }
  if(ce){
    var sign=d.pct>=0?"▲":"▼";
    ce.innerHTML="<span class='"+(d.pct>=0?"up":"dn")+"'>"+sign+" "+sgn(d.pct)+d.pct.toFixed(2)+"%</span>";
  }
  if(be) be.style.background=d.pct>=0?"var(--up)":"var(--dn)";
}
function updateVixRow(key,f){
  var d=liveData[f.sym]; if(!d) return;
  var el=document.getElementById("vix_"+key); if(!el) return;
  var ve=el.querySelector("[data-val]");
  var ce=el.querySelector("[data-chg]");
  var ze=el.querySelector("[data-zone]");

  if(ze){ var z=vixZone(d.price); ze.style.color=z.c; ze.style.borderColor=z.c; ze.textContent=z.t; }

function updateTWRow(key,f){
  var d=liveData[f.sym]; if(!d) return;
  var el=document.getElementById("tw_"+key); if(!el) return;
  var pe=el.querySelector("[data-price]");
  var ce=el.querySelector("[data-chg]");
  if(pe){ var np=fmtP(d.price,2); if(np!==pe.textContent){flash(pe,d.pct);pe.textContent=np;} }
  if(ce){
    var sign=d.pct>=0?"▲":"▼";
    ce.innerHTML="<span class='"+(d.pct>=0?"up":"dn")+"'>"+sign+" "+Math.abs(d.price-d.prev).toFixed(2)+" ("+sgn(d.pct)+d.pct.toFixed(2)+"%)</span>";
  }
}
function updateAllCards(){
  if(curMkt==="us"){
    Object.entries(US_FUT_SYMS).forEach(([k,f])=>updateFutRow(k,f));
    Object.entries(US_COM_SYMS).forEach(([k,f])=>updateComRow(k,f));
    Object.entries(US_VIX_SYMS).forEach(([k,f])=>updateVixRow(k,f));
    var cbEl=document.getElementById("combo-box");
    if(cbEl){
      var cb=combo(apiData.us);
      cbEl.querySelector("[data-cval]").textContent=cb.icon+" "+cb.t;
      cbEl.querySelector("[data-cval]").style.color=cb.c;
      cbEl.querySelector("[data-cdesc]").textContent=cb.d;
    }
  } else {
    Object.entries(TW_LIVE_SYMS).forEach(([k,f])=>updateTWRow(k,f));
  }
}

function renderDeepMetrics(aI,data){
  var html="<div>";
  aI.forEach(ind=>{
    var v=getV(ind,data);
    var z=v!==null&&v!==undefined?gz(ind,v):null;
    var st=ss(z?z.s:1);
    var val="—";
    if(v!==null&&v!==undefined){
      if(ind.direct) val=parseFloat(v).toFixed(ind.key==="fgi"?0:2);
      else if(ind.usePct) val=(v>0?"+":"")+v.toFixed(2)+"%";
      else{
        var src=liveData[IND_LIVE_MAP[ind.key]]||data[ind.key];
        if(src) val=src.price>=1000?src.price.toLocaleString():src.price.toFixed(2);
      }
    }
    html+="<div class='metric-row'>"
      +"<div class='metric-lbl'>"+ind.lbl+"</div>"
      +"<div class='metric-val' style='color:"+st.c+"'>"+val+"</div>"
      +"<div class='metric-zone' style='color:"+st.c+";border-color:"+st.c+"'>"+( z?z.t:"—")+"</div>"
      +"</div>";
  });
  return html+"</div>";
}
function renderNight(nd){
  if(!nd) return"";
  var date=nd.date.slice(0,4)+"/"+nd.date.slice(4,6)+"/"+nd.date.slice(6,8);
  var day=nd.day,night=nd.night;
  var dc=day?parseFloat(day.change)||0:0;
  var nc=night?parseFloat(night.change)||0:0;
  var diff="",diffPct="";
  if(night&&day){
    var dv=parseFloat(night.last)-parseFloat(day.last);
    var dp2=day.last>0?dv/parseFloat(day.last)*100:0;
    diff=sgn(dv)+dv.toFixed(0); diffPct=sgn(dp2)+dp2.toFixed(2)+"%";
  }
  return "<div class='sess-grid'>"
    +"<div class='sess-half'><span class='sess-badge day'>DAY</span><br>"
    +(day?"<div class='sess-price'>"+day.last+"</div>"
         +"<div class='sess-chg' style='color:"+cc(dc)+"'>"+sgn(dc)+day.change+" ("+day.changePct+")</div>"
         +"<div class='sess-vol'>VOL: "+parseInt(day.volume).toLocaleString()+"</div>"
        :"<div style='color:var(--text3);font-size:11px;margin-top:8px'>NO DATA</div>")
    +"</div>"
    +"<div class='sess-half'><span class='sess-badge night'>NIGHT</span><br>"
    +(night?"<div class='sess-price'>"+night.last+"</div>"
           +"<div class='sess-chg' style='color:"+cc(nc)+"'>"+sgn(nc)+night.change+" ("+night.changePct+")</div>"
           +(diff?"<div class='sess-vs' style='color:"+cc(parseFloat(diff))+"'>vs DAY "+diff+" ("+diffPct+")</div>":"")
           +"<div class='sess-vol'>VOL: "+parseInt(night.volume).toLocaleString()+"</div>"
           :"<div style='color:var(--text3);font-size:11px;margin-top:8px'>NOT OPEN</div>")
    +"</div></div>";
}
function pcSignal(oi){
  if(oi===null||oi===undefined) return{t:"—",c:"var(--text3)"};
  if(oi>130) return{t:"BEAR ▼",c:"var(--dn)"};
  if(oi>110) return{t:"MILD BEAR",c:"var(--warn)"};
  if(oi>90)  return{t:"NEUTRAL",c:"var(--cyan)"};
  return{t:"BULL ▲",c:"var(--up)"};
}
function diffSignal(d){
  if(d===null||d===undefined) return{t:"—",c:"var(--text3)"};
  if(d>5)  return{t:"NIGHT BEAR++",c:"var(--dn)"};
  if(d>1)  return{t:"NIGHT BEAR",c:"var(--warn)"};
  if(d>-1) return{t:"FLAT",c:"var(--cyan)"};
  if(d>-5) return{t:"NIGHT BULL",c:"var(--up)"};
  return{t:"NIGHT BULL++",c:"var(--up)"};
}
function renderPutCall(pc){
  if(!pc) return"<div style='color:var(--text3);font-family:Share Tech Mono,monospace;font-size:10px;padding:12px 0;letter-spacing:2px'>AWAITING DATA...</div>";
  var pcdate=pc.date?pc.date.slice(0,4)+"/"+pc.date.slice(4,6)+"/"+pc.date.slice(6,8):"";
  var prevdate=pc.prevDate?pc.prevDate.slice(0,4)+"/"+pc.prevDate.slice(4,6)+"/"+pc.prevDate.slice(6,8):"PREV";
  var html="";
  if(pc.hasSession&&pc.night){
    var daySig=pcSignal(pc.day?.oiRatio),nightSig=pcSignal(pc.night?.oiRatio),dSig=diffSignal(pc.diff?.oiRatio);
    html+="<div class='pc-grid'>";
    [{s:"day",ico:"DAY",d:pc.day,sig:daySig},{s:"night",ico:"NIGHT",d:pc.night,sig:nightSig}].forEach(function(x){
      html+="<div class='pc-half'>"
        +"<div class='pc-sess'>"+x.ico+" · "+pcdate+"</div>"
        +"<div class='pc-metric'><div class='pc-metric-lbl'>OI RATIO</div>"
        +"<div class='pc-metric-val' style='color:"+x.sig.c+"'>"+fmtN(x.d?.oiRatio,2)+"</div></div>"
        +"<div class='pc-metric'><div class='pc-metric-lbl'>VOL RATIO</div>"
        +"<div class='pc-metric-val'>"+fmtN(x.d?.volRatio,2)+"</div></div>"
        +"<div class='pc-sig' style='color:"+x.sig.c+";border-color:"+x.sig.c+"'>"+x.sig.t+"</div>"
        +"</div>";
    });
    html+="</div>";
    html+="<div class='pc-diff'>"
      +"<div class='pc-diff-row'><span class='pc-diff-lbl'>OI DIFF (NIGHT-DAY)</span>"
      +"<span class='pc-diff-val' style='color:"+cc(-(pc.diff?.oiRatio||0))+"'>"+sgn(pc.diff?.oiRatio||0)+fmtN(pc.diff?.oiRatio,2)+"</span></div>"
      +"<div class='pc-diff-row'><span class='pc-diff-lbl'>VOL DIFF</span>"
      +"<span class='pc-diff-val' style='color:"+cc(-(pc.diff?.volRatio||0))+"'>"+sgn(pc.diff?.volRatio||0)+fmtN(pc.diff?.volRatio,2)+"</span></div>"
      +"<div class='pc-diff-row'><span class='pc-diff-lbl'>NIGHT SIGNAL</span>"
      +"<span style='font-family:Share Tech Mono,monospace;font-size:11px;color:"+dSig.c+"'>"+dSig.t+"</span></div>"
      +"</div>";
  } else {
    var cur=pc.day,prev2=pc.prevDay,curSig=pcSignal(cur?.oiRatio),dayChg=pc.dayChange;
    html+="<div style='font-family:Share Tech Mono,monospace;font-size:8px;color:var(--text3);letter-spacing:2px;margin-bottom:10px'>"+pcdate+" vs "+prevdate+" · COMBINED SESSION</div>";
    [{label:"OI RATIO",curV:cur?.oiRatio,prevV:prev2?.oiRatio,chgV:dayChg?.oiRatio},
     {label:"VOL RATIO",curV:cur?.volRatio,prevV:prev2?.volRatio,chgV:dayChg?.volRatio}]
    .forEach(function(row){
      var vc=pcSignal(row.curV).c;
      html+="<div class='pc-diff-row'><div><div class='pc-diff-lbl'>"+row.label+"</div>"
        +"<div style='font-size:9px;color:var(--text3);font-family:Share Tech Mono,monospace'>PREV "+fmtN(row.prevV,2)
        +(row.chgV!==null?" · Δ<span style='color:"+cc(-row.chgV)+"'>"+sgn(row.chgV||0)+fmtN(row.chgV,2)+"</span>":"")
        +"</div></div>"
        +"<span class='pc-diff-val' style='color:"+vc+"'>"+fmtN(row.curV,2)+"</span></div>";
    });
    html+="<div class='pc-diff-row'><span class='pc-diff-lbl'>SIGNAL</span>"
      +"<span class='pc-sig' style='color:"+curSig.c+";border-color:"+curSig.c+"'>"+curSig.t+"</span></div>";
  }
  return html;
}
function renderChips(data){
  var fd=data.foreign_data,md=data.margin_data,pc=data.putcall_data,fut=data.futures_data,nd=data.night_data;
  var html="";
  html+=shead("TW LIVE MARKET")+"<div style='padding:0'>"+renderTWLive()+"</div>";
  html+=shead("TXF SESSION")+renderNight(nd);
  html+=shead("INSTITUTIONAL · SPOT")+renderForeignBlock(fd);
  html+=shead("INSTITUTIONAL · FUTURES")+renderFutInst(fut);
  html+=shead("PUT / CALL RATIO")+renderPutCall(pc);
  html+=shead("MARGIN BALANCE")+renderMargin(md);
  return html;
}
function renderForeignBlock(fd){
  if(!fd||fd.foreign===null) return"<div style='color:var(--text3);font-family:Share Tech Mono,monospace;font-size:10px;padding:10px 0;letter-spacing:2px'>AWAITING DATA...</div>";
  var fdate=fd.date?fd.date.slice(0,4)+"/"+fd.date.slice(4,6)+"/"+fd.date.slice(6,8):"";
  var html="<div style='font-family:Share Tech Mono,monospace;font-size:8px;color:var(--cyan3);letter-spacing:2px;margin-bottom:8px'>"+fdate+"</div>";
  html+="<table class='chip-table'>";
  [{n:"FOREIGN",v:fd.foreign},{n:"TRUST",v:fd.trust},{n:"DEALER",v:fd.dealer},{n:"TOTAL",v:fd.total,b:true}]
  .forEach(function(row){
    var c=cc(row.v);
    var bw=Math.min(Math.abs(row.v||0)/300*100,100).toFixed(0);
    var bc=row.v>=0?"var(--up)":"var(--dn)";
    html+="<tr><td class='chip-label'"+(row.b?" style='color:var(--cyan);font-weight:600'":"")+">"+row.n+"</td>"
      +"<td class='chip-bar-wrap'><div class='chip-bar-bg'><div class='chip-bar-fill' style='width:"+bw+"%;background:"+bc+"'></div></div></td>"
      +"<td class='chip-val' style='color:"+c+"'>"+sgn(row.v)+fmtN(row.v,1)+"B</td></tr>";
  });
  return html+"</table>";
}
function renderFutInst(fut){
  if(!fut) return"<div style='color:var(--text3);font-family:Share Tech Mono,monospace;font-size:10px;padding:10px 0;letter-spacing:2px'>AWAITING DATA...</div>";
  var fdate=fut.date?fut.date.slice(0,4)+"/"+fut.date.slice(4,6)+"/"+fut.date.slice(6,8):"";
  var html="<div style='font-family:Share Tech Mono,monospace;font-size:8px;color:var(--cyan3);letter-spacing:2px;margin-bottom:8px'>"+fdate+"</div>";
  html+="<table class='chip-table'>";
  [{n:"FOREIGN TXF",v:fut.txf?.foreign,chg:fut.txf?.foreign_chg},
   {n:"FOREIGN MXF",v:fut.mxf?.foreign,chg:fut.mxf?.foreign_chg},
   {n:"FOREIGN TMF",v:fut.tmf?.foreign,chg:fut.tmf?.foreign_chg},
   {n:"TRUST TXF",  v:fut.txf?.trust,  chg:fut.txf?.trust_chg},
   {n:"DEALER TXF", v:fut.txf?.dealer, chg:fut.txf?.dealer_chg}]
  .forEach(function(row){
    var c=row.v!==null?cc(row.v):"var(--text3)";
    var chgH=row.chg!==null&&row.chg!==undefined
      ?"<span style='color:"+cc(row.chg)+"'>"+(row.chg>0?"▲":"▼")+Math.abs(row.chg).toLocaleString()+"</span>":"";
    html+="<tr><td class='chip-label'>"+row.n+"</td>"
      +"<td class='chip-chg'>"+chgH+"</td>"
      +"<td class='chip-val' style='color:"+c+"'>"+sgn(row.v)+fmtInt(row.v)+"</td></tr>";
  });
  return html+"</table>";
}
function renderMargin(md){
  if(!md||md.margin===null) return"<div style='color:var(--text3);font-family:Share Tech Mono,monospace;font-size:10px;padding:10px 0;letter-spacing:2px'>AWAITING DATA...</div>";
  var mdate=md.date?md.date.slice(0,4)+"/"+md.date.slice(4,6)+"/"+md.date.slice(6,8):"";
  var isDown=md.marginChg<0;
  return "<div style='font-family:Share Tech Mono,monospace;font-size:8px;color:var(--cyan3);letter-spacing:2px;margin-bottom:8px'>"+mdate+"</div>"
    +"<div class='margin-row'>"
    +"<div><div style='font-size:9px;color:var(--text3);font-family:Share Tech Mono,monospace;letter-spacing:1px;margin-bottom:3px'>PREV</div>"
    +"<div class='margin-num' style='color:var(--text2);font-size:18px'>"+fmtN(md.marginPrev,1)+"B</div></div>"
    +"<div class='margin-arrow'>"+(isDown?"↘":"↗")+"</div>"
    +"<div><div style='font-size:9px;color:var(--text3);font-family:Share Tech Mono,monospace;letter-spacing:1px;margin-bottom:3px'>CURRENT</div>"
    +"<div class='margin-num'>"+fmtN(md.margin,1)+"B</div></div>"
    +"</div>"
    +"<div class='margin-signal'>"
    +"<span style='font-size:11px;color:"+(isDown?"var(--up)":"var(--dn)")+"'>"+(isDown?"MARGIN↓ BULL SIGNAL":"MARGIN↑ CAUTION")+"</span>"
    +"<span style='font-family:Share Tech Mono,monospace;font-size:12px;font-weight:700;color:"+cc(md.marginChg)+"'>"+sgn(md.marginChg)+fmtN(md.marginChg,1)+"B ("+sgn(md.marginChgPct)+fmtN(md.marginChgPct,2)+"%)</span>"
    +"</div>";
}

// ══════════════════════════════════════════════════════
//  SLIDERS
// ══════════════════════════════════════════════════════
function renderSlider(ind){
  var v=mVals[ind.key],z=gz(ind,v),st=ss(z.s),decs=ind.step<1?2:0;
  return "<div class='slider-row' id='sc_"+ind.key+"'>"
    +"<div class='slider-lbl'>"+ind.lbl+"</div>"
    +"<div class='slider-zone' id='sb_"+ind.key+"' style='color:"+st.c+";border-color:"+st.c+"'>"+z.t+"</div>"
    +"<div class='slider-wrap'>"
    +"<input type='range' min='"+ind.min+"' max='"+ind.max+"' step='"+ind.step+"' value='"+v+"' "
    +"oninput=\"onSlide(this,'"+ind.key+"',"+decs+")\"/>"
    +"<span class='slider-num' id='sv_"+ind.key+"' style='color:"+st.c+"'>"+parseFloat(v).toFixed(decs)+"</span>"
    +"</div></div>";
}
function onSlide(el,key,decs){
  var v=parseFloat(el.value); mVals[key]=v;
  var ind=US_MAN.find(i=>i.key===key); if(!ind) return;
  var z=gz(ind,v),st=ss(z.s);
  document.getElementById("sv_"+key).textContent=v.toFixed(decs);
  document.getElementById("sv_"+key).style.color=st.c;
  document.getElementById("sb_"+key).textContent=z.t;
  document.getElementById("sb_"+key).style.color=st.c;
  document.getElementById("sb_"+key).style.borderColor=st.c;
  updateBanner();
}
function setGrp(g){ usGrp=g; renderManPanel(); }
function renderManPanel(){
  var panel=document.getElementById("manPanel"); if(!panel) return;
  var html="<div class='seg'>";
  Object.keys(US_GROUPS).forEach(g=>{
    html+="<button class='segb"+(g===usGrp?" on":"")+"' onclick=\"setGrp('"+g+"')\">"+g+"</button>";
  });
  html+="</div>";
  (US_GROUPS[usGrp]||[]).forEach(k=>{
    var ind=US_MAN.find(i=>i.key===k); if(ind) html+=renderSlider(ind);
  });
  panel.innerHTML=html;
}
function updateBanner(){
  var isUS=curMkt==="us";
  var aI=isUS?US_AUTO:TW_AUTO,mI=isUS?US_MAN:[];
  var data=isUS?apiData.us:apiData.tw;
  var mn=(aI.length+mI.length)*-2,mx=(aI.length+mI.length)*2;
  var tot=calcTot(aI,mI,data),r=(tot-mn)/(mx-mn),sf=sfInfo(r);
  var b=document.getElementById("oracle"); if(!b) return;
  b.style.borderColor=sf.c;
  document.getElementById("oracle-verdict").textContent=sf.eye+" "+sf.lbl;
  document.getElementById("oracle-verdict").style.color=sf.c;
  document.getElementById("oracle-sub").textContent=sf.sub;
  document.getElementById("oracle-fill").style.width=(r*100).toFixed(0)+"%";
  document.getElementById("oracle-fill").style.background=sf.tr;
  document.getElementById("oracle-score").textContent="SCORE: "+tot+" / "+mx;
  document.getElementById("oracle-score").style.color=sf.c;
}

// ══════════════════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════════════════
function render(mkt){
  var isUS=mkt==="us";
  var aI=isUS?US_AUTO:TW_AUTO,mI=isUS?US_MAN:[];
  var data=isUS?apiData.us:apiData.tw;
  var mn=(aI.length+mI.length)*-2,mx=(aI.length+mI.length)*2;
  var tot=calcTot(aI,mI,data),r=(tot-mn)/(mx-mn),sf=sfInfo(r);
  var cb=combo(data);

  var html="<div class='oracle' id='oracle' style='border-color:"+sf.c+"'>"
    +"<div class='oracle-sys'>// ORACLE OUTPUT · NEURAL ANALYSIS</div>"
    +"<div class='oracle-verdict' id='oracle-verdict' style='color:"+sf.c+"'>"+sf.eye+" "+sf.lbl+"</div>"
    +"<div class='oracle-sub' id='oracle-sub'>"+sf.sub+"</div>"
    +"<div class='oracle-bar'><div class='oracle-fill' id='oracle-fill' style='width:"+(r*100).toFixed(0)+"%;background:"+sf.tr+"'></div></div>"
    +"<div class='oracle-score' id='oracle-score' style='color:"+sf.c+"'>SCORE: "+tot+" / "+mx+"</div>"
    +"</div>";

  if(isUS){
    html+="<div class='combo-row' id='combo-box'>"
      +"<div class='combo-icon' data-cval style='color:"+cb.c+"'>"+cb.icon+" "+cb.t+"</div>"
      +"</div>";
    // fix: separate elements
    html="<div class='oracle' id='oracle' style='border-color:"+sf.c+"'>"
      +"<div class='oracle-sys'>// ORACLE OUTPUT · NEURAL ANALYSIS</div>"
      +"<div class='oracle-verdict' id='oracle-verdict' style='color:"+sf.c+"'>"+sf.eye+" "+sf.lbl+"</div>"
      +"<div class='oracle-sub' id='oracle-sub'>"+sf.sub+"</div>"
      +"<div class='oracle-bar'><div class='oracle-fill' id='oracle-fill' style='width:"+(r*100).toFixed(0)+"%;background:"+sf.tr+"'></div></div>"
      +"<div class='oracle-score' id='oracle-score' style='color:"+sf.c+"'>SCORE: "+tot+" / "+mx+"</div>"
      +"</div>"
      +"<div class='combo-row' id='combo-box'>"
      +"<div class='combo-main'>"
      +"<div class='combo-label'>VIX · VVIX · SKEW COMBINATION</div>"
      +"<div class='combo-val' data-cval style='color:"+cb.c+"'>"+cb.icon+" "+cb.t+"</div>"
      +"<div class='combo-desc' data-cdesc>"+cb.d+"</div>"
      +"</div></div>";

    html+=shead("US FUTURES · LIVE")+renderFutTable();
    html+=shead("COMMODITIES · LIVE")+renderComBlock();
    html+=shead("VOLATILITY · LIVE")+renderVixBlock();
    html+=shead("DEEP INDICATORS")+"<div>"+renderDeepMetrics(aI,data)+"</div>";
    html+=shead("MANUAL INPUT")+"<div id='manPanel'></div>";
  } else {
    html+=renderChips(data);
    html+=shead("DEEP INDICATORS")+"<div>"+renderDeepMetrics(aI,data)+"</div>";
  }

  html+="<div class='footer-bar'>// LIVE 5s · DEEP 15min · "+(isUS?"FUTURES + COMMODITIES + VIX ALL LIVE":"TW CHIPS UPDATED POST-MARKET")+" · NEURAL INTERFACE v3.1</div>";

  document.getElementById("main").innerHTML=html;
  if(isUS) renderManPanel();
  updateStatus();
}

// ══════════════════════════════════════════════════════
//  SWITCH / LOAD
// ══════════════════════════════════════════════════════
function switchMkt(mkt,btn){
  curMkt=mkt;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  render(mkt);
  startLiveTimer();
}
async function loadDeep(){
  var btn=document.getElementById("rfBtn");
  if(btn) btn.classList.add("spin");
  try{
    var ctrl=new AbortController();
    setTimeout(()=>ctrl.abort(),15000);
    var res=await fetch(DEEP_URL,{cache:"no-store",signal:ctrl.signal});
    var json=await res.json();
    if(json&&json.us) apiData=json; else apiData={us:{},tw:{}};
  }catch{ apiData={us:{},tw:{}}; }
  if(btn) btn.classList.remove("spin");
  render(curMkt);
}

//  INIT
// ══════════════════════════════════════════════════════
var d=new Date();
document.getElementById("dateLabel").textContent=
  d.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"short"})
  +" · SYS:ONLINE";
loadDeep();
startLiveTimer();
setInterval(loadDeep,15*60*1000);
</script>
