<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>市場位階儀表板</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0800">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --gold3:#f5e0a0;
  --dark:#0a0800;
  --dark2:#110e01;
  --dark3:#1a1500;
  --dark4:#221c00;
  --panel:#130f02;
  --border:rgba(201,168,76,.25);
  --border2:rgba(201,168,76,.5);
  --text:rgba(245,224,160,.9);
  --text2:rgba(245,224,160,.55);
  --text3:rgba(245,224,160,.35);
  --safe:#30d158;
  --caut:#5ac8fa;
  --warn:#ffd60a;
  --dang:#ff453a;
}

body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--dark);color:var(--text);padding:0 0 60px;min-height:100vh;background-image:
  radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.08) 0%,transparent 60%),
  repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(201,168,76,.02) 40px,rgba(201,168,76,.02) 41px),
  repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(201,168,76,.02) 40px,rgba(201,168,76,.02) 41px);}

/* ═══ HEADER ═══ */
.hdr{padding:20px 16px 0;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hdr-deco{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;opacity:.4}
.hdr-deco span{font-size:18px}
.hdr-deco-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.hdr-deco-line.r{background:linear-gradient(90deg,var(--gold),transparent)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.hdr-title{font-family:'Cinzel',serif;font-size:22px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--gold),var(--gold3),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:3px;letter-spacing:.5px}
.rfsh{width:34px;height:34px;border-radius:50%;background:var(--dark4);border:1px solid var(--border);cursor:pointer;color:var(--gold);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:0 0 8px rgba(201,168,76,.15)}
.rfsh:active{transform:scale(.9)}
.rfsh.spin{animation:spin .7s linear infinite}
.rfsh:hover{box-shadow:0 0 14px rgba(201,168,76,.35);border-color:var(--gold)}

/* ═══ TABS ═══ */
.mtabs{display:flex;background:var(--dark4);border-radius:0;padding:3px;margin-bottom:16px;border:1px solid var(--border);border-radius:4px;position:relative}
.mtabs::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.mtab{flex:1;padding:8px;border-radius:3px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:var(--text3);transition:all .2s;letter-spacing:.5px}
.mtab.on{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.08));color:var(--gold2);box-shadow:0 0 12px rgba(201,168,76,.15);border:1px solid var(--border2)}

/* ═══ CONTENT ═══ */
.cnt{padding:0 16px}

/* ═══ SECTION TITLE ═══ */
.stitle{display:flex;align-items:center;gap:8px;margin:16px 0 8px;font-family:'Cinzel',serif;font-size:10px;font-weight:600;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.stitle::before,.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
.stitle::before{background:linear-gradient(90deg,transparent,var(--gold))}

/* ═══ SAFETY BANNER ═══ */
.sban{border-radius:6px;padding:18px 16px;margin-bottom:16px;position:relative;overflow:hidden;border:1px solid}
.sban::before{content:'𓂀';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:52px;opacity:.08}
.sban::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,currentColor,transparent);opacity:.3}
.sban-eye{font-size:11px;letter-spacing:3px;margin-bottom:4px;opacity:.7}
.sban-label{font-family:'Cinzel',serif;font-size:24px;font-weight:900;letter-spacing:1px;margin-bottom:4px}
.sban-sub{font-size:12px;opacity:.8;margin-bottom:14px}
.pbar{background:rgba(0,0,0,.4);border-radius:2px;height:4px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.pbar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px currentColor}
.pbar-note{font-size:11px;opacity:.6;margin-top:6px;text-align:right;font-family:'Cinzel',serif;letter-spacing:.5px}

/* ═══ COMBO ═══ */
.combo{background:var(--panel);border-radius:6px;padding:12px 14px;margin-bottom:14px;border:1px solid;position:relative;overflow:hidden}
.combo::before{content:'𓃭';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.1}
.combo-tt{font-size:9px;color:var(--text3);margin-bottom:4px;letter-spacing:2px;text-transform:uppercase;font-family:'Cinzel',serif}
.combo-v{font-size:15px;font-weight:700;margin-bottom:2px}
.combo-d{font-size:11px;color:var(--text2)}

/* ═══ METRIC CARD ═══ */
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:4px}
.mc{background:var(--panel);border-radius:6px;padding:12px;border:1px solid var(--border);position:relative;overflow:hidden;transition:border-color .2s}
.mc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.3}
.mc.safe{border-color:rgba(48,209,88,.4);background:rgba(48,209,88,.05)}
.mc.caut{border-color:rgba(90,200,250,.35);background:rgba(90,200,250,.05)}
.mc.warn{border-color:rgba(255,214,10,.4);background:rgba(255,214,10,.05)}
.mc.dang{border-color:rgba(255,69,58,.45);background:rgba(255,69,58,.07)}
.mc-dot{width:6px;height:6px;border-radius:50%;margin-bottom:7px;box-shadow:0 0 6px currentColor}
.mc-lbl{font-size:9px;color:var(--text3);margin-bottom:3px;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.mc-val{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--gold3)}
.mc-pct{font-size:11px;font-weight:600;margin-top:2px}
.mc-sig{font-size:9px;margin-top:6px;padding:2px 8px;border-radius:20px;display:inline-block;font-weight:700;letter-spacing:.5px}

/* ═══ CHIP BLOCK ═══ */
.cb{background:var(--panel);border-radius:6px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);position:relative}
.cb::before{content:'';position:absolute;top:0;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.3}
.crow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid rgba(201,168,76,.08)}
.crow:last-child{border-bottom:none}
.crow-name{font-size:13px;color:var(--text2)}
.crow-right{display:flex;align-items:center;gap:8px}
.crow-main{font-size:15px;font-weight:700}
.crow-chg{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}

/* ═══ NIGHT SESSION ═══ */
.nsess-wrap{background:var(--panel);border-radius:6px;border:1px solid var(--border);overflow:hidden;margin-bottom:8px;position:relative}
.nsess-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
.nsess-half{flex:1;padding:14px}
.nsess-half.day{border-right:.5px solid rgba(201,168,76,.12)}
.nsess-row{display:flex}
.nsess-badge{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.5px}
.nsess-date{font-size:10px;color:var(--text3)}
.nsess-price{font-size:24px;font-weight:700;letter-spacing:-.5px;color:var(--gold3);margin:8px 0 3px}
.nsess-chg{font-size:13px;font-weight:600}
.nsess-vol{font-size:10px;color:var(--text3);margin-top:3px}
.nsess-vs{font-size:10px;color:var(--text3);margin-top:2px}

/* ═══ MARGIN ═══ */
.margin-flow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.margin-box{text-align:center;flex:1}
.margin-box-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:.5px}
.margin-box-val{font-size:20px;font-weight:700;color:var(--gold3)}
.margin-arrow{font-size:22px;color:var(--text3);flex-shrink:0;padding:0 8px}
.margin-signal{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:.5px solid rgba(201,168,76,.1)}

/* ═══ SLIDERS ═══ */
.segc{display:flex;background:var(--dark4);border-radius:4px;padding:3px;margin-bottom:10px;border:1px solid var(--border)}
.segb{flex:1;padding:6px 4px;border-radius:3px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--text3);transition:all .2s;letter-spacing:.5px}
.segb.on{background:rgba(201,168,76,.15);color:var(--gold2);border:1px solid var(--border2)}
.scard{background:var(--panel);border-radius:6px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border)}
.scard.safe{border-color:rgba(48,209,88,.4)}
.scard.caut{border-color:rgba(90,200,250,.35)}
.scard.warn{border-color:rgba(255,214,10,.4)}
.scard.dang{border-color:rgba(255,69,58,.45)}
.scard-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.scard-name{font-size:13px;font-weight:600;color:var(--gold3)}
.scard-badge{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.5px}
.srow{display:flex;align-items:center;gap:10px}
.srow input[type=range]{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer}
.srow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px rgba(201,168,76,.5)}
.snum{font-size:15px;font-weight:700;min-width:50px;text-align:right}

/* ═══ FOOTER ═══ */
.ftnote{background:var(--panel);border-radius:6px;padding:10px 14px;font-size:10px;color:var(--text3);line-height:1.9;border:1px solid var(--border);letter-spacing:.3px}
.ftnote strong{color:var(--gold);font-family:'Cinzel',serif}

/* ═══ LOADING ═══ */
.ldwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.eye-anim{font-size:48px;animation:eyePulse 1.5s ease-in-out infinite}
.ldtxt{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
@keyframes eyePulse{0%,100%{opacity:.3;text-shadow:none}50%{opacity:1;text-shadow:0 0 20px rgba(201,168,76,.8)}}

/* ═══ UTILITY ═══ */
.up{color:#30d158}.dn{color:#ff453a}.neu{color:var(--text3)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ BAR ═══ */
.inst-bar-wrap{width:56px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:visible;position:relative}
.inst-bar-fill{height:100%;border-radius:2px;position:absolute}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-deco">
    <div class="hdr-deco-line"></div>
    <span>𓂀</span>
    <div class="hdr-deco-line r"></div>
  </div>
  <div class="hdr-top">
    <div>
      <div class="hdr-title">MARKET ORACLE</div>
      <div class="hdr-sub" id="dateLabel"></div>
    </div>
    <button class="rfsh" onclick="loadAuto()" id="rfBtn">↻</button>
  </div>
  <div class="mtabs">
    <button class="mtab on" onclick="switchMkt('us',this)">🇺🇸 美股</button>
    <button class="mtab" onclick="switchMkt('tw',this)">🇹🇼 台股</button>
  </div>
</div>
<div class="cnt" id="main">
  <div class="ldwrap">
    <div class="eye-anim">𓂀</div>
    <div class="ldtxt">召喚市場神諭中</div>
  </div>
</div>
<script>
var PROXY="https://market-proxy.q0900027293.workers.dev/";
var apiData={us:{},tw:{}};
var curMkt="us";
var usGrp="情緒";
var mVals={putcall:.85,aaii:38,breadth:55};

var US_AUTO=[
  {key:"vix",lbl:"VIX",zones:[{max:15,s:-1,t:"過度樂觀"},{max:20,s:2,t:"低波動"},{max:25,s:1,t:"正常"},{max:30,s:0,t:"警戒"},{max:40,s:-1,t:"恐慌"},{max:99,s:-2,t:"極端恐慌"}]},
  {key:"skew",lbl:"SKEW 黑天鵝",zones:[{max:115,s:2,t:"正常"},{max:130,s:1,t:"輕度風險"},{max:150,s:0,t:"中高風險"},{max:165,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端"}]},
  {key:"vvix",lbl:"VVIX",zones:[{max:80,s:2,t:"極度平靜"},{max:100,s:1,t:"正常"},{max:120,s:0,t:"偏高"},{max:140,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端不確定"}]},
  {key:"fgi",lbl:"Fear & Greed",zones:[{max:20,s:1,t:"極度恐慌"},{max:35,s:1,t:"恐慌"},{max:55,s:2,t:"中性"},{max:70,s:0,t:"貪婪"},{max:85,s:-1,t:"極度貪婪"},{max:100,s:-2,t:"過熱"}],direct:true},
  {key:"dxy",lbl:"DXY 美元",zones:[{max:100,s:2,t:"弱美元"},{max:103,s:1,t:"中性偏弱"},{max:106,s:0,t:"中性"},{max:109,s:-1,t:"強美元"},{max:999,s:-2,t:"強美元高壓"}]},
  {key:"us10y",lbl:"美債 10Y",zones:[{max:3.5,s:2,t:"低殖利率"},{max:4.0,s:1,t:"適中"},{max:4.5,s:0,t:"偏高"},{max:5.0,s:-1,t:"壓估值"},{max:99,s:-2,t:"過高危險"}]},
  {key:"gold",lbl:"黃金",zones:[{max:-1,s:1,t:"下跌"},{max:0,s:2,t:"微跌中性"},{max:.5,s:1,t:"微漲中性"},{max:1.5,s:0,t:"上漲謹慎"},{max:99,s:-1,t:"急漲避險"}],usePct:true},
  {key:"oil",lbl:"原油 WTI",zones:[{max:-2,s:-1,t:"急跌"},{max:0,s:1,t:"微跌中性"},{max:1,s:2,t:"微漲中性"},{max:2.5,s:0,t:"上漲通膨"},{max:99,s:-1,t:"急漲通膨"}],usePct:true},
  {key:"rsi",lbl:"大盤 RSI",zones:[{max:30,s:1,t:"超賣"},{max:40,s:0,t:"偏弱"},{max:60,s:2,t:"健康"},{max:70,s:1,t:"偏強"},{max:80,s:0,t:"超買警示"},{max:100,s:-1,t:"強烈超買"}],direct:true},
  {key:"mfi",lbl:"MFI 資金流向",zones:[{max:20,s:1,t:"超賣"},{max:40,s:0,t:"流出"},{max:60,s:2,t:"中性"},{max:80,s:1,t:"流入"},{max:100,s:-1,t:"超買"}],direct:true},
];
var US_MAN=[
  {key:"putcall",lbl:"Put/Call Ratio",min:.4,max:1.8,step:.01,zones:[{max:.6,s:-1,t:"過度貪婪"},{max:.85,s:1,t:"偏多"},{max:1.1,s:2,t:"均衡"},{max:1.3,s:0,t:"偏空"},{max:9,s:1,t:"極悲觀"}]},
  {key:"aaii",lbl:"AAII 多頭%",min:10,max:65,step:1,zones:[{max:25,s:1,t:"極悲觀"},{max:35,s:1,t:"偏空"},{max:45,s:2,t:"正常"},{max:55,s:0,t:"偏熱"},{max:99,s:-1,t:"過熱"}]},
  {key:"breadth",lbl:"市場廣度%",min:0,max:100,step:1,zones:[{max:35,s:-2,t:"多數股跌"},{max:45,s:0,t:"偏弱"},{max:55,s:2,t:"均衡"},{max:65,s:1,t:"多頭強勢"},{max:100,s:0,t:"過度擴張"}]},
];
var TW_AUTO=[
  {key:"twii",lbl:"加權指數",zones:[{max:-2,s:-2,t:"急跌"},{max:-1,s:-1,t:"下跌"},{max:.3,s:1,t:"持平"},{max:1,s:2,t:"上漲"},{max:99,s:1,t:"強漲"}],usePct:true},
  {key:"twd",lbl:"台幣/美金",zones:[{max:30,s:2,t:"台幣強勢"},{max:31,s:2,t:"偏強"},{max:32,s:1,t:"中性"},{max:33,s:0,t:"偏弱"},{max:34,s:-1,t:"台幣弱勢"},{max:99,s:-2,t:"台幣大貶"}]},
  {key:"twvix",lbl:"台股 VIX",zones:[{max:15,s:2,t:"低波動"},{max:20,s:2,t:"正常"},{max:25,s:1,t:"偏高"},{max:30,s:0,t:"警戒"},{max:40,s:-1,t:"恐慌"},{max:99,s:-2,t:"極端恐慌"}]},
  {key:"rsi",lbl:"台股 RSI",zones:[{max:30,s:1,t:"超賣"},{max:40,s:0,t:"偏弱"},{max:60,s:2,t:"健康"},{max:70,s:1,t:"偏強"},{max:80,s:0,t:"超買"},{max:100,s:-1,t:"強烈超買"}],direct:true},
  {key:"mfi",lbl:"MFI 資金流向",zones:[{max:20,s:1,t:"超賣"},{max:40,s:0,t:"流出"},{max:60,s:2,t:"中性"},{max:80,s:1,t:"流入"},{max:100,s:-1,t:"超買"}],direct:true},
];
var US_GROUPS={"情緒":["putcall","aaii"],"技術廣度":["breadth"]};

function gz(ind,v){for(var i=0;i<ind.zones.length;i++)if(v<=ind.zones[i].max)return ind.zones[i];return ind.zones[ind.zones.length-1];}
function ss(s){
  if(s>=2)return{cls:"safe",dot:"#30d158",bg:"rgba(48,209,88,.15)",tc:"#30d158"};
  if(s===1)return{cls:"caut",dot:"#5ac8fa",bg:"rgba(90,200,250,.12)",tc:"#5ac8fa"};
  if(s===0)return{cls:"warn",dot:"#ffd60a",bg:"rgba(255,214,10,.12)",tc:"#ffd60a"};
  if(s===-1)return{cls:"dang",dot:"#ff453a",bg:"rgba(255,69,58,.12)",tc:"#ff453a"};
  return{cls:"dang",dot:"#ff2d2d",bg:"rgba(255,45,45,.22)",tc:"#ff2d2d"};
}
function sfInfo(r){
  if(r>=.75)return{lbl:"神諭：可持倉",sub:"眾神庇護，風險可控",c:"#30d158",bg:"rgba(48,209,88,.12)",tr:"#30d158",eye:"𓂀"};
  if(r>=.55)return{lbl:"神諭：謹慎樂觀",sub:"整體偏多，留意弱項",c:"#5ac8fa",bg:"rgba(90,200,250,.1)",tr:"#5ac8fa",eye:"𓁹"};
  if(r>=.38)return{lbl:"神諭：控制倉位",sub:"多空分歧，建議觀望",c:"#ffd60a",bg:"rgba(255,214,10,.1)",tr:"#ffd60a",eye:"𓁺"};
  if(r>=.2)return{lbl:"神諭：考慮減碼",sub:"多項指標偏空",c:"#ff453a",bg:"rgba(255,69,58,.12)",tr:"#ff453a",eye:"𓁻"};
  return{lbl:"神諭：高度警戒",sub:"建議大幅減碼，避險為上",c:"#ff2d2d",bg:"rgba(255,45,45,.18)",tr:"#ff2d2d",eye:"𓁼"};
}
function combo(data){
  var vix=data.vix?.price,skew=data.skew?.price,vvix=data.vvix?.price;
  if(!vix||!skew||!vvix)return{t:"數據載入中",d:"等待神諭...",c:"#888",border:"rgba(201,168,76,.3)"};
  if(skew>145&&vix<20)return{t:"𓃭 暗流湧動",d:"高SKEW+低VIX，最危險組合",c:"#ff453a",border:"rgba(255,69,58,.5)"};
  if(skew>130&&vix>25&&vvix>120)return{t:"𓁼 全面恐慌",d:"三指標同時偏高，市場已定價下跌",c:"#ff453a",border:"rgba(255,69,58,.5)"};
  if(vvix>130)return{t:"𓁺 極端不確定",d:"VVIX暴高，VIX走向難以預測",c:"#ffd60a",border:"rgba(255,214,10,.4)"};
  if(skew<120&&vix<20&&vvix<100)return{t:"𓂀 市場平靜",d:"三指標均低，風險溢價正常",c:"#30d158",border:"rgba(48,209,88,.4)"};
  return{t:"𓁹 正常波動",d:"指標無明顯異常組合",c:"#5ac8fa",border:"rgba(90,200,250,.4)"};
}
function getV(ind,data){
  if(ind.direct)return data[ind.key]!==undefined&&data[ind.key]!==null?data[ind.key]:null;
  var d=data[ind.key];if(!d)return null;
  return ind.usePct?d.pct:d.price;
}
function calcTot(aI,mI,data){
  var tot=0;
  aI.forEach(ind=>{var v=getV(ind,data);if(v!==null&&v!==undefined)tot+=gz(ind,v).s;});
  mI.forEach(ind=>{tot+=gz(ind,mVals[ind.key]).s;});
  return tot;
}
function fmtN(n,d){if(n===null||n===undefined||isNaN(n))return"—";return parseFloat(n).toFixed(d||0);}
function fmtInt(n){if(n===null||n===undefined||isNaN(n))return"—";return parseInt(n).toLocaleString();}
function cc(n){return n>0?"#30d158":n<0?"#ff453a":"var(--text3)";}
function sgn(n){return n>0?"+":"";}

function mcCard(ind,data){
  var v=getV(ind,data);
  var z=v!==null&&v!==undefined?gz(ind,v):null;
  var st=ss(z?z.s:1);
  var val="—",pct="";
  if(v!==null&&v!==undefined){
    if(ind.direct)val=""+parseFloat(v).toFixed(ind.key==="fgi"?0:2);
    else if(ind.usePct)val=(v>0?"+":"")+v.toFixed(2)+"%";
    else{
      var d=data[ind.key];
      if(d){
        val=d.price>=1000?d.price.toLocaleString():d.price.toFixed(2);
        var p=d.pct;
        pct="<div class='mc-pct "+(p>=0?"up":"dn")+"'>"+(p>=0?"▲":"▼")+" "+Math.abs(p).toFixed(2)+"%</div>";
      }
    }
  }
  return "<div class='mc "+st.cls+"'>"
    +"<div class='mc-dot' style='background:"+st.dot+";color:"+st.dot+"'></div>"
    +"<div class='mc-lbl'>"+ind.lbl+"</div>"
    +"<div class='mc-val'>"+val+"</div>"
    +pct
    +"<span class='mc-sig' style='background:"+st.bg+";color:"+st.tc+"'>"+( z?z.t:"載入中")+"</span>"
    +"</div>";
}

function renderNight(nd){
  if(!nd)return"";
  var date=nd.date.slice(0,4)+"/"+nd.date.slice(4,6)+"/"+nd.date.slice(6,8);
  var day=nd.day,night=nd.night;
  var dc=day?parseFloat(day.change)||0:0;
  var nc=night?parseFloat(night.change)||0:0;
  var diff="",diffPct="";
  if(night&&day){
    var d=parseFloat(night.last)-parseFloat(day.last);
    var dp=day.last>0?d/parseFloat(day.last)*100:0;
    diff=sgn(d)+d.toFixed(0);
    diffPct=sgn(dp)+dp.toFixed(2)+"%";
  }
  return "<div class='nsess-wrap'><div class='nsess-row'>"
    +"<div class='nsess-half day'>"
    +"<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:4px'>"
    +"<span class='nsess-badge' style='background:rgba(48,209,88,.15);color:#30d158'>☀ 日盤</span>"
    +"<span class='nsess-date'>"+date+"</span></div>"
    +(day
      ?"<div class='nsess-price'>"+day.last+"</div>"
       +"<div class='nsess-chg' style='color:"+cc(dc)+"'>"+sgn(dc)+day.change+" ("+day.changePct+")</div>"
       +"<div class='nsess-vol'>成交 "+parseInt(day.volume).toLocaleString()+" 口</div>"
      :"<div style='font-size:12px;color:var(--text3);margin-top:12px'>無數據</div>")
    +"</div>"
    +"<div class='nsess-half'>"
    +"<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:4px'>"
    +"<span class='nsess-badge' style='background:rgba(90,200,250,.15);color:#5ac8fa'>🌙 夜盤</span>"
    +"<span class='nsess-date'>"+date+"</span></div>"
    +(night
      ?"<div class='nsess-price'>"+night.last+"</div>"
       +"<div class='nsess-chg' style='color:"+cc(nc)+"'>"+sgn(nc)+night.change+" ("+night.changePct+")</div>"
       +(diff?"<div class='nsess-vs' style='color:"+cc(parseFloat(diff))+"'>vs日盤 "+diff+" ("+diffPct+")</div>":"")
       +"<div class='nsess-vol'>成交 "+parseInt(night.volume).toLocaleString()+" 口</div>"
      :"<div style='font-size:12px;color:var(--text3);margin-top:12px'>尚未開盤</div>")
    +"</div></div></div>";
}

function renderTWChips(data){
  var fd=data.foreign_data,md=data.margin_data,pc=data.putcall_data,fut=data.futures_data,nd=data.night_data;
  var html="";

  // 台指期
  html+="<div class='stitle'>台指期行情</div>"+renderNight(nd);

  // 三大法人現貨
  html+="<div class='stitle'>三大法人現貨</div><div class='cb'>";
  if(fd&&fd.foreign!==null){
    var fdate=fd.date?fd.date.slice(0,4)+"/"+fd.date.slice(4,6)+"/"+fd.date.slice(6,8):"";
    html+="<div style='font-size:9px;color:var(--text3);margin-bottom:10px;letter-spacing:.5px'>"+fdate+" 資料</div>";
    [{n:"外資",v:fd.foreign,b:false},{n:"投信",v:fd.trust,b:false},{n:"自營商",v:fd.dealer,b:false},{n:"三大合計",v:fd.total,b:true}]
    .forEach(function(row){
      var c=cc(row.v);
      var bw=Math.min(Math.abs(row.v||0)/300*100,100).toFixed(0);
      var bc=row.v>=0?"#30d158":"#ff453a";
      html+="<div class='crow'>"
        +"<span class='crow-name'"+(row.b?" style='font-weight:700;color:var(--gold3)'":" ")+" >"+row.n+"</span>"
        +"<div class='crow-right'>"
        +"<div class='inst-bar-wrap'><div class='inst-bar-fill' style='width:"+bw+"%;background:"+bc+";opacity:.7;"+(row.v<0?"right:0;":"left:0;")+"'></div></div>"
        +"<span class='crow-main' style='color:"+c+";min-width:70px;text-align:right'>"+sgn(row.v)+fmtN(row.v,1)+" 億</span>"
        +"</div></div>";
    });
  }else{html+="<div style='font-size:12px;color:var(--text3);padding:8px 0'>數據載入中...</div>";}
  html+="</div>";

  // 三大法人期貨
  html+="<div class='stitle'>三大法人期貨淨部位</div><div class='cb'>";
  if(fut){
    var fdate2=fut.date?fut.date.slice(0,4)+"/"+fut.date.slice(4,6)+"/"+fut.date.slice(6,8):"";
    html+="<div style='font-size:9px;color:var(--text3);margin-bottom:10px;letter-spacing:.5px'>"+fdate2+" 資料</div>";
    [{n:"外資 台指(TXF)",v:fut.txf?.foreign,chg:fut.txf?.foreign_chg},
     {n:"外資 小台(MXF)",v:fut.mxf?.foreign,chg:fut.mxf?.foreign_chg},
     {n:"外資 微台(TMF)",v:fut.tmf?.foreign,chg:fut.tmf?.foreign_chg},
     {n:"投信 台指",v:fut.txf?.trust,chg:fut.txf?.trust_chg},
     {n:"自營 台指",v:fut.txf?.dealer,chg:fut.txf?.dealer_chg}]
    .forEach(function(row){
      var c=row.v!==null?cc(row.v):"var(--text3)";
      var chgH="";
      if(row.chg!==null&&row.chg!==undefined){
        var c2=cc(row.chg);
        chgH="<span style='font-size:10px;padding:1px 6px;border-radius:4px;background:"+c2+"22;color:"+c2+"'>"+(row.chg>0?"▲":"▼")+Math.abs(row.chg).toLocaleString()+"</span>";
      }
      html+="<div class='crow'><span class='crow-name'>"+row.n+"</span>"
        +"<div class='crow-right'>"+chgH
        +"<span class='crow-main' style='color:"+c+";min-width:80px;text-align:right'>"+sgn(row.v)+fmtInt(row.v)+"</span>"
        +"</div></div>";
    });
  }else{html+="<div style='font-size:12px;color:var(--text3);padding:8px 0'>數據載入中...</div>";}
  html+="</div>";

  // Put/Call
  html+="<div class='stitle'>Put / Call Ratio</div>";
  if(pc){
    var pcdate=pc.date?pc.date.slice(0,4)+"/"+pc.date.slice(4,6)+"/"+pc.date.slice(6,8):"";
    var prev=pc.prevDate?pc.prevDate.slice(0,4)+"/"+pc.prevDate.slice(4,6)+"/"+pc.prevDate.slice(6,8):"昨日";
    html+="<div class='cb'>";
    html+="<div style='font-size:9px;color:var(--text3);margin-bottom:10px;letter-spacing:.5px'>"+pcdate+" vs "+prev+"</div>";
    [{label:"未平倉比 OI",cur:pc.oiRatio,prev:pc.prevOiRatio,hi:130,mid:110},
     {label:"成交量比 Vol",cur:pc.volumeRatio,prev:pc.prevVolumeRatio,hi:120,mid:100}]
    .forEach(function(r){
      var chg=r.cur&&r.prev?r.cur-r.prev:null;
      var vc=r.cur>r.hi?"#ff453a":r.cur>r.mid?"#ffd60a":"#30d158";
      html+="<div class='crow'>"
        +"<div><div style='font-size:13px;font-weight:500;color:var(--text)'>"+r.label+"</div>"
        +"<div style='font-size:10px;color:var(--text3);margin-top:2px'>"+prev+" "+fmtN(r.prev,2)+"</div></div>"
        +"<div class='crow-right'>"
        +(chg!==null?"<span style='font-size:10px;padding:1px 6px;border-radius:4px;background:"+cc(-chg)+"22;color:"+cc(-chg)+"'>"+(chg>0?"▲":"▼")+Math.abs(chg).toFixed(2)+"</span>":"")
        +"<span class='crow-main' style='color:"+vc+"'>"+fmtN(r.cur,2)+"</span>"
        +"</div></div>";
    });
    html+="<div style='font-size:9px;color:var(--text3);margin-top:6px;letter-spacing:.3px'>OI比 &gt;130偏空 ｜ 100-130中性 ｜ &lt;100偏多</div>";
    html+="</div>";
  }

  // 融資
  html+="<div class='stitle'>融資餘額</div><div class='cb'>";
  if(md&&md.margin!==null){
    var mdate=md.date?md.date.slice(0,4)+"/"+md.date.slice(4,6)+"/"+md.date.slice(6,8):"";
    var isDown=md.marginChg<0;
    html+="<div style='font-size:9px;color:var(--text3);margin-bottom:12px;letter-spacing:.5px'>"+mdate+" 資料</div>";
    html+="<div class='margin-flow'>"
      +"<div class='margin-box'><div class='margin-box-lbl'>前日餘額</div><div class='margin-box-val' style='font-size:18px;color:var(--text2)'>"+fmtN(md.marginPrev,1)+" 億</div></div>"
      +"<div class='margin-arrow'>"+(isDown?"↘":"↗")+"</div>"
      +"<div class='margin-box'><div class='margin-box-lbl'>今日餘額</div><div class='margin-box-val'>"+fmtN(md.margin,1)+" 億</div></div>"
      +"</div>"
      +"<div class='margin-signal'>"
      +"<span style='font-size:12px;color:"+(isDown?"#30d158":"#ff453a")+"'>"+(isDown?"融資減少 偏多訊號 ▼":"融資增加 注意風險 ▲")+"</span>"
      +"<span style='font-size:13px;font-weight:700;color:"+cc(md.marginChg)+"'>"+sgn(md.marginChg)+fmtN(md.marginChg,1)+" 億 ("+sgn(md.marginChgPct)+fmtN(md.marginChgPct,2)+"%)</span>"
      +"</div>";
  }else{html+="<div style='font-size:12px;color:var(--text3);padding:8px 0'>數據載入中...</div>";}
  html+="</div>";
  return html;
}

function renderSlider(ind){
  var v=mVals[ind.key];
  var z=gz(ind,v);
  var st=ss(z.s);
  var decs=ind.step<1?2:0;
  var pct=((v-ind.min)/(ind.max-ind.min)*100).toFixed(0);
  var bg="linear-gradient(to right,"+st.dot+" 0%,"+st.dot+" "+pct+"%, #221c00 "+pct+"%, #221c00 100%)";
  return "<div class='scard "+st.cls+"' id='sc_"+ind.key+"'>"
    +"<div class='scard-hdr'>"
    +"<span class='scard-name'>"+ind.lbl+"</span>"
    +"<span class='scard-badge' id='sb_"+ind.key+"' style='background:"+st.bg+";color:"+st.tc+"'>"+z.t+"</span>"
    +"</div>"
    +"<div class='srow'>"
    +"<input type='range' min='"+ind.min+"' max='"+ind.max+"' step='"+ind.step+"' value='"+v+"' style='background:"+bg+"' "
    +"oninput=\"onSlide(this,'"+ind.key+"',"+ind.min+","+ind.max+","+decs+")\"/>"
    +"<span class='snum' id='sv_"+ind.key+"' style='color:"+st.tc+"'>"+parseFloat(v).toFixed(decs)+"</span>"
    +"</div></div>";
}

function onSlide(el,key,min,max,decs){
  var v=parseFloat(el.value);
  mVals[key]=v;
  var ind=US_MAN.find(function(i){return i.key===key;});
  if(!ind)return;
  var z=gz(ind,v);
  var st=ss(z.s);
  var pct=((v-min)/(max-min)*100).toFixed(0);
  el.style.background="linear-gradient(to right,"+st.dot+" 0%,"+st.dot+" "+pct+"%, #221c00 "+pct+"%, #221c00 100%)";
  document.getElementById("sv_"+key).textContent=v.toFixed(decs);
  document.getElementById("sv_"+key).style.color=st.tc;
  document.getElementById("sb_"+key).textContent=z.t;
  document.getElementById("sb_"+key).style.background=st.bg;
  document.getElementById("sb_"+key).style.color=st.tc;
  document.getElementById("sc_"+key).className="scard "+st.cls;
  updateBanner();
}

function updateBanner(){
  var isUS=curMkt==="us";
  var aI=isUS?US_AUTO:TW_AUTO;
  var mI=isUS?US_MAN:[];
  var data=isUS?apiData.us:apiData.tw;
  var mn=(aI.length+mI.length)*-2,mx=(aI.length+mI.length)*2;
  var tot=calcTot(aI,mI,data);
  var r=(tot-mn)/(mx-mn);
  var sf=sfInfo(r);
  var b=document.getElementById("sban");
  if(!b)return;
  b.style.background=sf.bg;
  b.style.borderColor=sf.c+"55";
  document.getElementById("sban-lbl").textContent=sf.lbl;
  document.getElementById("sban-lbl").style.color=sf.c;
  document.getElementById("sban-sub").textContent=sf.sub;
  document.getElementById("pbar-fill").style.width=(r*100).toFixed(0)+"%";
  document.getElementById("pbar-fill").style.background=sf.tr;
  document.getElementById("pbar-fill").style.boxShadow="0 0 8px "+sf.tr;
  document.getElementById("pbar-note").textContent="𓂀 "+tot+" / "+mx;
  document.getElementById("pbar-note").style.color=sf.c;
}

function setGrp(g){usGrp=g;renderManPanel();}
function renderManPanel(){
  var panel=document.getElementById("manPanel");
  if(!panel)return;
  var html="<div class='segc'>";
  Object.keys(US_GROUPS).forEach(function(g){
    html+="<button class='segb"+(g===usGrp?" on":"")+"' onclick=\"setGrp('"+g+"')\">"+g+"</button>";
  });
  html+="</div>";
  (US_GROUPS[usGrp]||[]).forEach(function(k){
    var ind=US_MAN.find(function(i){return i.key===k;});
    if(ind)html+=renderSlider(ind);
  });
  panel.innerHTML=html;
}

function render(mkt){
  var isUS=mkt==="us";
  var aI=isUS?US_AUTO:TW_AUTO;
  var mI=isUS?US_MAN:[];
  var data=isUS?apiData.us:apiData.tw;
  var mn=(aI.length+mI.length)*-2,mx=(aI.length+mI.length)*2;
  var tot=calcTot(aI,mI,data);
  var r=(tot-mn)/(mx-mn);
  var sf=sfInfo(r);

  var cb2="";
  if(isUS){
    var cb=combo(data);
    cb2="<div class='combo' style='border-color:"+cb.border+"'>"
      +"<div class='combo-tt'>𓃭 VIX · SKEW · VVIX 三角組合</div>"
      +"<div class='combo-v' style='color:"+cb.c+"'>"+cb.t+"</div>"
      +"<div class='combo-d'>"+cb.d+"</div></div>";
  }

  var html="<div class='sban' id='sban' style='background:"+sf.bg+";border-color:"+sf.c+"55'>"
    +"<div class='sban-eye'>"+sf.eye+" 神諭</div>"
    +"<div id='sban-lbl' class='sban-label' style='color:"+sf.c+"'>"+sf.lbl+"</div>"
    +"<div id='sban-sub' class='sban-sub'>"+sf.sub+"</div>"
    +"<div class='pbar'><div class='pbar-fill' id='pbar-fill' style='width:"+(r*100).toFixed(0)+"%;background:"+sf.tr+";box-shadow:0 0 8px "+sf.tr+"'></div></div>"
    +"<div class='pbar-note' id='pbar-note' style='color:"+sf.c+"'>𓂀 "+tot+" / "+mx+"</div>"
    +"</div>"
    +cb2
    +"<div class='stitle'>自動抓取指標</div>"
    +"<div class='g2'>";
  aI.forEach(function(ind){html+=mcCard(ind,data);});
  html+="</div>";

  if(!isUS){
    html+=renderTWChips(data);
  }else{
    html+="<div class='stitle'>手動輸入指標</div><div id='manPanel'></div>";
  }

  html+="<div class='ftnote'>"
    +"𓂀 <strong>自動更新</strong> 每15分鐘 &nbsp;·&nbsp; "
    +(isUS?"<strong>手動</strong> Put/Call · AAII · 市場廣度":"<strong>台股籌碼</strong> 盤後3~4點自動更新")
    +"</div>";

  document.getElementById("main").innerHTML=html;
  if(isUS)renderManPanel();
}

function switchMkt(mkt,btn){
  curMkt=mkt;
  document.querySelectorAll(".mtab").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  render(mkt);
}

async function loadAuto(){
  var btn=document.getElementById("rfBtn");
  if(btn)btn.classList.add("spin");
  try{
    var ctrl=new AbortController();
    var tid=setTimeout(function(){ctrl.abort();},15000);
    var res=await fetch(PROXY,{cache:"no-store",signal:ctrl.signal});
    clearTimeout(tid);
    var json=await res.json();
    if(json&&json.us)apiData=json;
    else apiData={us:{},tw:{}};
  }catch(e){apiData={us:{},tw:{}};}
  if(btn)btn.classList.remove("spin");
  render(curMkt);
}

var d=new Date();
document.getElementById("dateLabel").textContent=
  d.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"short"})
  +" · 每15分自動更新";
loadAuto();
setInterval(loadAuto,15*60*1000);
</script>
