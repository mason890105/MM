<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>美股位階安全儀表板</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5f5f0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="美股儀表板">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:16px;max-width:600px;margin:0 auto}
h1{font-size:18px;font-weight:500;margin-bottom:2px}
.meta{font-size:12px;color:#888;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.refresh-btn{font-size:11px;padding:3px 10px;border-radius:6px;border:0.5px solid #bbb;background:#fff;cursor:pointer;color:#444}
.refresh-btn:active{background:#eee}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.safety-card{border-radius:12px;padding:16px 18px;margin-bottom:12px;border-width:1.5px;border-style:solid}
.combo-card{border-radius:8px;padding:10px 14px;margin-bottom:12px;border-width:0.5px;border-style:solid}
.auto-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:14px}
.auto-card{border-radius:8px;padding:10px 14px;border-width:0.5px;border-style:solid}
.auto-label{font-size:11px;margin-bottom:4px}
.auto-val{font-size:20px;font-weight:500}
.auto-pct{font-size:11px;margin-top:2px}
.auto-sig{font-size:11px;margin-top:3px}
.group-tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-bottom:10px}
.tab{border-radius:8px;padding:8px 4px;cursor:pointer;text-align:center;font-size:12px;border:0.5px solid #ddd;background:#fff;transition:all 0.15s}
.tab.active{border-width:1.5px;font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;margin:0 auto 4px}
.ind-card{border-radius:8px;padding:10px 14px;margin-bottom:8px;border-width:0.5px;border-style:solid}
.ind-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ind-label{font-size:14px;font-weight:500}
.ind-badge{font-size:11px;padding:2px 8px;border-radius:6px;background:#fff;border-width:0.5px;border-style:solid}
.ind-controls{display:flex;align-items:center;gap:10px}
.ind-controls input[type=range]{flex:1;cursor:pointer}
.ind-val{font-size:15px;font-weight:500;min-width:52px;text-align:right}
.score-bar-wrap{background:#e5e5e0;border-radius:4px;height:8px;overflow:hidden;margin:10px 0 4px}
.score-bar{height:100%;border-radius:4px;transition:width 0.3s}
.score-note{font-size:11px;text-align:right}
.footer{margin-top:14px;padding:10px 14px;background:#fff;border-radius:8px;font-size:11px;color:#888;line-height:1.8;border:0.5px solid #e5e5e0}
.footer strong{color:#444;font-weight:500}
@media(prefers-color-scheme:dark){
  body{background:#1a1a1a;color:#e5e5e0}
  .tab,.refresh-btn{background:#2a2a2a;border-color:#444}
  .ind-badge,.footer{background:#2a2a2a}
  .score-bar-wrap{background:#333}
}
</style>
</head>
<body>
<h1>美股三大指數位階安全</h1>
<div class="meta">
  <span id="dateLabel"></span>
  <button class="refresh-btn" onclick="loadAuto()">重新整理</button>
</div>
<div id="mainContent"><div class="loading">載入市場數據中...</div></div>
<script>
const PROXY="https://market-proxy.q0900027293.workers.dev/";
const AUTO_INDS=[
  {key:"vix",label:"VIX 恐慌指數",zones:[{max:15,s:-1,t:"過度樂觀"},{max:20,s:2,t:"低波動"},{max:25,s:1,t:"正常"},{max:30,s:0,t:"警戒"},{max:40,s:-1,t:"恐慌"},{max:99,s:-2,t:"極端恐慌"}]},
  {key:"skew",label:"SKEW 黑天鵝",zones:[{max:115,s:2,t:"正常"},{max:130,s:1,t:"輕度風險"},{max:150,s:0,t:"中高風險"},{max:165,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端"}]},
  {key:"vvix",label:"VVIX",zones:[{max:80,s:2,t:"極度平靜"},{max:100,s:1,t:"正常"},{max:120,s:0,t:"偏高"},{max:140,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端不確定"}]},
  {key:"dxy",label:"DXY 美元指數",zones:[{max:100,s:2,t:"弱美元 利多"},{max:103,s:1,t:"中性偏弱"},{max:106,s:0,t:"中性"},{max:109,s:-1,t:"強美元 壓制"},{max:999,s:-2,t:"強美元 高壓"}]},
  {key:"us10y",label:"美債 10Y%",zones:[{max:3.5,s:2,t:"低殖利率 偏多"},{max:4.0,s:1,t:"適中"},{max:4.5,s:0,t:"偏高"},{max:5.0,s:-1,t:"壓估值"},{max:99,s:-2,t:"過高 危險"}]},
  {key:"gold",label:"黃金 漲跌%",zones:[{max:-1,s:1,t:"下跌 偏風險"},{max:0,s:2,t:"微跌 中性"},{max:0.5,s:1,t:"微漲 中性"},{max:1.5,s:0,t:"上漲 謹慎"},{max:99,s:-1,t:"急漲 避險需求高"}],usePct:true},
  {key:"oil",label:"原油 漲跌%",zones:[{max:-2,s:-1,t:"急跌 需求疑慮"},{max:0,s:1,t:"微跌 中性"},{max:1,s:2,t:"微漲 中性"},{max:2.5,s:0,t:"上漲 通膨壓力"},{max:99,s:-1,t:"急漲 通膨風險"}],usePct:true},
  {key:"fgi",label:"Fear & Greed",zones:[{max:20,s:1,t:"極度恐慌(逆向)"},{max:35,s:1,t:"恐慌"},{max:55,s:2,t:"中性"},{max:70,s:0,t:"貪婪 注意"},{max:85,s:-1,t:"極度貪婪"},{max:100,s:-2,t:"過熱 高風險"}],noPrice:true},
];
const MANUAL_INDS=[
  {key:"putcall",label:"Put/Call Ratio",min:0.4,max:1.8,step:0.01,def:0.85,zones:[{max:0.6,s:-1,t:"過度貪婪"},{max:0.85,s:1,t:"偏多"},{max:1.1,s:2,t:"均衡"},{max:1.3,s:0,t:"偏空"},{max:9,s:1,t:"極悲觀(逆向)"}]},
  {key:"aaii",label:"AAII 多頭%",min:10,max:65,step:1,def:38,zones:[{max:25,s:1,t:"極悲觀(逆向)"},{max:35,s:1,t:"偏空"},{max:45,s:2,t:"正常"},{max:55,s:0,t:"偏多偏熱"},{max:99,s:-1,t:"過熱"}]},
  {key:"mfi",label:"MFI 資金流向",min:0,max:100,step:1,def:55,zones:[{max:20,s:1,t:"超賣(機會)"},{max:40,s:0,t:"資金流出"},{max:60,s:2,t:"中性"},{max:80,s:1,t:"資金流入"},{max:100,s:-1,t:"超買"}]},
  {key:"breadth",label:"市場廣度%",min:0,max:100,step:1,def:55,zones:[{max:35,s:-2,t:"多數股跌"},{max:45,s:0,t:"偏弱"},{max:55,s:2,t:"均衡"},{max:65,s:1,t:"多頭強勢"},{max:100,s:0,t:"過度擴張"}]},
  {key:"rsi",label:"大盤 RSI",min:0,max:100,step:1,def:52,zones:[{max:30,s:1,t:"超賣"},{max:40,s:0,t:"偏弱"},{max:60,s:2,t:"健康"},{max:70,s:1,t:"偏強"},{max:80,s:0,t:"超買警示"},{max:100,s:-1,t:"強烈超買"}]},
];
const MANUAL_GROUPS=["情緒類","資金技術"];
const MANUAL_GROUP_MAP={"情緒類":["putcall","aaii"],"資金技術":["mfi","breadth","rsi"]};
let autoData={};
const manualVals={};
MANUAL_INDS.forEach(i=>manualVals[i.key]=i.def);
let activeManualGroup="情緒類";

function getZone(ind,v){for(const z of ind.zones)if(v<=z.max)return z;return ind.zones[ind.zones.length-1];}
function scColor(s){
  if(s>=2)return{bg:"#EAF3DE",bd:"#639922",tx:"#27500A"};
  if(s===1)return{bg:"#E1F5EE",bd:"#1D9E75",tx:"#085041"};
  if(s===0)return{bg:"#FAEEDA",bd:"#EF9F27",tx:"#633806"};
  if(s===-1)return{bg:"#FCEBEB",bd:"#E24B4A",tx:"#791F1F"};
  return{bg:"#F7C1C1",bd:"#A32D2D",tx:"#501313"};
}
function safetyInfo(r){
  if(r>=0.7)return{label:"安全 可持倉",sub:"指標多數健康",bg:"#EAF3DE",c:"#27500A",bar:"#639922"};
  if(r>=0.5)return{label:"偏安全 謹慎樂觀",sub:"部分指標偏弱",bg:"#E1F5EE",c:"#085041",bar:"#1D9E75"};
  if(r>=0.3)return{label:"中性 控制倉位",sub:"多空分歧明顯",bg:"#FAEEDA",c:"#633806",bar:"#EF9F27"};
  if(r>=0.1)return{label:"偏危險 減碼",sub:"多項指標亮紅燈",bg:"#FCEBEB",c:"#791F1F",bar:"#E24B4A"};
  return{label:"危險 高度警戒",sub:"建議大幅減碼",bg:"#F7C1C1",c:"#501313",bar:"#A32D2D"};
}
function comboInfo(vix,skew,vvix){
  if(!vix||!skew||!vvix)return{t:"數據載入中",d:"等待自動數據",c:"#888",bg:"#f0f0f0"};
  if(skew>145&&vix<20)return{t:"暗流湧動",d:"高SKEW+低VIX 最危險組合",c:"#A32D2D",bg:"#F7C1C1"};
  if(skew>130&&vix>25&&vvix>120)return{t:"全面恐慌",d:"三指標同時偏高，市場已定價下跌",c:"#E24B4A",bg:"#FCEBEB"};
  if(vvix>130)return{t:"極端不確定",d:"VVIX暴高，VIX走向難以預測",c:"#E24B4A",bg:"#FCEBEB"};
  if(skew<120&&vix<20&&vvix<100)return{t:"市場平靜",d:"三指標均低，風險溢價正常",c:"#27500A",bg:"#EAF3DE"};
  return{t:"正常波動",d:"指標無明顯異常組合",c:"#085041",bg:"#E1F5EE"};
}
function calcAllScores(){
  let total=0;
  AUTO_INDS.forEach(ind=>{
    let v;
    if(ind.key==="fgi")v=autoData.fgi;
    else if(autoData[ind.key])v=ind.usePct?autoData[ind.key].pct:autoData[ind.key].price;
    if(v!==undefined&&v!==null)total+=getZone(ind,v).s;
  });
  MANUAL_INDS.forEach(ind=>{total+=getZone(ind,manualVals[ind.key]).s;});
  return total;
}
function dotColorFor(keys){
  let tot=0,cnt=0;
  keys.forEach(k=>{const ind=MANUAL_INDS.find(i=>i.key===k);if(ind){tot+=getZone(ind,manualVals[k]).s;cnt++;}});
  if(!cnt)return"#888";
  const r=(tot-cnt*-2)/(cnt*4);
  return r>=0.6?"#639922":r>=0.4?"#1D9E75":r>=0.25?"#EF9F27":"#E24B4A";
}
function render(){
  const mn=(AUTO_INDS.length+MANUAL_INDS.length)*-2;
  const mx=(AUTO_INDS.length+MANUAL_INDS.length)*2;
  const total=calcAllScores();
  const r=(total-mn)/(mx-mn);
  const sf=safetyInfo(r);
  const vix=autoData.vix?.price,skew=autoData.skew?.price,vvix=autoData.vvix?.price;
  const cb=comboInfo(vix,skew,vvix);
  let html=`
  <div class="safety-card" style="background:${sf.bg};border-color:${sf.bar}">
    <div style="font-size:11px;color:${sf.c};margin-bottom:4px">綜合位階安全評估</div>
    <div style="font-size:24px;font-weight:500;color:${sf.c};margin-bottom:4px">${sf.label}</div>
    <div style="font-size:12px;color:${sf.c};margin-bottom:10px">${sf.sub}</div>
    <div class="score-bar-wrap"><div class="score-bar" style="width:${(r*100).toFixed(0)}%;background:${sf.bar}"></div></div>
    <div class="score-note" style="color:${sf.c}">綜合分 ${total} （範圍 ${mn} ~ ${mx}）</div>
  </div>
  <div class="combo-card" style="background:${cb.bg};border-color:${cb.c}">
    <div style="font-size:11px;color:${cb.c};margin-bottom:2px">VIX + SKEW + VVIX 組合訊號</div>
    <div style="font-size:15px;font-weight:500;color:${cb.c}">${cb.t}</div>
    <div style="font-size:12px;color:${cb.c}">${cb.d}</div>
  </div>
  <div style="font-size:12px;font-weight:500;color:#444;margin-bottom:8px">自動抓取指標</div>
  <div class="auto-grid">`;
  AUTO_INDS.forEach(ind=>{
    let displayVal,displayPct="",sig,pct;
    if(ind.key==="fgi"){
      const v=autoData.fgi;
      sig=v!=null?getZone(ind,v):null;
      displayVal=v!=null?v:"—";
    } else {
      const d=autoData[ind.key];
      if(d){
        const v=ind.usePct?d.pct:d.price;
        pct=d.pct;sig=getZone(ind,v);
        displayVal=ind.usePct?`${pct>0?"+":""}${pct.toFixed(2)}%`:d.price.toLocaleString();
        displayPct=ind.usePct?"":` <div class="auto-pct" style="color:${pct>=0?"#1D9E75":"#E24B4A"}">${pct>=0?"▲":"▼"} ${Math.abs(pct).toFixed(2)}%</div>`;
      } else {displayVal="—";sig=null;}
    }
    const c=sig?scColor(sig.s):{bg:"#f5f5f0",bd:"#ddd",tx:"#888"};
    html+=`<div class="auto-card" style="background:${c.bg};border-color:${c.bd}">
      <div class="auto-label" style="color:${c.tx}">${ind.label}</div>
      <div class="auto-val" style="color:${c.tx}">${displayVal}</div>
      ${displayPct}
      <div class="auto-sig" style="color:${c.tx}">${sig?sig.t:"載入中..."}</div>
    </div>`;
  });
  html+=`</div>
  <div style="font-size:12px;font-weight:500;color:#444;margin-bottom:8px">手動輸入指標（盤後更新）</div>
  <div class="group-tabs">`;
  MANUAL_GROUPS.forEach(g=>{
    const isActive=g===activeManualGroup;
    const dc=dotColorFor(MANUAL_GROUP_MAP[g]);
    html+=`<div class="tab${isActive?" active":""}" onclick="setGroup('${g}')" style="${isActive?`border-color:${dc};border-width:1.5px;font-weight:500`:""}">
      <div class="dot" style="background:${dc}"></div>${g}
    </div>`;
  });
  html+=`</div><div id="manualPanel"></div>
  <div class="footer">
    <strong>自動：</strong>VIX / SKEW / VVIX / DXY / 美債 / 黃金 / 原油 / Fear&amp;Greed &nbsp;|&nbsp;
    <strong>手動（盤後）：</strong>Put/Call / AAII / MFI / 廣度 / RSI
  </div>`;
  document.getElementById("mainContent").innerHTML=html;
  renderManualPanel();
}
function setGroup(g){activeManualGroup=g;render();}
function renderManualPanel(){
  const panel=document.getElementById("manualPanel");
  if(!panel)return;
  const keys=MANUAL_GROUP_MAP[activeManualGroup];
  let html="";
  keys.forEach(k=>{
    const ind=MANUAL_INDS.find(i=>i.key===k);
    const z=getZone(ind,manualVals[k]);
    const c=scColor(z.s);
    const decs=ind.step<1?2:0;
    html+=`<div class="ind-card" style="background:${c.bg};border-color:${c.bd}">
      <div class="ind-header">
        <span class="ind-label" style="color:${c.tx}">${ind.label}</span>
        <span class="ind-badge" style="color:${c.tx};border-color:${c.bd}">${z.t}</span>
      </div>
      <div class="ind-controls">
        <input type="range" min="${ind.min}" max="${ind.max}" step="${ind.step}" value="${manualVals[k]}"
          style="accent-color:${c.bd};flex:1"
          oninput="updateManual('${k}',parseFloat(this.value));this.nextElementSibling.textContent=parseFloat(this.value).toFixed(${decs})"/>
        <span class="ind-val" style="color:${c.tx}">${parseFloat(manualVals[k]).toFixed(decs)}</span>
      </div>
    </div>`;
  });
  panel.innerHTML=html;
}
function updateManual(key,val){manualVals[key]=val;render();}
async function loadAuto(){
  try{
    const res=await fetch(PROXY,{cache:"no-store"});
    autoData=await res.json();
  }catch(e){autoData={};console.error("數據載入失敗",e);}
  render();
}
document.getElementById("dateLabel").textContent=new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"short"});
loadAuto();
setInterval(loadAuto,15*60*1000);
</script>
</body>
</html>
