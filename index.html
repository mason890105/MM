<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Market Oracle</title>
<meta name="theme-color" content="#0d0d0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0d0d0f;color:#f0f0f2;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;font-size:15px;line-height:1.5}
body{padding:0 0 60px}

/* ── HEADER ── */
.hdr{background:#141416;border-bottom:1px solid #2a2a2e;padding:14px 16px 0;position:sticky;top:0;z-index:10
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hdr-title{font-size:18px;font-weight:700;color:#f0f0f2}
.hdr-title span{color:#40c4ff}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-time{font-size:12px;color:#4a4a50}
.rfsh{width:32px;height:32px;border:1px solid #3a3a3f;border-radius:6px;background:#1c1c1f;cursor:pointer;color:#8a8a90;font-size:15px;display:flex;align-items:center;justify-content:center}
.rfsh:active{opacity:.6}
.rfsh.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STATUS ── */
.status{display:flex;align-items:center;gap:6px;padding:6px 0 10px;font-size:12px;color:#4a4a50}
.dot{width:6px;height:6px;border-radius:50%;background:#00e676;flex-shrink:0}
.dot.off{background:#4a4a50}
.pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.pill.open  {background:rgba(0,230,118,.12);color:#00e676}
.pill.pre   {background:rgba(255,171,0,.12);color:#ffab00}
.pill.post  {background:rgba(64,196,255,.12);color:#40c4ff}
.pill.closed{background:#1c1c1f;color:#4a4a50}

/* ── TABS ── */
.tabs{display:flex;margin:0 -16px;border-top:1px solid #2a2a2e}
.tab{flex:1;padding:10px 8px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:600;color:#4a4a50;border-bottom:2px solid transparent;transition:color .15s;margin-bottom:-1px}
.tab.on{color:#f0f0f2;border-bottom-color:#40c4ff}

/* ── CONTENT ── */
.cnt{padding:0 16px}
.sec{margin-top:18px}
.sec-title{font-size:11px;font-weight:700;color:#4a4a50;letter-spacing:1.5px;text-transform:uppercase;padding-bottom:7px;border-bottom:1px solid #2a2a2e}

/* ── ORACLE ── */
.oracle{background:#1c1c1f;border-radius:10px;padding:16px;margin-top:14px;border:1px solid #2a2a2e}
.oracle-label{font-size:11px;font-weight:600;color:#4a4a50;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.oracle-verdict{font-size:22px;font-weight:700;margin-bottom:3px;letter-spacing:-.3px}
.oracle-sub{font-size:14px;color:#8a8a90;margin-bottom:12px}
.oracle-bar{height:3px;background:#242428;border-radius:2px;overflow:hidden;margin-bottom:5px}
.oracle-fill{height:100%;border-radius:2px;transition:width .5s ease}
.oracle-score{font-size:11px;color:#4a4a50;text-align:right}

/* ── COMBO ── */
.combo{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #2a2a2e}
.combo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.combo-val{font-size:15px;font-weight:600}
.combo-desc{font-size:13px;color:#8a8a90;margin-top:2px}

/* ── PRICE ROW ── */
.prow{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #2a2a2e}
.prow:last-child{border-bottom:none}
.prow-left{flex:1;min-width:0}
.prow-sym{font-size:14px;font-weight:600;color:#f0f0f2}
.prow-name{font-size:12px;color:#4a4a50;margin-top:2px}
.prow-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.prow-price{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px;color:#f0f0f2}
.prow-price.up{color:#00e676}
.prow-price.dn{color:#ff1744}
.prow-chg{font-size:12px;font-weight:600;min-width:90px;text-align:right}
.prow-zone{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;margin-left:4px;white-space:nowrap}
.prow-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:3px}
.prow-badge.open{background:rgba(0,230,118,.12);color:#00e676}
.prow-badge.pre {background:rgba(255,171,0,.12);color:#ffab00}
.prow-badge.post{background:rgba(64,196,255,.12);color:#40c4ff}

/* ── 兩欄並列 ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0}
.g2 .prow{padding:10px 8px 10px 0;border-bottom:1px solid #2a2a2e}
.g2 .prow:nth-child(even){padding:10px 0 10px 14px;border-left:1px solid #2a2a2e}
.g2 .prow:last-child{border-bottom:none}
.g2 .prow:nth-last-child(2):nth-child(odd){border-bottom:none}
.g2 .mrow{padding:9px 8px 9px 0;border-bottom:1px solid #2a2a2e}
.g2 .mrow:nth-child(even){padding:9px 0 9px 14px;border-left:1px solid #2a2a2e}
.g2 .mrow:last-child{border-bottom:none}
.g2 .mrow:nth-last-child(2):nth-child(odd){border-bottom:none}

/* ── 三欄並列 ── */
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
.g3 .prow{padding:10px 6px 10px 0;border-bottom:1px solid #2a2a2e}
.g3 .prow:nth-child(3n+2){padding:10px 6px;border-left:1px solid #2a2a2e}
.g3 .prow:nth-child(3n){padding:10px 0 10px 6px;border-left:1px solid #2a2a2e}
.g3 .prow:nth-last-child(-n+3){border-bottom:none}

/* ── METRIC ROW ── */
.mrow{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid #2a2a2e;gap:12px}
.mrow:last-child{border-bottom:none}
.mrow-lbl{font-size:14px;color:#8a8a90;flex:1;min-width:0}
.mrow-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}
.mrow-zone{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}

/* ── MANUAL INPUT ── */
.manual-item{padding:12px 0;border-bottom:1px solid #2a2a2e}
.manual-item:last-child{border-bottom:none}
.manual-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.manual-lbl{font-size:14px;font-weight:600;color:#f0f0f2}
.manual-status{display:flex;align-items:center;gap:6px}
.manual-val-display{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.manual-zone{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.manual-meta{font-size:11px;color:#4a4a50;margin-bottom:7px}
.manual-ai-tag{font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(64,196,255,.12);color:#40c4ff;font-weight:600;margin-left:4px}
.manual-input-row{display:flex;gap:6px;align-items:center}
.manual-input-row input{flex:1;background:#242428;border:1px solid #3a3a3f;border-radius:8px;padding:8px 12px;font-size:15px;color:#f0f0f2;outline:none}
.manual-input-row input:focus{border-color:#40c4ff}
.manual-btn{padding:8px 16px;background:#40c4ff;border:none;border-radius:8px;color:#000;font-size:14px;font-weight:700;cursor:pointer}
.manual-btn:active{opacity:.7}
.manual-hint{font-size:11px;color:#4a4a50;margin-top:5px}

/* ── CHIP TABLE ── */
.ct{width:100%;border-collapse:collapse}
.ct tr{border-bottom:1px solid #2a2a2e}
.ct tr:last-child{border-bottom:none}
.ct td{padding:10px 4px;font-size:14px;vertical-align:middle}
.ct-lbl{color:#8a8a90}
.ct-bar{width:44px;padding:0 6px}
.ct-bar-bg{height:2px;background:#242428;position:relative;border-radius:1px}
.ct-bar-fill{height:100%;position:absolute;left:0;top:0;border-radius:1px}
.ct-val{font-size:14px;font-weight:700;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.ct-chg{font-size:11px;text-align:right;padding-left:6px;white-space:nowrap}
.ct-date{font-size:12px;color:#4a4a50;padding:5px 0 7px}

/* ── SESSION ── */
.sess{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#2a2a2e;border-radius:8px;overflow:hidden;margin-bottom:4px}
.sess-half{background:#141416;padding:14px}
.sess-tag{font-size:11px;color:#4a4a50;letter-spacing:.5px;margin-bottom:8px;font-weight:600;text-transform:uppercase}
.sess-price{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:3px;letter-spacing:-.5px}
.sess-chg{font-size:13px;font-weight:600;margin-bottom:3px}
.sess-vol{font-size:12px;color:#4a4a50}
.sess-vs{font-size:12px;margin-top:3px}

/* ── P/C ── */
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#2a2a2e;border-radius:8px;overflow:hidden;margin-bottom:8px}
.pc-half{background:#141416;padding:14px}
.pc-sess{font-size:11px;color:#4a4a50;letter-spacing:.5px;margin-bottom:10px;font-weight:600;text-transform:uppercase}
.pc-num{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px;letter-spacing:-.5px}
.pc-sub{font-size:12px;color:#4a4a50;margin-bottom:8px}
.pc-sig{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;display:inline-block}
.pc-drow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a2a2e}
.pc-drow:last-child{border-bottom:none}
.pc-dlbl{font-size:13px;color:#8a8a90}
.pc-dval{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}

/* ── MARGIN ── */
.margin-flow{display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid #2a2a2e}
.margin-num{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.margin-arrow{font-size:20px;color:#4a4a50;padding:0 4px}
.margin-sig{display:flex;justify-content:space-between;align-items:center;padding:10px 0}

/* ── SLIDERS ── */
.seg{display:flex;border-bottom:1px solid #2a2a2e;margin-bottom:2px}
.segb{flex:1;padding:9px 4px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#4a4a50;border-bottom:2px solid transparent;transition:color .15s;margin-bottom:-1px}
.segb.on{color:#f0f0f2;border-bottom-color:#40c4ff}
.srow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #2a2a2e}
.srow:last-child{border-bottom:none}
.srow-lbl{font-size:13px;color:#8a8a90;width:110px;flex-shrink:0}
.srow-zone{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;width:72px;flex-shrink:0;text-align:center}
.srow-wrap{flex:1;display:flex;align-items:center;gap:10px}
.srow-wrap input[type=range]{flex:1;-webkit-appearance:none;height:2px;border-radius:1px;outline:none;cursor:pointer;background:#3a3a3f}
.srow-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#40c4ff;cursor:pointer}
.srow-num{font-size:14px;font-weight:700;min-width:44px;text-align:right;font-variant-numeric:tabular-nums}

/* ── FOOTER ── */
.footer{padding:14px 16px;border-top:1px solid #2a2a2e;font-size:12px;color:#4a4a50;line-height:2}

/* ── LOADING ── */
.ldwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 16px;gap:10px}
.ld-txt{font-size:14px;color:#4a4a50}

/* ── UTILS ── */
.up{color:#00e676}.dn{color:#ff1744}.neu{color:#4a4a50}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">Market <span>Oracle</span></div>
    <div class="hdr-right">
      <div class="hdr-time" id="dateLabel"></div>
      <button class="rfsh" id="rfBtn" onclick="loadDeep()">↻</button>
    </div>
  </div>
  <div class="status">
    <div class="dot" id="liveDot"></div>
    <span id="liveLabel">連線中</span>
    <span class="pill closed" id="mktState">--</span>
    <span style="margin-left:auto" id="statusTime"></span>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchMkt('us',this)">🇺🇸 美股</button>
    <button class="tab" onclick="switchMkt('tw',this)">🇹🇼 台股</button>
  </div>
</div>

<div class="cnt" id="main">
  <div class="ldwrap"><div class="ld-txt">載入中...</div></div>
</div>

<script>
var WORKER   ="https://market-proxy.q0900027293.workers.dev";
var BATCH_URL=WORKER+"/batch";
var DEEP_URL =WORKER+"/";

var US_FUT={es:{sym:"ES=F",short:"ES",name:"S&P 500"},nq:{sym:"NQ=F",short:"NQ",name:"Nasdaq 100"},ym:{sym:"YM=F",short:"YM",name:"Dow Jones"},rty:{sym:"RTY=F",short:"RTY",name:"Russell 2000"}};
var US_COM={gold:{sym:"GC=F",short:"黃金",dec:2},oil:{sym:"CL=F",short:"原油 WTI",dec:2},dxy:{sym:"DX-Y.NYB",short:"美元指數",dec:3},us10y:{sym:"^TNX",short:"美債 10Y",dec:3}};
var US_VIX={vix:{sym:"^VIX",short:"VIX"},vvix:{sym:"^VVIX",short:"VVIX"},skew:{sym:"^SKEW",short:"SKEW"}};
var TW_LIVE={twii:{sym:"^TWII",short:"TWII",name:"加權指數"},otc:{sym:"^TWOII",short:"OTC",name:"櫃買指數"},txf:{sym:"TXF=F",short:"TXF",name:"台指期貨"}};

var MANUAL_KEYS=["putcall","aaii","trin"];
var manualData={};
MANUAL_KEYS.forEach(k=>{
  try{var s=localStorage.getItem("manual_"+k);if(s)manualData[k]=JSON.parse(s);}catch{}
});
function saveManual(key,val){
  var obj={val:parseFloat(val),updatedAt:new Date().toISOString(),source:"manual"};
  manualData[key]=obj;
  try{localStorage.setItem("manual_"+key,JSON.stringify(obj));}catch{}
}
function setAIManual(key,val,fetchedAt){
  if(val===null||val===undefined)return;
  var obj={val:parseFloat(val),updatedAt:fetchedAt||new Date().toISOString(),source:"ai"};
  manualData[key]=obj;
  try{localStorage.setItem("manual_"+key,JSON.stringify(obj));}catch{}
}
function getManualVal(key){return manualData[key]?.val??null;}
function fmtUpdated(iso){
  if(!iso)return"未設定";
  var d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/60000);
  if(diff<1)return"剛剛";if(diff<60)return diff+"分鐘前";
  if(diff<1440)return Math.floor(diff/60)+"小時前";
  return d.toLocaleDateString("zh-TW",{month:"2-digit",day:"2-digit"});
}
function usMarketState(){
  var now=new Date(),jan=new Date(now.getFullYear(),0,1),jul=new Date(now.getFullYear(),6,1);
  var isDST=now.getTimezoneOffset()<Math.max(jan.getTimezoneOffset(),jul.getTimezoneOffset());
  var et=new Date(now.getTime()+(now.getTimezoneOffset()+(isDST?-4:-5)*60)*60000);
  var mins=et.getHours()*60+et.getMinutes(),dow=et.getDay();
  if(dow===0||dow===6)return"closed";
  if(mins>=240&&mins<570)return"pre";if(mins>=570&&mins<960)return"open";
  if(mins>=960&&mins<1200)return"post";return"closed";
}
var STATE_LBL={pre:"盤前",open:"盤中",post:"盤後",closed:"已收盤"};
var apiData={us:{},tw:{}},liveData={},curMkt="us",liveTimer=null,liveOK=false;

var US_AUTO=[
  {key:"vix",  lbl:"VIX",         zones:[{max:15,s:-1,t:"過度樂觀"},{max:20,s:2,t:"低波動"},{max:25,s:1,t:"正常"},{max:30,s:0,t:"警戒"},{max:40,s:-1,t:"恐慌"},{max:99,s:-2,t:"極端恐慌"}]},
  {key:"skew", lbl:"SKEW",        zones:[{max:115,s:2,t:"正常"},{max:130,s:1,t:"輕度風險"},{max:150,s:0,t:"中高風險"},{max:165,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端"}]},
  {key:"vvix", lbl:"VVIX",        zones:[{max:80,s:2,t:"極度平靜"},{max:100,s:1,t:"正常"},{max:120,s:0,t:"偏高"},{max:140,s:-1,t:"高度警戒"},{max:999,s:-2,t:"極端不確定"}]},
  {key:"fgi",  lbl:"Fear & Greed",zones:[{max:20,s:1,t:"極度恐慌"},{max:35,s:1,t:"恐慌"},{max:55,s:2,t:"中性"},{max:70,s:0,t:"貪婪"},{max:85,s:-1,t:"極度貪婪"},{max:100,s:-2,t:"過熱"}],direct:true},
  {key:"dxy",  lbl:"DXY",         zones:[{max:100,s:2,t:"弱美元"},{max:103,s:1,t:"中性偏弱"},{max:106,s:0,t:"中性"},{max:109,s:-1,t:"強美元"},{max:999,s:-2,t:"強美元高壓"}]},
  {key:"us10y",lbl:"美債 10Y",    zones:[{max:3.5,s:2,t:"低殖利率"},{max:4.0,s:1,t:"適中"},{max:4.5,s:0,t:"偏高"},{max:5.0,s:-1,t:"壓估值"},{max:99,s:-2,t:"過高危險"}]},
  {key:"gold", lbl:"黃金",        zones:[{max:-1,s:1,t:"下跌"},{max:0,s:2,t:"微跌中性"},{max:.5,s:1,t:"微漲中性"},{max:1.5,s:0,t:"上漲謹慎"},{max:99,s:-1,t:"急漲避險"}],usePct:true},
  {key:"oil",  lbl:"原油 WTI",    zones:[{max:-2,s:-1,t:"急跌"},{max:0,s:1,t:"微跌中性"},{max:1,s:2,t:"微漲中性"},{max:2.5,s:0,t:"上漲通膨"},{max:99,s:-1,t:"急漲通膨"}],usePct:true},
  {key:"rsi",  lbl:"大盤 RSI",    zones:[{max:30,s:1,t:"超賣"},{max:40,s:0,t:"偏弱"},{max:60,s:2,t:"健康"},{max:70,s:1,t:"偏強"},{max:80,s:0,t:"超買警示"},{max:100,s:-1,t:"強烈超買"}],direct:true},
  {key:"mfi",  lbl:"MFI",         zones:[{max:20,s:1,t:"超賣"},{max:40,s:0,t:"流出"},{max:60,s:2,t:"中性"},{max:80,s:1,t:"流入"},{max:100,s:-1,t:"超買"}],direct:true},
];
var US_MANUAL_DEFS=[
  {key:"putcall",lbl:"Put/Call Ratio",placeholder:"例：0.85",zones:[{max:.6,s:-1,t:"過度貪婪"},{max:.85,s:1,t:"偏多"},{max:1.1,s:2,t:"均衡"},{max:1.3,s:0,t:"偏空"},{max:9,s:1,t:"極悲觀"}],hint:"CBOE 每日更新"},
  {key:"aaii",   lbl:"AAII 多頭%",   placeholder:"例：38",  zones:[{max:25,s:1,t:"極悲觀"},{max:35,s:1,t:"偏空"},{max:45,s:2,t:"正常"},{max:55,s:0,t:"偏熱"},{max:99,s:-1,t:"過熱"}],hint:"AAII 每週更新（週四）"},
  {key:"trin",   lbl:"TRIN",         placeholder:"例：1.20",zones:[{max:.5,s:-1,t:"過度樂觀"},{max:.8,s:1,t:"偏多"},{max:1.2,s:2,t:"中性"},{max:2.0,s:0,t:"偏空"},{max:99,s:1,t:"極度恐慌"}],hint:"盤中手動更新"},
];
var TW_AUTO=[
  {key:"twd",   lbl:"台幣 / 美金",  zones:[{max:30,s:2,t:"台幣強勢"},{max:31,s:2,t:"偏強"},{max:32,s:1,t:"中性"},{max:33,s:0,t:"偏弱"},{max:34,s:-1,t:"台幣弱勢"},{max:99,s:-2,t:"台幣大貶"}]},
  {key:"twvix", lbl:"台股 VIX",     zones:[{max:15,s:2,t:"低波動"},{max:20,s:2,t:"正常"},{max:25,s:1,t:"偏高"},{max:30,s:0,t:"警戒"},{max:40,s:-1,t:"恐慌"},{max:99,s:-2,t:"極端恐慌"}]},

var VIX_Z=[{max:15,t:"過度樂觀",tc:"#ff1744",bg:"rgba(255,23,68,.1)"},{max:20,t:"低波動",tc:"#00e676",bg:"rgba(0,230,118,.1)"},{max:25,t:"正常",tc:"#8a8a90",bg:"#1c1c1f"},{max:30,t:"警戒",tc:"#ffab00",bg:"rgba(255,171,0,.1)"},{max:40,t:"恐慌",tc:"#ff1744",bg:"rgba(255,23,68,.1)"},{max:999,t:"極端恐慌",tc:"#ff1744",bg:"rgba(255,23,68,.15)"}];
function vixZone(v){for(var z of VIX_Z)if(v<=z.max)return z;return VIX_Z[VIX_Z.length-1];}
function gz(ind,v){for(var i=0;i<ind.zones.length;i++)if(v<=ind.zones[i].max)return ind.zones[i];return ind.zones[ind.zones.length-1];}
function ss(s){
  if(s>=2) return{tc:"#00e676",bg:"rgba(0,230,118,.1)"};
  if(s===1)return{tc:"#8a8a90",bg:"#1c1c1f"};
  if(s===0)return{tc:"#ffab00",bg:"rgba(255,171,0,.1)"};
  return{tc:"#ff1744",bg:"rgba(255,23,68,.1)"};
}

  if(r>=.38)return{lbl:"控制倉位", sub:"多空分歧，建議觀望",c:"#ffab00",tr:"#ffab00"};
  if(r>=.2) return{lbl:"考慮減碼", sub:"多項指標偏空",       c:"#ff1744",tr:"#ff1744"};

function combo(data){
  var vix=liveData["^VIX"]?.price||data.vix?.price;
  var skew=liveData["^SKEW"]?.price||data.skew?.price;
  var vvix=liveData["^VVIX"]?.price||data.vvix?.price;
  if(!vix||!skew||!vvix)return{t:"數據載入中",d:"等待中",c:"#4a4a50"};
  if(skew>145&&vix<20)  return{t:"暗流湧動",d:"高SKEW + 低VIX，最危險組合",c:"#ff1744"};
  if(skew>130&&vix>25&&vvix>120)return{t:"全面恐慌",d:"三指標同時偏高",c:"#ff1744"};
  if(vvix>130)return{t:"極端不確定",d:"VVIX 暴高，走向難預測",c:"#ffab00"};
  if(skew<120&&vix<20&&vvix<100)return{t:"市場平靜",d:"三指標均低，風險溢價正常",c:"#00e676"};
  return{t:"正常波動",d:"無明顯異常組合",c:"#8a8a90"};
}
function getV(ind,data){
  var sym=IND_LIVE[ind.key];
  if(sym&&liveData[sym])return ind.usePct?liveData[sym].pct:liveData[sym].price;
  if(ind.direct)return data[ind.key]!=null?data[ind.key]:null;
  var d=data[ind.key];if(!d)return null;
  return ind.usePct?d.pct:d.price;
}
function calcTot(aI,mI,data){
  var tot=0;
  aI.forEach(i=>{var v=getV(i,data);if(v!=null)tot+=gz(i,v).s;});
  mI.forEach(i=>{var v=getManualVal(i.key);if(v!=null)tot+=gz(i,v).s;});
  return tot;
}
function fmtN(n,d){if(n==null||isNaN(n))return"—";return parseFloat(n).toFixed(d||0);}
function fmtInt(n){if(n==null||isNaN(n))return"—";return parseInt(n).toLocaleString();}
function cc(n){return n>0?"#00e676":n<0?"#ff1744":"#4a4a50";}
function sgn(n){return n>0?"+":"";}
function fmtP(p,dec){
  if(p==null)return"—";dec=dec||2;
  return p>=1000?p.toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec}):p.toFixed(dec);
}

function batchSyms(){
  var s=[];[US_FUT,US_COM,US_VIX].forEach(g=>Object.values(g).forEach(f=>s.push(f.sym)));return s;
}
async function fetchBatch(){
  try{
    var r=await fetch(BATCH_URL+"?syms="+batchSyms().join(","),{cache:"no-store"});
    var json=await r.json();var ok=false;
    batchSyms().forEach(sym=>{if(json[sym]){liveData[sym]=json[sym];ok=true;}});
    liveOK=ok;
  }catch{liveOK=false;}
  updateStatus();if(liveOK)updateAllRows();
}
function startLiveTimer(){
  if(liveTimer)clearInterval(liveTimer);
  fetchBatch();liveTimer=setInterval(fetchBatch,5000);
}
function updateStatus(){
  var dot=document.getElementById("liveDot"),lbl=document.getElementById("liveLabel");
  var st=document.getElementById("mktState"),tim=document.getElementById("statusTime");
  if(!dot)return;
  dot.className=liveOK?"dot":"dot off";
  lbl.textContent=liveOK?"即時":"連線中斷";
  if(tim)tim.textContent=new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  if(st&&curMkt==="us"){var s=usMarketState();st.className="pill "+s;st.textContent=STATE_LBL[s];}
  else if(st){st.className="pill closed";st.textContent="--";}
}

function pcSig(oi){
  if(oi==null)return{t:"—",tc:"#4a4a50",bg:"#1c1c1f"};
  if(oi>130)return{t:"偏空",tc:"#ff1744",bg:"rgba(255,23,68,.1)"};
  if(oi>110)return{t:"中性偏空",tc:"#ffab00",bg:"rgba(255,171,0,.1)"};
  if(oi>90) return{t:"中性",tc:"#8a8a90",bg:"#1c1c1f"};
  return{t:"偏多",tc:"#00e676",bg:"rgba(0,230,118,.1)"};
}
function diffSig(d){
  if(d==null)return{t:"—",tc:"#4a4a50"};
  if(d>5) return{t:"夜盤偏空加重",tc:"#ff1744"};
  if(d>1) return{t:"夜盤略偏空",tc:"#ffab00"};
  if(d>-1)return{t:"無明顯變化",tc:"#8a8a90"};
  if(d>-5)return{t:"夜盤略偏多",tc:"#00e676"};
  return{t:"夜盤偏多加重",tc:"#00e676"};
}

      +"<div class='pc-drow'><span class='pc-dlbl'>成交量比 差值</span><span class='pc-dval' style='color:"+cc(-(pc.diff?.volRatio||0))+"'>"+(pc.diff?.volRatio>=0?"+":"")+fmtN(pc.diff?.volRatio,2)+"</span></div>"

     {lbl:"成交量比",cv:cur?.volRatio,pv:prv?.volRatio,dv:dc2?.volRatio}]

  var fdate=fd.date?fd.date.slice(0,4)+"/"+fd.date.slice(4,6)+"/"+fd.date.slice(6,8):"";
  var h="<div class='ct-date'>"+fdate+"</div><table class='ct'>";
  [{n:"外資",v:fd.foreign},{n:"投信",v:fd.trust},{n:"自營商",v:fd.dealer},{n:"三大合計",v:fd.total,b:true}]
  .forEach(function(r){
    var c=cc(r.v),bw=Math.min(Math.abs(r.v||0)/300*100,100).toFixed(0),bc=r.v>=0?"#00e676":"#ff1744";
    h+="<tr><td class='ct-lbl'"+(r.b?" style='font-weight:700;color:#f0f0f2;font-size:15px'":"")+">"+r.n+"</td>"
      +"<td class='ct-bar'><div class='ct-bar-bg'><div class='ct-bar-fill' style='width:"+bw+"%;background:"+bc+"'></div></div></td>"
      +"<td class='ct-val' style='color:"+c+"'>"+(r.v>=0?"+":"")+fmtN(r.v,1)+" 億</td></tr>";
  });
  return h+"</table>";
}
function renderFutInst(fut){
  if(!fut)return"<div style='color:#4a4a50;font-size:13px;padding:10px 0'>數據載入中…</div>";
  var fdate=fut.date?fut.date.slice(0,4)+"/"+fut.date.slice(4,6)+"/"+fut.date.slice(6,8):"";
  var h="<div class='ct-date'>"+fdate+"</div><table class='ct'>";
  [{n:"外資 台指(TXF)",v:fut.txf?.foreign,chg:fut.txf?.foreign_chg},
   {n:"外資 小台(MXF)",v:fut.mxf?.foreign,chg:fut.mxf?.foreign_chg},
   {n:"外資 微台(TMF)",v:fut.tmf?.foreign,chg:fut.tmf?.foreign_chg},
   {n:"投信 台指",v:fut.txf?.trust,chg:fut.txf?.trust_chg},
   {n:"自營 台指",v:fut.txf?.dealer,chg:fut.txf?.dealer_chg}]
  .forEach(function(r){
    var c=r.v!=null?cc(r.v):"#4a4a50";
    var chg=r.chg!=null?"<span style='color:"+cc(r.chg)+"'>"+(r.chg>0?"▲":"▼")+Math.abs(r.chg).toLocaleString()+"</span>":"";
    h+="<tr><td class='ct-lbl'>"+r.n+"</td><td class='ct-chg'>"+chg+"</td>"
      +"<td class='ct-val' style='color:"+c+"'>"+(r.v>=0?"+":"")+fmtInt(r.v)+"</td></tr>";
  });
  return h+"</table>";
}
function renderMargin(md){
  if(!md||md.margin==null)return"<div style='color:#4a4a50;font-size:13px;padding:10px 0'>數據載入中…</div>";
  var mdate=md.date?md.date.slice(0,4)+"/"+md.date.slice(4,6)+"/"+md.date.slice(6,8):"";
  var isDown=md.marginChg<0;
  return"<div class='ct-date'>"+mdate+"</div>"
    +"<div class='margin-flow'>"
    +"<div><div style='font-size:12px;color:#4a4a50;margin-bottom:3px'>前日餘額</div><div class='margin-num' style='color:#8a8a90;font-size:18px'>"+fmtN(md.marginPrev,1)+" 億</div></div>"
    +"<div class='margin-arrow'>"+(isDown?"↘":"↗")+"</div>"
    +"<div><div style='font-size:12px;color:#4a4a50;margin-bottom:3px'>今日餘額</div><div class='margin-num'>"+fmtN(md.margin,1)+" 億</div></div>"
    +"</div>"
    +"<div class='margin-sig'>"
    +"<span style='font-size:14px;color:"+(isDown?"#00e676":"#ff1744")+"'>"+(isDown?"融資減少，偏多訊號":"融資增加，注意風險")+"</span>"
    +"<span style='font-size:14px;font-weight:700;color:"+cc(md.marginChg)+"'>"+(md.marginChg>=0?"+":"")+fmtN(md.marginChg,1)+" 億 ("+(md.marginChgPct>=0?"+":"")+fmtN(md.marginChgPct,2)+"%)</span>"
    +"</div>";
}
function updateBanner(){
  var isUS=curMkt==="us";
  var aI=isUS?US_AUTO:TW_AUTO,mI=isUS?US_MANUAL_DEFS:[];
  var data=isUS?apiData.us:apiData.tw;
  var mn=(aI.length+mI.length)*-2,mx=(aI.length+mI.length)*2;
  var tot=calcTot(aI,mI,data),r=(tot-mn)/(mx-mn),sf=sfInfo(r);
  var b=document.getElementById("oracle");if(!b)return;
  b.style.borderColor=sf.c+"44";
  document.getElementById("oracle-verdict").textContent=sf.lbl;
  document.getElementById("oracle-verdict").style.color=sf.c;
  document.getElementById("oracle-sub").textContent=sf.sub;
  document.getElementById("oracle-fill").style.width=(r*100).toFixed(0)+"%";
  document.getElementById("oracle-fill").style.background=sf.tr;
  document.getElementById("oracle-score").textContent="評分 "+tot+" / "+mx;
  document.getElementById("oracle-score").style.color=sf.c;
}
function render(mkt){
  var isUS=mkt==="us";
  var aI=isUS?US_AUTO:TW_AUTO,mI=isUS?US_MANUAL_DEFS:[];
  var data=isUS?apiData.us:apiData.tw;
  var mn=(aI.length+mI.length)*-2,mx=(aI.length+mI.length)*2;
  var tot=calcTot(aI,mI,data),r=(tot-mn)/(mx-mn),sf=sfInfo(r);
  var cb=combo(data);

  var h="<div class='oracle' id='oracle' style='border-color:"+sf.c+"44'>"
    +"<div class='oracle-label'>神諭訊號</div>"
    +"<div class='oracle-verdict' id='oracle-verdict' style='color:"+sf.c+"'>"+sf.lbl+"</div>"
    +"<div class='oracle-sub' id='oracle-sub'>"+sf.sub+"</div>"
    +"<div class='oracle-bar'><div class='oracle-fill' id='oracle-fill' style='width:"+(r*100).toFixed(0)+"%;background:"+sf.tr+"'></div></div>"
    +"<div class='oracle-score' id='oracle-score' style='color:"+sf.c+"'>評分 "+tot+" / "+mx+"</div>"
    +"</div>";

  if(isUS){
    h+="<div class='sec' style='margin-top:12px'>"
      +"<div class='combo' id='combo-box'>"
      +"<div class='combo-dot' style='background:"+cb.c+"'></div>"
      +"<div><div class='combo-val' id='combo-val' style='color:"+cb.c+"'>"+cb.t+"</div>"
      +"<div class='combo-desc' id='combo-desc'>"+cb.d+"</div></div>"
      +"</div></div>";

    h+="<div class='sec'>"+secTitle("美股期貨 · 即時");
    Object.entries(US_FUT).forEach(([k,f])=>h+=futRow(k,f));
    h+="</div>";

    h+="<div class='sec'>"+secTitle("商品報價 · 即時")
      +"<div class='g2'>";
    Object.entries(US_COM).forEach(([k,f])=>h+=comRow(k,f));
    h+="</div></div>";

    h+="<div class='sec'>"+secTitle("波動率 · 即時")
      +"<div class='g3'>";
    Object.entries(US_VIX).forEach(([k,f])=>h+=vixRow(k,f));
    h+="</div></div>";

    h+="<div class='sec'>"+secTitle("深度指標 · 自動")
      +"<div class='g2'>"+deepRows(aI,data)+"</div></div>";

    h+="<div class='sec'>"+secTitle("情緒指標 · 手動更新");
    mI.forEach(def=>h+=manualItem(def));
    h+="</div>";

  }else{
    h+="<div class='sec'>"+secTitle("台股即時行情");
    Object.entries(TW_LIVE).forEach(([k,f])=>h+=twRow(k,f));
    h+="</div>";
    h+="<div class='sec'>"+secTitle("三大法人 · 現貨")+renderForeign(data.foreign_data)+"</div>";
    h+="<div class='sec'>"+secTitle("三大法人 · 期貨淨部位")+renderFutInst(data.futures_data)+"</div>";
    h+="<div class='sec'>"+secTitle("Put / Call Ratio")+renderPC(data.putcall_data)+"</div>";
    h+="<div class='sec'>"+secTitle("融資餘額")+renderMargin(data.margin_data)+"</div>";
    h+="<div class='sec'>"+secTitle("深度指標 · 自動")
      +"<div class='g2'>"+deepRows(aI,data)+"</div></div>";
  }

  h+="<div class='footer'>即時 5 秒 · 深度數據 15 分鐘"+(isUS?" · Put/Call、AAII、TRIN 手動更新":" · 籌碼盤後更新")+"</div>";
  document.getElementById("main").innerHTML=h;
  updateStatus();
}

function switchMkt(mkt,btn){
  curMkt=mkt;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");render(mkt);startLiveTimer();
}
async function loadDeep(){
  var btn=document.getElementById("rfBtn");if(btn)btn.classList.add("spin");
  try{
    var ctrl=new AbortController();setTimeout(()=>ctrl.abort(),15000);
    var res=await fetch(DEEP_URL,{cache:"no-store",signal:ctrl.signal});
    var json=await res.json();
    if(json&&json.us){
      apiData=json;
      if(json.us.aaii!=null)   setAIManual("aaii",   json.us.aaii,   json.us.ai_fetched_at);
      if(json.us.putcall!=null)setAIManual("putcall",json.us.putcall,json.us.ai_fetched_at);
    }else apiData={us:{},tw:{}};
  }catch{apiData={us:{},tw:{}};}
  if(btn)btn.classList.remove("spin");
  render(curMkt);
}

var d=new Date();
document.getElementById("dateLabel").textContent=
  d.toLocaleDateString("zh-TW",{month:"2-digit",day:"2-digit",weekday:"short"});
loadDeep();startLiveTimer();
setInterval(loadDeep,15*60*1000);
</script>
